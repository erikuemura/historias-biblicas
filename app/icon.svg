<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Open book -->
  <path d="M50,25 Q32,22 18,28 L18,72 Q32,66 50,70 Q68,66 82,72 L82,28 Q68,22 50,25Z" fill="white" opacity="0.95"/>
  <!-- Book spine line -->
  <line x1="50" y1="25" x2="50" y2="70" stroke="#fb923c" stroke-width="2.5"/>
  <!-- Left page lines -->
  <line x1="24" y1="38" x2="46" y2="37" stroke="#fb923c" stroke-width="2" opacity="0.5"/>
  <line x1="24" y1="45" x2="46" y2="44" stroke="#fb923c" stroke-width="2" opacity="0.4"/>
  <line x1="24" y1="52" x2="46" y2="51" stroke="#fb923c" stroke-width="2" opacity="0.35"/>
  <!-- Right page lines -->
  <line x1="54" y1="37" x2="76" y2="38" stroke="#fb923c" stroke-width="2" opacity="0.5"/>
  <line x1="54" y1="44" x2="76" y2="45" stroke="#fb923c" stroke-width="2" opacity="0.4"/>
  <line x1="54" y1="51" x2="76" y2="52" stroke="#fb923c" stroke-width="2" opacity="0.35"/>
  <!-- Star above book -->
  <polygon points="50,10 52.4,17.6 60,17.6 54,22.4 56.4,30 50,25.2 43.6,30 46,22.4 40,17.6 47.6,17.6" fill="#fef08a"/>
</svg>
