<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="sky5a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#e1f5fe"/>
    </linearGradient>
    <linearGradient id="ground5a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="380" fill="url(#sky5a)"/>

  <!-- Sun -->
  <circle cx="400" cy="55" r="40" fill="#fff176"/>
  <circle cx="400" cy="55" r="30" fill="#ffee58"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.9">
    <ellipse cx="140" cy="70" rx="70" ry="26"/>
    <ellipse cx="185" cy="60" rx="52" ry="22"/>
    <ellipse cx="95" cy="78" rx="44" ry="18"/>
    <ellipse cx="660" cy="75" rx="65" ry="24"/>
    <ellipse cx="705" cy="65" rx="48" ry="20"/>
  </g>

  <!-- Trees background -->
  <rect x="50" y="155" width="14" height="80" rx="4" fill="#5d4037"/>
  <circle cx="57" cy="142" r="36" fill="#2e7d32"/>
  <circle cx="38" cy="158" r="22" fill="#388e3c"/>
  <circle cx="76" cy="158" r="22" fill="#388e3c"/>

  <rect x="700" y="148" width="14" height="86" rx="4" fill="#5d4037"/>
  <circle cx="707" cy="135" r="38" fill="#388e3c"/>
  <circle cx="688" cy="152" r="24" fill="#2e7d32"/>
  <circle cx="726" cy="152" r="24" fill="#43a047"/>

  <!-- Fruit trees center -->
  <rect x="290" y="160" width="12" height="72" rx="4" fill="#5d4037"/>
  <circle cx="296" cy="148" r="32" fill="#388e3c"/>
  <circle cx="285" cy="135" r="8" fill="#e53935"/>
  <circle cx="305" cy="132" r="8" fill="#e53935"/>
  <circle cx="296" cy="130" r="8" fill="#ff7043"/>

  <rect x="490" y="160" width="12" height="72" rx="4" fill="#5d4037"/>
  <circle cx="496" cy="148" r="32" fill="#43a047"/>
  <circle cx="484" cy="135" r="8" fill="#ffd54f"/>
  <circle cx="504" cy="132" r="8" fill="#ffd54f"/>
  <circle cx="496" cy="130" r="8" fill="#ffca28"/>

  <!-- Ground -->
  <rect x="0" y="280" width="800" height="100" fill="url(#ground5a)"/>
  <rect x="0" y="280" width="800" height="12" fill="#c8e6c9"/>

  <!-- Flowers -->
  <circle cx="160" cy="288" r="6" fill="#e91e63"/>
  <circle cx="220" cy="292" r="5" fill="#ff9800"/>
  <circle cx="370" cy="288" r="6" fill="#9c27b0"/>
  <circle cx="430" cy="292" r="5" fill="#f44336"/>
  <circle cx="580" cy="288" r="6" fill="#ffeb3b"/>
  <circle cx="640" cy="292" r="5" fill="#e91e63"/>

  <!-- ADAM - left character -->
  <g transform="translate(320,190)">
    <ellipse cx="28" cy="98" rx="24" ry="7" fill="#2e7d32" opacity="0.25"/>
    <!-- Body -->
    <rect x="8" y="48" width="40" height="52" rx="10" fill="#a1887f"/>
    <!-- Legs -->
    <rect x="10" y="92" width="14" height="36" rx="5" fill="#8d6e63"/>
    <rect x="26" y="92" width="14" height="36" rx="5" fill="#795548"/>
    <!-- Arms -->
    <path d="M8,58 Q-10,72 -5,88" stroke="#a1887f" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M48,58 Q66,72 60,88" stroke="#a1887f" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="28" cy="28" r="26" fill="#ffcc80"/>
    <!-- Hair -->
    <ellipse cx="28" cy="8" rx="22" ry="10" fill="#5d4037"/>
    <!-- Eyes -->
    <circle cx="20" cy="26" r="4" fill="#333"/>
    <circle cx="21" cy="25" r="1.5" fill="white"/>
    <circle cx="36" cy="26" r="4" fill="#333"/>
    <circle cx="37" cy="25" r="1.5" fill="white"/>
    <!-- Smile -->
    <path d="M20,36 Q28,43 36,36" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="14" cy="34" r="7" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="42" cy="34" r="7" fill="#ef9a9a" opacity="0.4"/>
  </g>

  <!-- EVE - right character -->
  <g transform="translate(430,195)">
    <ellipse cx="26" cy="93" rx="22" ry="7" fill="#2e7d32" opacity="0.25"/>
    <!-- Body/dress -->
    <path d="M6,46 Q26,42 46,46 L50,95 Q26,100 2,95 Z" fill="#ef9a9a"/>
    <!-- Arms -->
    <path d="M6,55 Q-10,70 -6,86" stroke="#ffcc80" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M46,55 Q62,70 58,86" stroke="#ffcc80" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="26" cy="26" r="24" fill="#ffcc80"/>
    <!-- Hair long -->
    <ellipse cx="26" cy="10" rx="20" ry="10" fill="#4e342e"/>
    <rect x="6" y="15" width="8" height="50" rx="4" fill="#4e342e"/>
    <rect x="38" y="15" width="8" height="50" rx="4" fill="#4e342e"/>
    <!-- Eyes -->
    <circle cx="18" cy="24" r="4" fill="#333"/>
    <circle cx="19" cy="23" r="1.5" fill="white"/>
    <circle cx="34" cy="24" r="4" fill="#333"/>
    <circle cx="35" cy="23" r="1.5" fill="white"/>
    <!-- Smile -->
    <path d="M18,34 Q26,41 34,34" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="12" cy="32" r="7" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="40" cy="32" r="7" fill="#ef9a9a" opacity="0.4"/>
    <!-- Flower in hair -->
    <circle cx="40" cy="8" r="7" fill="#f48fb1"/>
    <circle cx="40" cy="8" r="3" fill="#fff9c4"/>
  </g>
</svg>
