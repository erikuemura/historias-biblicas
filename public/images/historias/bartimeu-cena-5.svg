<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bt5_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE840;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FFD060;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFF0A0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bt5_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D8C070;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B8A040;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="bt5_burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#FFF060;stop-opacity:0.9"/>
      <stop offset="70%" style="stop-color:#FFD030;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FF8000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="bt5_sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFD030;stop-opacity:0.8"/>
    </radialGradient>
  </defs>
  <!-- Brilliant golden sky - first time seeing! -->
  <rect width="800" height="380" fill="url(#bt5_sky)"/>
  <!-- Bright sun - first thing he sees -->
  <circle cx="400" cy="80" r="65" fill="url(#bt5_sun)"/>
  <circle cx="400" cy="80" r="90" fill="#FFE040" opacity="0.3"/>
  <circle cx="400" cy="80" r="120" fill="#FFD020" opacity="0.15"/>
  <!-- Sun rays radiating -->
  <line x1="400" y1="10" x2="400" y2="-10" stroke="#FFE040" stroke-width="4" opacity="0.8"/>
  <line x1="453" y1="26" x2="468" y2="14" stroke="#FFE040" stroke-width="4" opacity="0.7"/>
  <line x1="494" y1="67" x2="514" y2="58" stroke="#FFE040" stroke-width="4" opacity="0.7"/>
  <line x1="494" y1="93" x2="516" y2="100" stroke="#FFE040" stroke-width="3.5" opacity="0.7"/>
  <line x1="453" y1="134" x2="468" y2="146" stroke="#FFE040" stroke-width="3.5" opacity="0.7"/>
  <line x1="347" y1="26" x2="332" y2="14" stroke="#FFE040" stroke-width="4" opacity="0.7"/>
  <line x1="306" y1="67" x2="286" y2="58" stroke="#FFE040" stroke-width="4" opacity="0.7"/>
  <line x1="306" y1="93" x2="284" y2="100" stroke="#FFE040" stroke-width="3.5" opacity="0.7"/>
  <line x1="347" y1="134" x2="332" y2="146" stroke="#FFE040" stroke-width="3.5" opacity="0.7"/>
  <!-- Colorful world Bartimeu sees for first time - vivid colors -->
  <!-- Flowers blooming bright -->
  <circle cx="80" cy="295" r="12" fill="#FF4080"/>
  <circle cx="80" cy="295" r="6" fill="#FFD040"/>
  <circle cx="110" cy="288" r="10" fill="#FF8030"/>
  <circle cx="110" cy="288" r="5" fill="#FFE040"/>
  <circle cx="140" cy="296" r="11" fill="#FF40C0"/>
  <circle cx="140" cy="296" r="5.5" fill="#FFE040"/>
  <circle cx="660" cy="292" r="12" fill="#40C0FF"/>
  <circle cx="660" cy="292" r="6" fill="#FFE040"/>
  <circle cx="690" cy="286" r="10" fill="#80FF40"/>
  <circle cx="690" cy="286" r="5" fill="#FFE040"/>
  <circle cx="720" cy="294" r="11" fill="#FF6040"/>
  <circle cx="720" cy="294" r="5.5" fill="#FFE040"/>
  <!-- Ground -->
  <rect x="0" y="285" width="800" height="95" fill="url(#bt5_ground)"/>
  <!-- Road bright -->
  <ellipse cx="400" cy="302" rx="260" ry="15" fill="#D8C060" opacity="0.6"/>
  <!-- Tree vivid green -->
  <rect x="640" y="215" width="14" height="85" fill="#7A5030"/>
  <circle cx="647" cy="192" r="42" fill="#40C040"/>
  <circle cx="625" cy="210" r="28" fill="#30A030"/>
  <!-- Birds in sky - he can see them! -->
  <path d="M200,115 Q210,108 220,115" stroke="#5A3820" stroke-width="2.5" fill="none"/>
  <path d="M235,100 Q245,93 255,100" stroke="#5A3820" stroke-width="2.5" fill="none"/>
  <path d="M550,95 Q560,88 570,95" stroke="#5A3820" stroke-width="2.5" fill="none"/>
  <path d="M580,115 Q590,108 600,115" stroke="#5A3820" stroke-width="2.5" fill="none"/>
  <!-- Light burst from Bartimeu's position -->
  <circle cx="400" cy="215" r="100" fill="url(#bt5_burst)" opacity="0.5"/>
  <!-- BARTIMEU - arms raised in pure JOY, eyes WIDE OPEN -->
  <circle cx="400" cy="185" r="25" fill="#E0A060"/>
  <!-- Hair - wild with joy -->
  <ellipse cx="400" cy="168" rx="25" ry="13" fill="#4A2808"/>
  <!-- Worn robe but spirit transformed -->
  <polygon points="375,210 425,210 432,288 368,288" fill="#A09070"/>
  <!-- ARMS HIGH in celebration -->
  <line x1="375" y1="222" x2="335" y2="182" stroke="#E0A060" stroke-width="13" stroke-linecap="round"/>
  <line x1="425" y1="222" x2="465" y2="182" stroke="#E0A060" stroke-width="13" stroke-linecap="round"/>
  <!-- Hands open wide -->
  <circle cx="332" cy="179" r="12" fill="#E0A060"/>
  <circle cx="468" cy="179" r="12" fill="#E0A060"/>
  <!-- EYES WIDE OPEN for the first time - the miracle! -->
  <ellipse cx="391" cy="184" rx="5.5" ry="6.5" fill="white"/>
  <ellipse cx="409" cy="184" rx="5.5" ry="6.5" fill="white"/>
  <!-- Iris - seeing color! deep brown -->
  <ellipse cx="391" cy="184" rx="3.5" ry="4.5" fill="#5A3010"/>
  <ellipse cx="409" cy="184" rx="3.5" ry="4.5" fill="#5A3010"/>
  <!-- Pupils -->
  <ellipse cx="391" cy="184" rx="2" ry="3" fill="#1A0808"/>
  <ellipse cx="409" cy="184" rx="2" ry="3" fill="#1A0808"/>
  <!-- Eye highlights - light reflections -->
  <circle cx="392" cy="182" r="1.5" fill="white"/>
  <circle cx="410" cy="182" r="1.5" fill="white"/>
  <!-- Eyebrows arched way up in joy/wonder -->
  <path d="M385,175 Q391,168 397,175" stroke="#5A3820" stroke-width="3" fill="none"/>
  <path d="M403,175 Q409,168 415,175" stroke="#5A3820" stroke-width="3" fill="none"/>
  <!-- Huge open joyful smile -->
  <path d="M386,200 Q400,212 414,200" stroke="#8B4020" stroke-width="3" fill="#FF8050" opacity="0.5"/>
  <!-- Tears of joy streaming -->
  <ellipse cx="384" cy="200" rx="3" ry="6" fill="#87CEEB" opacity="0.8"/>
  <ellipse cx="416" cy="200" rx="3" ry="6" fill="#87CEEB" opacity="0.8"/>
  <!-- Joy sparkles all around him -->
  <circle cx="350" cy="155" r="6" fill="#FFE040" opacity="0.9"/>
  <circle cx="360" cy="140" r="4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="450" cy="152" r="6" fill="#FFE040" opacity="0.9"/>
  <circle cx="440" cy="138" r="4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="330" cy="175" r="5" fill="#FFD040" opacity="0.8"/>
  <circle cx="470" cy="172" r="5" fill="#FFD040" opacity="0.8"/>
  <circle cx="375" cy="145" r="4" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="425" cy="143" r="4" fill="#FFFFFF" opacity="0.7"/>
  <!-- Star/sparkle shapes -->
  <line x1="355" y1="152" x2="355" y2="145" stroke="#FFE040" stroke-width="2"/>
  <line x1="351" y1="155" x2="345" y2="152" stroke="#FFE040" stroke-width="2"/>
  <line x1="359" y1="155" x2="365" y2="152" stroke="#FFE040" stroke-width="2"/>
  <line x1="448" y1="148" x2="448" y2="141" stroke="#FFE040" stroke-width="2"/>
  <line x1="444" y1="151" x2="438" y2="148" stroke="#FFE040" stroke-width="2"/>
  <line x1="452" y1="151" x2="458" y2="148" stroke="#FFE040" stroke-width="2"/>
  <!-- Crowd in background amazed -->
  <circle cx="180" cy="248" r="17" fill="#F0B080" opacity="0.9"/>
  <ellipse cx="180" cy="234" rx="17" ry="9" fill="#4A2010" opacity="0.9"/>
  <polygon points="164,265 196,265 199,288 161,288" fill="#6080C0" opacity="0.8"/>
  <!-- Mouth open in amazement -->
  <ellipse cx="180" cy="250" rx="4" ry="3" fill="#8B4020"/>
  <circle cx="240" cy="252" r="16" fill="#E8C090" opacity="0.9"/>
  <ellipse cx="240" cy="239" rx="16" ry="9" fill="#7A4020" opacity="0.9"/>
  <polygon points="225,268 255,268 258,288 222,288" fill="#C04040" opacity="0.8"/>
  <ellipse cx="240" cy="254" rx="3.5" ry="2.5" fill="#8B4020"/>
  <circle cx="560" cy="248" r="17" fill="#F0A870" opacity="0.9"/>
  <ellipse cx="560" cy="234" rx="17" ry="9" fill="#3A2010" opacity="0.9"/>
  <polygon points="544,265 576,265 579,288 541,288" fill="#40A060" opacity="0.8"/>
  <ellipse cx="560" cy="250" rx="4" ry="3" fill="#8B4020"/>
  <circle cx="620" cy="252" r="16" fill="#F0C0A0" opacity="0.9"/>
  <ellipse cx="620" cy="238" rx="16" ry="9" fill="#5A3010" opacity="0.9"/>
  <polygon points="605,269 635,269 638,288 602,288" fill="#8040C0" opacity="0.8"/>
  <!-- Title -->
  <rect x="0" y="345" width="800" height="35" fill="#B07820" opacity="0.7"/>
  <text x="400" y="368" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Bartimeu — Cena 5: Enxergo! Aleluia!</text>
</svg>
