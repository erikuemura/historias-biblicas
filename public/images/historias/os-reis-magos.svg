<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="rm_skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="rm_groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
    <radialGradient id="rm_starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#fbbf24;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="400" fill="url(#rm_skyGrad)"/>
  <!-- Stars scattered -->
  <circle cx="50" cy="30" r="2" fill="#e2e8f0" opacity="0.8"/>
  <circle cx="120" cy="60" r="1.5" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="200" cy="20" r="2" fill="#e2e8f0" opacity="0.9"/>
  <circle cx="300" cy="45" r="1.5" fill="#e2e8f0"/>
  <circle cx="450" cy="25" r="2" fill="#e2e8f0" opacity="0.8"/>
  <circle cx="600" cy="50" r="1.5" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="700" cy="30" r="2" fill="#e2e8f0"/>
  <circle cx="750" cy="80" r="1.5" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="80" cy="110" r="1" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="350" cy="15" r="1" fill="#e2e8f0" opacity="0.6"/>
  <!-- Big star glow -->
  <circle cx="650" cy="60" r="80" fill="url(#rm_starGlow)" opacity="0.7"/>
  <!-- Star shape -->
  <polygon points="650,20 658,48 688,48 665,65 673,95 650,78 627,95 635,65 612,48 642,48" fill="#fef08a"/>
  <!-- Star rays -->
  <line x1="650" y1="10" x2="650" y2="0" stroke="#fef08a" stroke-width="2" opacity="0.8"/>
  <line x1="690" y1="30" x2="710" y2="20" stroke="#fef08a" stroke-width="2" opacity="0.6"/>
  <line x1="700" y1="60" x2="720" y2="60" stroke="#fef08a" stroke-width="1.5" opacity="0.5"/>
  <!-- Ground/desert -->
  <rect x="0" y="300" width="800" height="100" fill="url(#rm_groundGrad)"/>
  <!-- Sand dunes -->
  <ellipse cx="150" cy="305" rx="200" ry="30" fill="#92400e"/>
  <ellipse cx="500" cy="310" rx="250" ry="25" fill="#78350f"/>
  <ellipse cx="720" cy="308" rx="150" ry="20" fill="#92400e"/>
  <!-- Camel 1 with king -->
  <ellipse cx="180" cy="280" rx="55" ry="28" fill="#b45309"/>
  <rect x="155" y="252" width="50" height="30" rx="8" fill="#a16207"/>
  <!-- camel neck/head -->
  <rect x="215" y="245" width="18" height="35" rx="8" fill="#b45309"/>
  <ellipse cx="226" cy="243" rx="14" ry="12" fill="#b45309"/>
  <circle cx="230" cy="238" r="4" fill="#92400e"/>
  <!-- camel legs -->
  <rect x="160" y="305" width="10" height="20" rx="3" fill="#92400e"/>
  <rect x="178" y="305" width="10" height="22" rx="3" fill="#92400e"/>
  <rect x="198" y="305" width="10" height="20" rx="3" fill="#92400e"/>
  <rect x="215" y="305" width="10" height="22" rx="3" fill="#92400e"/>
  <!-- King 1 - red robes -->
  <ellipse cx="183" cy="248" rx="16" ry="10" fill="#dc2626"/>
  <rect x="170" y="238" width="25" height="18" rx="6" fill="#dc2626"/>
  <circle cx="183" cy="232" r="12" fill="#fbbf24"/>
  <!-- Crown -->
  <rect x="173" y="218" width="20" height="8" fill="#fbbf24"/>
  <polygon points="173,218 178,210 183,218" fill="#fbbf24"/>
  <polygon points="183,218 188,210 193,218" fill="#fbbf24"/>
  <!-- Camel 2 with king -->
  <ellipse cx="390" cy="278" rx="55" ry="28" fill="#d97706"/>
  <rect x="365" y="250" width="50" height="30" rx="8" fill="#b45309"/>
  <rect x="415" y="243" width="18" height="35" rx="8" fill="#d97706"/>
  <ellipse cx="426" cy="241" rx="14" ry="12" fill="#d97706"/>
  <rect x="370" y="303" width="10" height="20" rx="3" fill="#b45309"/>
  <rect x="388" y="303" width="10" height="22" rx="3" fill="#b45309"/>
  <rect x="408" y="303" width="10" height="20" rx="3" fill="#b45309"/>
  <rect x="425" y="303" width="10" height="22" rx="3" fill="#b45309"/>
  <!-- King 2 - purple robes -->
  <ellipse cx="393" cy="246" rx="16" ry="10" fill="#7c3aed"/>
  <rect x="380" y="236" width="25" height="18" rx="6" fill="#7c3aed"/>
  <circle cx="393" cy="230" r="12" fill="#fde68a"/>
  <rect x="383" y="216" width="20" height="8" fill="#a16207"/>
  <polygon points="383,216 388,208 393,216" fill="#f59e0b"/>
  <polygon points="393,216 398,208 403,216" fill="#f59e0b"/>
  <!-- Camel 3 with king -->
  <ellipse cx="590" cy="282" rx="55" ry="28" fill="#a16207"/>
  <rect x="565" y="254" width="50" height="30" rx="8" fill="#92400e"/>
  <rect x="615" y="247" width="18" height="35" rx="8" fill="#a16207"/>
  <ellipse cx="626" cy="245" rx="14" ry="12" fill="#a16207"/>
  <rect x="570" y="307" width="10" height="20" rx="3" fill="#78350f"/>
  <rect x="588" y="307" width="10" height="22" rx="3" fill="#78350f"/>
  <rect x="608" y="307" width="10" height="20" rx="3" fill="#78350f"/>
  <rect x="625" y="307" width="10" height="22" rx="3" fill="#78350f"/>
  <!-- King 3 - blue robes -->
  <ellipse cx="593" cy="250" rx="16" ry="10" fill="#1d4ed8"/>
  <rect x="580" y="240" width="25" height="18" rx="6" fill="#1d4ed8"/>
  <circle cx="593" cy="234" r="12" fill="#fcd34d"/>
  <rect x="583" y="220" width="20" height="8" fill="#b45309"/>
  <polygon points="583,220 588,212 593,220" fill="#fbbf24"/>
  <polygon points="593,220 598,212 603,220" fill="#fbbf24"/>
  <!-- Gift boxes on camels -->
  <rect x="160" y="260" width="18" height="14" rx="2" fill="#f59e0b"/>
  <rect x="362" y="258" width="18" height="14" rx="2" fill="#10b981"/>
  <rect x="562" y="262" width="18" height="14" rx="2" fill="#ef4444"/>
  <!-- Direction arrow trail of star -->
  <path d="M650 105 Q500 200 430 275" stroke="#fef08a" stroke-width="2" fill="none" stroke-dasharray="8,6" opacity="0.6"/>
</svg>
