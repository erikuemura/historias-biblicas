    <path d="M-4,-2 Q0,-8 4,-2" stroke="#6d4c41" stroke-width="2" fill="none" stroke-linecap="round" transform="translate(51,116)"/>
    <path d="M2,-2 Q6,-8 10,-2" stroke="#6d4c41" stroke-width="2" fill="none" stroke-linecap="round" transform="translate(51,116)"/>
