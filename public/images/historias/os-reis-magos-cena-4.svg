<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="rm4_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0828"/>
      <stop offset="60%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="rm4_stable" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
    <radialGradient id="rm4_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Night sky -->
  <rect width="800" height="380" fill="url(#rm4_bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="150" cy="15" r="2" fill="white" opacity="0.8"/>
  <circle cx="250" cy="35" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="600" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="700" cy="35" r="2" fill="white" opacity="0.7"/>
  <circle cx="750" cy="15" r="1.5" fill="white" opacity="0.9"/>
  <!-- Big star above stable -->
  <circle cx="400" cy="55" r="80" fill="url(#rm4_glow)"/>
  <polygon points="400,20 408,44 432,44 413,59 420,83 400,69 380,83 387,59 368,44 392,44" fill="#fef08a"/>
  <!-- Stable structure -->
  <rect x="200" y="180" width="400" height="200" fill="url(#rm4_stable)"/>
  <!-- Roof -->
  <polygon points="160,185 400,100 640,185" fill="#92400e"/>
  <rect x="160" y="183" width="480" height="10" fill="#b45309"/>
  <!-- Stable walls details -->
  <line x1="280" y1="180" x2="280" y2="375" stroke="#92400e" stroke-width="3"/>
  <line x1="520" y1="180" x2="520" y2="375" stroke="#92400e" stroke-width="3"/>
  <!-- Hay on floor -->
  <ellipse cx="400" cy="350" rx="150" ry="20" fill="#d97706" opacity="0.6"/>
  <!-- Manger with baby Jesus glow -->
  <rect x="350" y="300" width="100" height="60" rx="5" fill="#a16207"/>
  <rect x="340" y="295" width="120" height="20" rx="3" fill="#b45309"/>
  <!-- Baby glow -->
  <circle cx="400" cy="330" r="45" fill="#fef9c3" opacity="0.4"/>
  <ellipse cx="400" cy="328" rx="30" ry="18" fill="#fef9c3" opacity="0.7"/>
  <circle cx="400" cy="315" r="12" fill="#fde68a"/>
  <!-- Mary - blue robes -->
  <rect x="272" y="248" width="50" height="120" rx="10" fill="#1d4ed8"/>
  <circle cx="297" cy="238" r="22" fill="#fde68a"/>
  <ellipse cx="297" cy="225" rx="22" ry="12" fill="#3b82f6"/>
  <!-- Mary head covering -->
  <rect x="275" y="218" width="44" height="12" rx="3" fill="#2563eb"/>
  <!-- Mary looking at Jesus with love -->
  <circle cx="290" cy="237" r="4" fill="#78350f"/>
  <circle cx="305" cy="237" r="4" fill="#78350f"/>
  <path d="M288,247 Q297,255 306,247" stroke="#92400e" stroke-width="2" fill="none"/>
  <!-- Joseph - brown robes -->
  <rect x="478" y="250" width="50" height="120" rx="10" fill="#92400e"/>
  <circle cx="503" cy="240" r="22" fill="#d97706"/>
  <ellipse cx="503" cy="228" rx="22" ry="12" fill="#78350f"/>
  <!-- Three kings bowing - approaching -->
  <!-- King 1 - red - kneeling -->
  <rect x="100" y="290" width="40" height="80" rx="8" fill="#dc2626"/>
  <circle cx="120" cy="280" r="18" fill="#fbbf24"/>
  <rect x="103" y="264" width="34" height="12" fill="#dc2626"/>
  <polygon points="103,264 110,252 120,264" fill="#f59e0b"/>
  <polygon points="120,264 130,252 137,264" fill="#f59e0b"/>
  <!-- King offering gold -->
  <rect x="85" y="330" width="25" height="18" rx="3" fill="#f59e0b"/>
  <line x1="100" y1="308" x2="95" y2="335" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
  <!-- King 2 - purple - kneeling -->
  <rect x="155" y="285" width="40" height="85" rx="8" fill="#7c3aed"/>
  <circle cx="175" cy="275" r="18" fill="#fde68a"/>
  <rect x="158" y="260" width="34" height="12" fill="#6d28d9"/>
  <polygon points="158,260 165,248 175,260" fill="#a78bfa"/>
  <polygon points="175,260 185,248 192,260" fill="#a78bfa"/>
  <rect x="140" y="330" width="25" height="18" rx="3" fill="#10b981"/>
  <line x1="155" y1="303" x2="150" y2="333" stroke="#fde68a" stroke-width="6" stroke-linecap="round"/>
  <!-- King 3 - blue - kneeling -->
  <rect x="598" y="288" width="40" height="82" rx="8" fill="#1d4ed8"/>
  <circle cx="618" cy="278" r="18" fill="#fcd34d"/>
  <rect x="601" y="263" width="34" height="12" fill="#1e40af"/>
  <polygon points="601,263 608,251 618,263" fill="#60a5fa"/>
  <polygon points="618,263 628,251 635,263" fill="#60a5fa"/>
  <rect x="633" y="330" width="25" height="18" rx="3" fill="#ef4444"/>
  <line x1="618" y1="306" x2="633" y2="333" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <!-- Animals in stable -->
  <!-- Ox -->
  <ellipse cx="680" cy="330" rx="45" ry="25" fill="#78350f"/>
  <rect x="645" y="305" width="70" height="30" rx="8" fill="#92400e"/>
  <rect x="700" y="298" width="15" height="20" rx="5" fill="#78350f"/>
  <ellipse cx="710" cy="297" rx="12" ry="10" fill="#78350f"/>
  <!-- Donkey -->
  <ellipse cx="110" cy="352" rx="40" ry="20" fill="#9ca3af"/>
  <rect x="75" y="332" width="70" height="22" rx="6" fill="#6b7280"/>
  <rect x="130" y="325" width="12" height="20" rx="4" fill="#9ca3af"/>
  <ellipse cx="138" cy="323" rx="11" ry="9" fill="#9ca3af"/>
</svg>
