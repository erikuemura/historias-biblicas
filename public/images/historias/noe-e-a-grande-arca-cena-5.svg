<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="sky10a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </linearGradient>
    <linearGradient id="water10a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
    <linearGradient id="ark10a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
  </defs>

  <!-- Bright sky -->
  <rect width="800" height="380" fill="url(#sky10a)"/>

  <!-- Rainbow! -->
  <g opacity="0.85">
    <path d="M50,280 Q400,-60 750,280" stroke="#f44336" stroke-width="18" fill="none"/>
    <path d="M70,280 Q400,-30 730,280" stroke="#ff9800" stroke-width="16" fill="none"/>
    <path d="M90,280 Q400,0 710,280" stroke="#ffee58" stroke-width="14" fill="none"/>
    <path d="M108,280 Q400,26 692,280" stroke="#66bb6a" stroke-width="13" fill="none"/>
    <path d="M124,280 Q400,48 676,280" stroke="#29b6f6" stroke-width="12" fill="none"/>
    <path d="M138,280 Q400,66 662,280" stroke="#5c6bc0" stroke-width="11" fill="none"/>
    <path d="M152,280 Q400,82 648,280" stroke="#ab47bc" stroke-width="10" fill="none"/>
  </g>

  <!-- Sun peeking through -->
  <circle cx="400" cy="55" r="38" fill="#fff176" opacity="0.9"/>
  <circle cx="400" cy="55" r="28" fill="#ffee58"/>

  <!-- Clouds (fluffy, bright) -->
  <g fill="white" opacity="0.9">
    <ellipse cx="130" cy="80" rx="65" ry="24"/>
    <ellipse cx="172" cy="70" rx="48" ry="20"/>
    <ellipse cx="88" cy="88" rx="40" ry="16"/>
    <ellipse cx="660" cy="78" rx="62" ry="23"/>
    <ellipse cx="700" cy="68" rx="46" ry="19"/>
  </g>

  <!-- Water (calm) -->
  <rect x="0" y="270" width="800" height="110" fill="url(#water10a)"/>
  <!-- Gentle waves -->
  <path d="M0,282 Q50,274 100,282 Q150,290 200,282 Q250,274 300,282 Q350,290 400,282 Q450,274 500,282 Q550,290 600,282 Q650,274 700,282 Q750,290 800,282 L800,288 Q750,296 700,288 Q650,280 600,288 Q550,296 500,288 Q450,280 400,288 Q350,296 300,288 Q250,280 200,288 Q150,296 100,288 Q50,280 0,288 Z" fill="#81d4fa" opacity="0.5"/>

  <!-- ARK on water -->
  <g transform="translate(260,175)">
    <path d="M0,95 Q5,110 270,110 Q275,95 270,40 L5,40 Z" fill="url(#ark10a)"/>
    <line x1="5" y1="56" x2="270" y2="56" stroke="#4e342e" stroke-width="2" opacity="0.4"/>
    <line x1="5" y1="72" x2="270" y2="72" stroke="#4e342e" stroke-width="2" opacity="0.4"/>
    <line x1="5" y1="88" x2="270" y2="88" stroke="#4e342e" stroke-width="2" opacity="0.4"/>
    <rect x="14" y="16" width="242" height="26" rx="4" fill="#8d6e63"/>
    <path d="M28,16 L137,−18 L248,16" stroke="#6d4c41" stroke-width="6" fill="none" stroke-linejoin="round"/>
    <!-- Window -->
    <rect x="110" y="22" width="55" height="18" rx="3" fill="#4e342e"/>
    <!-- NOE waving from window -->
    <circle cx="137" cy="26" r="9" fill="#ffcc80"/>
    <circle cx="133" cy="24" r="2" fill="#333"/>
    <circle cx="141" cy="24" r="2" fill="#333"/>
    <path d="M133,29 Q137,33 141,29" stroke="#c62828" stroke-width="1.5" fill="none"/>
  </g>

  <!-- DOVE flying with olive branch -->
  <g transform="translate(370,130)">
    <!-- Body -->
    <ellipse cx="20" cy="12" rx="22" ry="10" fill="white"/>
    <!-- Wings -->
    <path d="M2,10 Q-20,−5 −25,8 Q-10,12 2,10 Z" fill="white"/>
    <path d="M38,10 Q60,−5 65,8 Q50,12 38,10 Z" fill="white"/>
    <!-- Head -->
    <circle cx="40" cy="8" r="10" fill="white"/>
    <!-- Eye -->
    <circle cx="44" cy="6" r="2.5" fill="#333"/>
    <!-- Beak -->
    <path d="M48,9 L56,11 L48,13 Z" fill="#ffa726"/>
    <!-- Olive branch -->
    <path d="M48,13 Q62,20 68,28" stroke="#558b2f" stroke-width="2.5" fill="none"/>
    <ellipse cx="56" cy="20" rx="6" ry="3" fill="#7cb342" transform="rotate(-30,56,20)"/>
    <ellipse cx="64" cy="26" rx="6" ry="3" fill="#8bc34a" transform="rotate(-20,64,26)"/>
  </g>
</svg>
