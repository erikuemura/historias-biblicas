<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyBM1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="45%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffcc02"/>
    </linearGradient>
    <linearGradient id="sandBM1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyBM1)"/>
  <!-- Sun -->
  <circle cx="680" cy="75" r="52" fill="#ffb300" opacity="0.9"/>
  <circle cx="680" cy="75" r="36" fill="#fff9c4" opacity="0.9"/>
  <!-- Pyramids -->
  <polygon points="480,278 562,130 644,278" fill="#ffb300" opacity="0.8"/>
  <polygon points="600,278 672,155 744,278" fill="#ff8f00" opacity="0.65"/>
  <!-- Ground -->
  <rect x="0" y="278" width="800" height="102" fill="url(#sandBM1)"/>
  <!-- Rocks/bricks being carried -->
  <g fill="#a1887f" opacity="0.7">
    <rect x="60" y="265" width="45" height="18" rx="2"/>
    <rect x="112" y="260" width="45" height="18" rx="2"/>
    <rect x="62" y="248" width="45" height="14" rx="2" opacity="0.6"/>
  </g>
  <!-- PERSON 1 carrying stones (bent over, tired) -->
  <g transform="translate(52,170)">
    <ellipse cx="32" cy="110" rx="28" ry="7" fill="#e65100" opacity="0.2"/>
    <path d="M4,40 Q2,95 0,110 Q32,118 64,110 Q60,95 60,40 Q48,28 32,26 Q18,28 4,40Z" fill="#795548"/>
    <rect x="3" y="72" width="58" height="7" rx="3" fill="#5d4037"/>
    <rect x="20" y="102" width="10" height="30" rx="4" fill="#6d4c41"/>
    <rect x="36" y="102" width="10" height="30" rx="4" fill="#5d4037"/>
    <!-- Arms forward carrying block -->
    <path d="M4,46 Q-14,56 -18,72" stroke="#795548" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="-17" cy="74" r="10" fill="#e8a87a"/>
    <path d="M60,46 Q76,56 80,72" stroke="#795548" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="80" cy="74" r="10" fill="#e8a87a"/>
    <!-- Heavy stone they carry -->
    <rect x="-28" y="68" width="120" height="24" rx="3" fill="#90a4ae"/>
    <!-- Head (bent/tired) -->
    <circle cx="32" cy="14" r="22" fill="#e8a87a"/>
    <path d="M13,6 Q32,-8 51,6 Q49,-1 32,-4 Q15,-1 13,6Z" fill="#3e2723"/>
    <circle cx="24" cy="10" r="3.5" fill="#3e2723"/>
    <circle cx="40" cy="10" r="3.5" fill="#3e2723"/>
    <circle cx="25" cy="9" r="1.2" fill="white"/>
    <circle cx="41" cy="9" r="1.2" fill="white"/>
    <!-- Tired expression -->
    <path d="M22,22 Q32,18 42,22" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Sweat drops -->
    <ellipse cx="54" cy="12" rx="3" ry="4" fill="#81d4fa" opacity="0.6" transform="rotate(15,54,12)"/>
  </g>
  <!-- PERSON 2 carrying different stone -->
  <g transform="translate(168,182)">
    <ellipse cx="30" cy="100" rx="25" ry="6" fill="#e65100" opacity="0.15"/>
    <path d="M4,38 Q2,88 0,100 Q30,108 60,100 Q58,88 58,38 Q46,28 30,26 Q16,28 4,38Z" fill="#8d6e63"/>
    <rect x="18" y="92" width="10" height="28" rx="4" fill="#795548"/>
    <rect x="34" y="92" width="10" height="28" rx="4" fill="#6d4c41"/>
    <path d="M4,44 Q-10,54 -14,68" stroke="#8d6e63" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="-13" cy="70" r="9" fill="#ffccbc"/>
    <path d="M58,44 Q72,54 75,68" stroke="#8d6e63" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="75" cy="70" r="9" fill="#ffccbc"/>
    <rect x="-22" y="65" width="106" height="20" rx="3" fill="#90a4ae" opacity="0.8"/>
    <circle cx="30" cy="13" r="21" fill="#ffccbc"/>
    <path d="M12,5 Q30,-7 48,5 Q46,-2 30,-4 Q14,-2 12,5Z" fill="#5d4037"/>
    <circle cx="22" cy="9" r="3.5" fill="#4e342e"/>
    <circle cx="38" cy="9" r="3.5" fill="#4e342e"/>
    <circle cx="23" cy="8" r="1.2" fill="white"/>
    <circle cx="39" cy="8" r="1.2" fill="white"/>
    <path d="M22,20 Q30,16 38,20" stroke="#c62828" stroke-width="2" fill="none"/>
    <ellipse cx="50" cy="10" rx="3" ry="4" fill="#81d4fa" opacity="0.6" transform="rotate(15,50,10)"/>
  </g>
  <!-- Egyptian overseer (with whip, stern) - silhouette right -->
  <g transform="translate(620,190)" opacity="0.85">
    <ellipse cx="30" cy="92" rx="26" ry="7" fill="#e65100" opacity="0.2"/>
    <path d="M4,40 Q2,86 0,92 Q30,100 60,92 Q58,86 58,40 Q46,30 30,28 Q16,30 4,40Z" fill="#e65100"/>
    <rect x="3" y="68" width="54" height="8" rx="4" fill="#ff8f00"/>
    <rect x="18" y="84" width="10" height="30" rx="4" fill="#e65100"/>
    <rect x="34" y="84" width="10" height="30" rx="4" fill="#bf360c"/>
    <!-- Arm raised (commanding) -->
    <path d="M58,46 Q78,34 85,20" stroke="#e65100" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="85" cy="18" r="10" fill="#e8a87a"/>
    <!-- Other arm -->
    <path d="M4,46 Q-10,58 -8,72" stroke="#e65100" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="-7" cy="74" r="10" fill="#e8a87a"/>
    <!-- Head with Egyptian style headdress -->
    <circle cx="30" cy="16" r="21" fill="#e8a87a"/>
    <path d="M10,8 Q30,-6 50,8 Q48,0 30,-3 Q12,0 10,8Z" fill="#ffd54f"/>
    <rect x="9" y="5" width="42" height="8" rx="3" fill="#ff8f00"/>
    <circle cx="21" cy="12" r="3.5" fill="#3e2723"/>
    <circle cx="39" cy="12" r="3.5" fill="#3e2723"/>
    <circle cx="22" cy="11" r="1.2" fill="white"/>
    <circle cx="40" cy="11" r="1.2" fill="white"/>
    <!-- Stern expression -->
    <path d="M19,22 Q30,18 41,22" stroke="#c62828" stroke-width="2" fill="none"/>
  </g>
</svg>
