<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyJC3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#3949ab"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyJC3)"/>
  <!-- Ground -->
  <rect x="0" y="310" width="800" height="70" fill="#6d4c41"/>
  <!-- Many stars -->
  <g fill="white">
    <circle cx="50" cy="30" r="2" opacity="0.9"/><circle cx="120" cy="18" r="1.5" opacity="0.7"/>
    <circle cx="200" cy="42" r="2" opacity="0.85"/><circle cx="280" cy="22" r="1.5" opacity="0.7"/>
    <circle cx="460" cy="35" r="2" opacity="0.9"/><circle cx="560" cy="18" r="1.5" opacity="0.7"/>
    <circle cx="650" cy="42" r="2" opacity="0.85"/><circle cx="730" cy="25" r="1.5" opacity="0.7"/>
    <circle cx="85" cy="78" r="1.2" opacity="0.6"/><circle cx="340" cy="55" r="1.5" opacity="0.8"/>
    <circle cx="500" cy="68" r="1.2" opacity="0.6"/><circle cx="700" cy="70" r="1.5" opacity="0.7"/>
  </g>
  <!-- JOSE sleeping (on the ground) -->
  <g transform="translate(270,262)">
    <!-- Mat/sleeping area -->
    <ellipse cx="125" cy="52" rx="138" ry="22" fill="#8d6e63" opacity="0.5"/>
    <!-- Body lying down -->
    <path d="M20,35 Q80,20 240,25 Q248,42 240,50 Q80,55 20,50Z" fill="#5c6bc0"/>
    <!-- Head -->
    <circle cx="18" cy="40" r="24" fill="#ffccbc"/>
    <path d="M-2,28 Q18,12 38,28 Q36,20 18,17 Q0,20 -2,28Z" fill="#4e342e"/>
    <!-- Eyes closed (sleeping) -->
    <path d="M8,36 Q14,32 20,36" stroke="#4e342e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M16,36 Q22,32 28,36" stroke="#4e342e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Peaceful smile -->
    <path d="M6,47 Q18,54 30,47" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="2" cy="42" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="34" cy="42" r="6" fill="#ef9a9a" opacity="0.4"/>
  </g>
  <!-- Dream bubble -->
  <g opacity="0.9">
    <circle cx="310" cy="230" r="4" fill="white" opacity="0.6"/>
    <circle cx="330" cy="210" r="6" fill="white" opacity="0.7"/>
    <circle cx="358" cy="188" r="9" fill="white" opacity="0.8"/>
    <!-- Dream cloud -->
    <ellipse cx="430" cy="145" rx="95" ry="60" fill="white" opacity="0.9"/>
    <ellipse cx="390" cy="158" rx="55" ry="42" fill="white" opacity="0.9"/>
    <ellipse cx="470" cy="155" rx="55" ry="45" fill="white" opacity="0.9"/>
    <ellipse cx="430" cy="125" rx="65" ry="40" fill="white" opacity="0.9"/>
    <!-- Stars bowing inside dream -->
    <g transform="translate(430,145)">
      <!-- Center star (Jose's) standing tall -->
      <polygon points="0,-28 5,-9 0,-4 -5,-9" fill="#ffd54f"/>
      <polygon points="0,28 5,9 0,4 -5,9" fill="#ffd54f"/>
      <polygon points="-28,0 -9,5 -4,0 -9,-5" fill="#ffd54f"/>
      <polygon points="28,0 9,5 4,0 9,-5" fill="#ffd54f"/>
      <circle cx="0" cy="0" r="7" fill="#ffd54f"/>
      <!-- Other stars bowing -->
      <g fill="#ffe082">
        <circle cx="-55" cy="20" r="8" transform="rotate(30,-55,20)"/>
        <polygon points="-55,12 -52,5 -48,12" fill="#ffd54f"/>
        <circle cx="55" cy="20" r="8" transform="rotate(-30,55,20)"/>
        <polygon points="55,12 58,5 62,12" fill="#ffd54f"/>
        <circle cx="-38" cy="-22" r="7" opacity="0.8"/>
        <circle cx="38" cy="-22" r="7" opacity="0.8"/>
        <circle cx="0" cy="-42" r="7" opacity="0.8"/>
      </g>
    </g>
  </g>
  <!-- Colorful coat draped on him -->
  <g transform="translate(310,255)">
    <path d="M0,0 Q80,-8 160,0 Q165,25 160,30 Q80,38 0,30Z" fill="none" stroke="#e53935" stroke-width="2" opacity="0.6"/>
    <path d="M0,5 Q80,-3 160,5" stroke="#fb8c00" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M0,12 Q80,4 160,12" stroke="#fdd835" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M0,19 Q80,11 160,19" stroke="#43a047" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M0,26 Q80,18 160,26" stroke="#1e88e5" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>
</svg>
