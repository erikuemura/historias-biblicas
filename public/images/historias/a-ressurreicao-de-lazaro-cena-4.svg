<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="lz4_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0828"/>
      <stop offset="40%" style="stop-color:#2e1065"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="lz4_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
    <radialGradient id="lz4_heaven" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#fde047;stop-opacity:0.7"/>
      <stop offset="70%" style="stop-color:#a78bfa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Sky dark then opening to light -->
  <rect width="800" height="380" fill="url(#lz4_sky)"/>
  <!-- Heavenly light opening -->
  <ellipse cx="400" cy="100" rx="200" ry="150" fill="url(#lz4_heaven)"/>
  <!-- Rays from heaven -->
  <line x1="400" y1="0" x2="400" y2="200" stroke="#fef9c3" stroke-width="4" opacity="0.5"/>
  <line x1="340" y1="10" x2="370" y2="200" stroke="#fef9c3" stroke-width="2" opacity="0.4"/>
  <line x1="460" y1="10" x2="430" y2="200" stroke="#fef9c3" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="30" x2="340" y2="200" stroke="#fef9c3" stroke-width="1.5" opacity="0.3"/>
  <line x1="520" y1="30" x2="460" y2="200" stroke="#fef9c3" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="60" x2="310" y2="200" stroke="#fef9c3" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="60" x2="490" y2="200" stroke="#fef9c3" stroke-width="1" opacity="0.2"/>
  <!-- Stars peeking through dark edges -->
  <circle cx="50" cy="25" r="2" fill="white" opacity="0.7"/>
  <circle cx="720" cy="30" r="2" fill="white" opacity="0.7"/>
  <circle cx="760" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="40" cy="60" r="1.5" fill="white" opacity="0.5"/>
  <!-- Rocky terrain -->
  <ellipse cx="200" cy="315" rx="200" ry="80" fill="#92400e"/>
  <ellipse cx="630" cy="318" rx="220" ry="75" fill="#78350f"/>
  <!-- Ground -->
  <rect x="0" y="340" width="800" height="40" fill="url(#lz4_ground)"/>
  <!-- Cave tomb visible in background -->
  <ellipse cx="650" cy="290" rx="90" ry="70" fill="#78350f"/>
  <ellipse cx="650" cy="295" rx="72" ry="58" fill="#451a03"/>
  <ellipse cx="650" cy="300" rx="55" ry="45" fill="#1c0a00"/>
  <!-- Stone rolled aside -->
  <circle cx="580" cy="316" r="42" fill="#92400e"/>
  <circle cx="580" cy="316" r="33" fill="#a16207"/>
  <!-- Jesus praying - arms RAISED HIGH, powerful pose -->
  <rect x="355" y="200" width="80" height="150" rx="15" fill="#ffffff"/>
  <circle cx="395" cy="183" r="36" fill="#fde68a"/>
  <ellipse cx="395" cy="169" rx="36" ry="21" fill="#92400e"/>
  <rect x="370" y="183" width="13" height="42" rx="5" fill="#92400e"/>
  <rect x="408" y="183" width="13" height="42" rx="5" fill="#92400e"/>
  <!-- Jesus powerful face - looking up to heaven -->
  <circle cx="384" cy="181" r="5.5" fill="#78350f"/>
  <circle cx="406" cy="181" r="5.5" fill="#78350f"/>
  <!-- eyes looking up -->
  <path d="M380,175 Q384,169 388,175" stroke="#92400e" stroke-width="2" fill="none"/>
  <path d="M402,175 Q406,169 410,175" stroke="#92400e" stroke-width="2" fill="none"/>
  <!-- mouth open in powerful prayer -->
  <ellipse cx="395" cy="195" rx="7" ry="5" fill="#92400e"/>
  <!-- ARMS RAISED UP HIGH to heaven -->
  <line x1="355" y1="230" x2="295" y2="160" stroke="#fde68a" stroke-width="13" stroke-linecap="round"/>
  <line x1="435" y1="230" x2="495" y2="160" stroke="#fde68a" stroke-width="13" stroke-linecap="round"/>
  <!-- hands open toward sky -->
  <ellipse cx="291" cy="156" rx="16" ry="20" fill="#fde68a"/>
  <ellipse cx="499" cy="156" rx="16" ry="20" fill="#fde68a"/>
  <!-- Light beams from Jesus' hands -->
  <line x1="285" y1="145" x2="268" y2="125" stroke="#fef9c3" stroke-width="2" opacity="0.7"/>
  <line x1="298" y1="142" x2="290" y2="118" stroke="#fef9c3" stroke-width="2" opacity="0.7"/>
  <line x1="505" y1="142" x2="512" y2="118" stroke="#fef9c3" stroke-width="2" opacity="0.7"/>
  <line x1="517" y1="145" x2="534" y2="125" stroke="#fef9c3" stroke-width="2" opacity="0.7"/>
  <!-- Crowd watching in awe -->
  <!-- Mary and Martha kneeling -->
  <rect x="510" y="248" width="40" height="115" rx="9" fill="#3b82f6"/>
  <circle cx="530" cy="236" r="19" fill="#fde68a"/>
  <ellipse cx="530" cy="227" rx="19" ry="11" fill="#1d4ed8"/>
  <path d="M522,245 Q530,253 538,245" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <rect x="558" y="248" width="40" height="115" rx="9" fill="#ec4899"/>
  <circle cx="578" cy="236" r="19" fill="#fde68a"/>
  <ellipse cx="578" cy="227" rx="19" ry="11" fill="#be185d"/>
  <path d="M570,245 Q578,253 586,245" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- Disciples in awe behind -->
  <rect x="175" y="238" width="42" height="122" rx="9" fill="#4b5563"/>
  <circle cx="196" cy="226" r="20" fill="#b45309"/>
  <ellipse cx="196" cy="217" rx="20" ry="11" fill="#92400e"/>
  <!-- looking up in awe -->
  <ellipse cx="189" cy="226" rx="4" ry="5" fill="#78350f"/>
  <ellipse cx="203" cy="226" rx="4" ry="5" fill="#78350f"/>
  <ellipse cx="196" cy="235" rx="4" ry="6" fill="#92400e"/>
  <rect x="225" y="240" width="40" height="120" rx="9" fill="#374151"/>
  <circle cx="245" cy="228" r="20" fill="#92400e"/>
  <ellipse cx="245" cy="219" rx="20" ry="11" fill="#78350f"/>
  <ellipse cx="245" cy="238" rx="4" ry="6" fill="#92400e"/>
</svg>
