  <rect x="292" y="266" width="216" height="31" rx="3" fill="#92400e"/>
  <rect x="308" y="237" width="184" height="31" rx="3" fill="#d97706"/>
  <rect x="322" y="208" width="156" height="31" rx="3" fill="#b45309"/>
  <rect x="336" y="179" width="128" height="31" rx="3" fill="#d97706"/>
  <rect x="350" y="152" width="100" height="28" rx="3" fill="#92400e"/>
  <!-- Top layer crumbling -->
  <rect x="362" y="126" width="76" height="26" rx="3" fill="#b45309" opacity="0.8"/>
  <!-- Falling bricks -->
  <rect x="352" y="100" width="18" height="12" rx="2" fill="#d97706" transform="rotate(25,361,106)"/>
  <rect x="440" y="95" width="18" height="12" rx="2" fill="#92400e" transform="rotate(-18,449,101)"/>
  <rect x="390" y="85" width="14" height="10" rx="2" fill="#b45309" transform="rotate(12,397,90)"/>
  <rect x="415" y="108" width="14" height="10" rx="2" fill="#d97706" transform="rotate(-30,422,113)"/>
  <rect x="370" y="75" width="16" height="10" rx="2" fill="#92400e" transform="rotate(40,378,80)"/>
