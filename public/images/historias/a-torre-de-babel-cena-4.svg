  <line x1="310" y1="248" x2="490" y2="248" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <line x1="324" y1="218" x2="476" y2="218" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <!-- CONFUSED PEOPLE (various poses of confusion) -->
