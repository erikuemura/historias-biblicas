  <path d="M165 302 Q175 290 180 285" stroke="#b45309" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="130" cy="283" r="9" fill="#d97706"/>
  <circle cx="180" cy="283" r="9" fill="#d97706"/>
  <!-- Confused face with question marks -->
  <circle cx="151" cy="295" r="4" fill="#1c1917"/>
  <circle cx="159" cy="295" r="4" fill="#1c1917"/>
  <path d="M152 305 Q155 301 158 305" stroke="#1c1917" stroke-width="2" fill="none"/>
  <!-- Person 2: pointing, arguing -->
  <circle cx="235" cy="295" r="12" fill="#7c3aed"/>
  <ellipse cx="235" cy="315" rx="10" ry="14" fill="#6d28d9"/>
  <path d="M225 305 Q210 298 200 295" stroke="#6d28d9" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M245 305 Q260 296 270 292" stroke="#6d28d9" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="196" cy="295" r="9" fill="#7c3aed"/>
  <!-- Arms raised in confusion -->
  <!-- Person 3: turning away in surprise -->
  <circle cx="320" cy="292" r="12" fill="#dc2626"/>
  <ellipse cx="320" cy="312" rx="10" ry="14" fill="#ef4444"/>
  <path d="M310 302 Q296 296 290 300" stroke="#ef4444" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M330 302 Q344 294 352 290" stroke="#ef4444" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="151" cy="295" r="4" fill="#1c1917"/>
  <!-- Person 4: arms flailing -->
  <circle cx="400" cy="290" r="12" fill="#0891b2"/>
  <ellipse cx="400" cy="310" rx="10" ry="14" fill="#0e7490"/>
  <path d="M390 298 Q374 285 368 278" stroke="#0e7490" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M410 298 Q426 285 432 278" stroke="#0e7490" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="396" cy="287" r="3.5" fill="#1c1917"/>
  <circle cx="404" cy="287" r="3.5" fill="#1c1917"/>
  <circle cx="397" cy="285" r="1.5" fill="white"/><!-- confusion expression -->
  <circle cx="405" cy="285" r="1.5" fill="white"/>
  <!-- Person 5: shrugging -->
  <circle cx="480" cy="292" r="12" fill="#15803d"/>
  <ellipse cx="480" cy="312" rx="10" ry="14" fill="#16a34a"/>
  <path d="M470 300 Q456 290 450 286" stroke="#16a34a" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M490 300 Q504 290 510 286" stroke="#16a34a" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="450" cy="284" r="9" fill="#15803d"/>
  <circle cx="510" cy="284" r="9" fill="#15803d"/>
  <!-- Shoulders raised (shrug) -->
  <!-- Person 6: running away confused -->
  <circle cx="565" cy="294" r="12" fill="#f97316"/>
  <ellipse cx="565" cy="314" rx="10" ry="14" fill="#ea580c"/>
  <path d="M555 302 Q540 296 534 298" stroke="#ea580c" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M575 302 Q590 292 596 286" stroke="#ea580c" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Person 7: covering ears (can't understand) -->
  <circle cx="640" cy="296" r="12" fill="#92400e"/>
  <ellipse cx="640" cy="316" rx="10" ry="14" fill="#78350f"/>
  <path d="M630 304 Q618 296 613 294" stroke="#78350f" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M650 304 Q662 296 667 294" stroke="#78350f" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="613" cy="293" r="9" fill="#92400e"/>
  <circle cx="667" cy="293" r="9" fill="#92400e"/>
  <!-- Speech bubbles with different symbols (confusion of languages) -->
  <ellipse cx="165" cy="270" rx="25" ry="18" fill="white" opacity="0.9"/>
  <polygon points="160,285 165,288 170,285" fill="white" opacity="0.9"/>
  <circle cx="159" cy="270" r="3" fill="#1d4ed8"/>
  <circle cx="168" cy="270" r="3" fill="#dc2626"/>
  <circle cx="177" cy="270" r="3" fill="#15803d"/>
  <ellipse cx="480" cy="265" rx="28" ry="18" fill="white" opacity="0.9"/>
  <polygon points="475,280 480,283 485,280" fill="white" opacity="0.9"/>
  <path d="M468 263 Q472 257 476 263 Q480 257 484 263 Q488 257 492 263" stroke="#7c3aed" stroke-width="2.5" fill="none"/>
  <!-- Ground -->
  <rect x="0" y="325" width="800" height="55" fill="url(#babel4_ground)"/>
  <ellipse cx="400" cy="325" rx="480" ry="22" fill="#f59e0b" opacity="0.6"/>
  <!-- ? marks floating around -->
  <path d="M105 240 Q112 228 120 232 Q128 236 126 246 Q124 253 116 256" stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="116" cy="265" r="4" fill="#fbbf24"/>
  <path d="M680 245 Q687 233 695 237 Q703 241 701 251 Q699 258 691 261" stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="691" cy="270" r="4" fill="#fbbf24"/>
</svg>
