<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="babel4_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="babel4_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="babel4_divine" cx="50%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky with divine light coming down -->
  <rect width="800" height="380" fill="url(#babel4_sky)"/>
  <!-- Divine rays from above causing confusion -->
  <polygon points="380,0 350,200 370,200" fill="#fef9c3" opacity="0.5"/>
  <polygon points="400,0 380,220 400,220" fill="#fef9c3" opacity="0.6"/>
  <polygon points="420,0 410,200 430,200" fill="#fef9c3" opacity="0.5"/>
  <ellipse cx="400" cy="0" rx="200" ry="100" fill="url(#babel4_divine)"/>
  <!-- Clouds mixed up (confused) -->
  <ellipse cx="200" cy="80" rx="85" ry="35" fill="white" opacity="0.8" transform="rotate(-8,200,80)"/>
  <ellipse cx="580" cy="70" rx="90" ry="38" fill="white" opacity="0.8" transform="rotate(6,580,70)"/>
  <ellipse cx="400" cy="60" rx="70" ry="28" fill="white" opacity="0.7" transform="rotate(3,400,60)"/>
  <!-- Tower (half-finished, some parts falling/crumbling) -->
