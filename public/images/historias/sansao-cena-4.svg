<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="san4_prison" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0a0804"/>
    </linearGradient>
    <linearGradient id="san4_wall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2010"/>
      <stop offset="50%" stop-color="#3a2e18"/>
      <stop offset="100%" stop-color="#2a2010"/>
    </linearGradient>
    <linearGradient id="san4_floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e2010"/>
      <stop offset="100%" stop-color="#150e06"/>
    </linearGradient>
    <radialGradient id="san4_hopelight" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ffe082" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe082" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="380" fill="url(#sa4_bg)"/>
  <!-- prison bars -->
  <rect x="100" y="0" width="18" height="380" fill="#374151" opacity="0.8"/>
  <rect x="200" y="0" width="18" height="380" fill="#374151" opacity="0.8"/>
  <rect x="300" y="0" width="18" height="380" fill="#374151" opacity="0.8"/>
  <rect x="400" y="0" width="18" height="380" fill="#374151" opacity="0.8"/>
  <rect x="500" y="0" width="18" height="380" fill="#374151" opacity="0.8"/>
  <rect x="600" y="0" width="18" height="380" fill="#374151" opacity="0.8"/>
  <rect x="700" y="0" width="18" height="380" fill="#374151" opacity="0.8"/>
  <!-- horizontal bars -->
  <rect x="0" y="100" width="800" height="14" fill="#374151" opacity="0.5"/>
  <rect x="0" y="280" width="800" height="14" fill="#374151" opacity="0.5"/>
  <!-- floor glow of hope -->
  <ellipse cx="400" cy="380" rx="300" ry="80" fill="url(#sa4_hope)"/>
  <!-- Sansão sitting head bowed - very short hair -->
  <ellipse cx="400" cy="250" rx="26" ry="28" fill="#fde68a"/>
  <!-- very short hair (just cut) -->
  <rect x="376" y="225" width="48" height="16" rx="8" fill="#78350f"/>
  <!-- chains on wrists -->
  <line x1="350" y1="295" x2="400" y2="280" stroke="#6b7280" stroke-width="6"/>
  <line x1="450" y1="295" x2="400" y2="280" stroke="#6b7280" stroke-width="6"/>
  <circle cx="350" cy="295" r="10" fill="none" stroke="#6b7280" stroke-width="5"/>
  <circle cx="450" cy="295" r="10" fill="none" stroke="#6b7280" stroke-width="5"/>
  <rect x="378" y="276" width="44" height="65" rx="8" fill="#78350f"/>
  <!-- head bowed in sadness -->
  <!-- tiny hair growth symbol - small sprouts of hope -->
  <line x1="390" y1="222" x2="388" y2="210" stroke="#92400e" stroke-width="2.5"/>
  <line x1="400" y1="220" x2="400" y2="208" stroke="#92400e" stroke-width="2.5"/>
  <line x1="410" y1="222" x2="412" y2="210" stroke="#92400e" stroke-width="2.5"/>
  <!-- small light ray from above - hope -->
  <line x1="400" y1="0" x2="400" y2="180" stroke="#fbbf24" stroke-width="3" opacity="0.3"/>
  <ellipse cx="400" cy="180" rx="30" ry="15" fill="#fbbf24" opacity="0.15"/>
</svg>
