<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyJA2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="55%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffcc80"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyJA2)"/>
  <!-- Hills -->
  <ellipse cx="180" cy="330" rx="280" ry="100" fill="#a5d6a7" opacity="0.5"/>
  <ellipse cx="640" cy="335" rx="260" ry="95" fill="#81c784" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="300" width="800" height="80" fill="#c8e6c9"/>
  <!-- Small boy in front presenting loaves and fish -->
  <!-- BOY (young, simple tunic) -->
  <g transform="translate(350,185)">
    <ellipse cx="38" cy="155" rx="32" ry="8" fill="#558b2f" opacity="0.2"/>
    <path d="M7,42 Q5,120 3,147 Q38,155 73,147 Q70,120 68,42 Q54,28 38,25 Q22,28 7,42Z" fill="#ffe082"/>
    <rect x="20" y="141" width="10" height="28" rx="4" fill="#ffd54f" opacity="0.7"/>
    <rect x="40" y="141" width="10" height="28" rx="4" fill="#ffcc02" opacity="0.7"/>
    <!-- Head (child, short) -->
    <circle cx="38" cy="18" r="20" fill="#ffccbc"/>
    <path d="M19,10 Q38,-2 57,10 Q55,3 38,0 Q21,3 19,10Z" fill="#5d4037"/>
    <circle cx="29" cy="14" r="3" fill="#5d4037"/>
    <circle cx="47" cy="14" r="3" fill="#5d4037"/>
    <circle cx="30" cy="13" r="1.2" fill="white"/>
    <circle cx="48" cy="13" r="1.2" fill="white"/>
    <!-- Shy hopeful smile -->
    <path d="M27,24 Q38,30 49,24" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="21" cy="18" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="55" cy="18" r="6" fill="#ef9a9a" opacity="0.4"/>
    <rect x="30" y="36" width="14" height="10" rx="3" fill="#ffccbc"/>
    <!-- Arms holding basket up -->
    <path d="M7,48 Q-8,62 -12,82" stroke="#ffe082" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="-11" cy="84" r="10" fill="#ffccbc"/>
    <path d="M68,48 Q80,58 82,78" stroke="#ffe082" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="82" cy="80" r="10" fill="#ffccbc"/>
  </g>
  <!-- Basket with 5 loaves and 2 fish -->
  <g transform="translate(330,270)">
    <!-- Basket -->
    <path d="M0,14 Q45,2 90,14 Q88,32 45,36 Q2,32 0,14Z" fill="#a1887f"/>
    <path d="M5,18 Q45,8 85,18" stroke="#6d4c41" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M4,24 Q45,14 86,24" stroke="#6d4c41" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- 5 small bread loaves -->
    <ellipse cx="18" cy="12" rx="9" ry="5" fill="#ffb300" opacity="0.9"/>
    <ellipse cx="34" cy="9" rx="9" ry="5" fill="#ffa000" opacity="0.9"/>
    <ellipse cx="50" cy="8" rx="9" ry="5" fill="#ffb300" opacity="0.9"/>
    <ellipse cx="66" cy="9" rx="9" ry="5" fill="#ffa000" opacity="0.9"/>
    <ellipse cx="78" cy="13" rx="8" ry="4" fill="#ffb300" opacity="0.9"/>
    <!-- 2 small fish -->
    <path d="M20,2 Q30,-4 38,2 Q32,8 20,2Z" fill="#4fc3f7" opacity="0.8"/>
    <path d="M15,2 Q18,-1 20,2 Q18,5 15,2Z" fill="#29b6f6" opacity="0.8"/>
    <path d="M58,2 Q68,-4 76,2 Q70,8 58,2Z" fill="#4fc3f7" opacity="0.8"/>
    <path d="M53,2 Q56,-1 58,2 Q56,5 53,2Z" fill="#29b6f6" opacity="0.8"/>
  </g>
  <!-- JESUS above receiving (kind expression) -->
  <g transform="translate(190,130)">
    <path d="M6,50 Q3,145 1,175 Q44,184 87,175 Q84,145 81,50 Q65,34 44,31 Q23,34 6,50Z" fill="white"/>
    <circle cx="44" cy="22" r="24" fill="#ffccbc"/>
    <path d="M22,12 Q44,-2 66,12 Q64,4 44,1 Q24,4 22,12Z" fill="#5d4037"/>
    <circle cx="33" cy="16" r="3.5" fill="#5d4037"/>
    <circle cx="55" cy="16" r="3.5" fill="#5d4037"/>
    <circle cx="34" cy="15" r="1.3" fill="white"/>
    <circle cx="56" cy="15" r="1.3" fill="white"/>
    <path d="M30,30 Q44,40 58,30" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="22" cy="24" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="66" cy="24" r="8" fill="#ef9a9a" opacity="0.4"/>
    <path d="M28,38 Q44,48 60,38 Q58,46 44,50 Q30,46 28,38Z" fill="#5d4037" opacity="0.7"/>
    <rect x="36" y="46" width="14" height="12" rx="3" fill="#ffccbc"/>
    <!-- Arm reaching down kindly to boy -->
    <path d="M6,56 Q-14,72 -16,98" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-15" cy="100" r="11" fill="#ffccbc"/>
    <path d="M81,56 Q95,70 94,95" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="93" cy="97" r="11" fill="#ffccbc"/>
  </g>
  <!-- DISCIPLES watching -->
  <g transform="translate(560,195)" opacity="0.8">
    <path d="M2,38 L0,100 L22,100 L24,38 Q12,28 10,26 Q4,28 2,38Z" fill="#546e7a"/>
    <circle cx="12" cy="14" r="16" fill="#e8a87a"/>
    <path d="M-1,6 Q12,-4 25,6 Q23,0 12,-2 Q1,0 -1,6Z" fill="#3e2723"/>
    <path d="M4,22 Q12,28 20,22" stroke="#c62828" stroke-width="2" fill="none"/>
  </g>
  <g transform="translate(608,202)" opacity="0.75">
    <path d="M2,36 L0,94 L22,94 L24,36 Q12,26 10,24 Q4,26 2,36Z" fill="#ef6c00"/>
    <circle cx="12" cy="13" r="15" fill="#ffccbc"/>
    <path d="M-1,6 Q12,-4 25,6 Q23,0 12,-2 Q1,0 -1,6Z" fill="#5d4037"/>
    <path d="M4,21 Q12,27 20,21" stroke="#c62828" stroke-width="2" fill="none"/>
  </g>
</svg>
