  <text x="150" y="279" font-family="Arial" font-size="12" fill="#8B6000" text-anchor="middle">$</text>
  <ellipse cx="650" cy="272" rx="18" ry="14" fill="#D4A030"/>
  <rect x="643" y="257" width="14" height="10" fill="#C09020"/>
  <text x="650" y="276" font-family="Arial" font-size="12" fill="#8B6000" text-anchor="middle">$</text>
