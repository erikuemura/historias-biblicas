  <path d="M100,105 Q120,150 100,180" stroke="#FF4080" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M700,105 Q680,150 700,180" stroke="#40C0FF" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Title -->
  <rect x="0" y="345" width="800" height="35" fill="#6A2A8A" opacity="0.6"/>
  <text x="400" y="368" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">O Filho Pródigo — Cena 2: A Festa</text>
</svg>
