  <polygon points="220,105 235,120 250,105" fill="#FF6040"/>
  <polygon points="250,105 265,120 280,105" fill="#C040FF"/>
  <polygon points="280,105 295,120 310,105" fill="#FF4080"/>
  <polygon points="310,105 325,120 340,105" fill="#40C0FF"/>
  <polygon points="340,105 355,120 370,105" fill="#FFD040"/>
  <polygon points="370,105 385,120 400,105" fill="#40E080"/>
  <polygon points="400,105 415,120 430,105" fill="#FF6040"/>
  <polygon points="430,105 445,120 460,105" fill="#C040FF"/>
  <polygon points="460,105 475,120 490,105" fill="#FF4080"/>
  <polygon points="490,105 505,120 520,105" fill="#FFD040"/>
