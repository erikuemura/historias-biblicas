<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="fp2_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A1A4A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4A2A6A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fp2_floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6A4020;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="fp2_lamp1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE860;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FF9020;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="fp2_lamp2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF8060;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FF4080;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Night sky background -->
  <rect width="800" height="380" fill="url(#fp2_bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="2" fill="white" opacity="0.8"/>
  <circle cx="150" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="700" cy="25" r="2" fill="white" opacity="0.9"/>
