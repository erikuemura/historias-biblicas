  <circle cx="545" cy="188" r="19" fill="#F0C0A0"/>
  <ellipse cx="545" cy="174" rx="19" ry="10" fill="#7A4020"/>
  <polygon points="527,207 563,207 568,268 522,268" fill="#40B080"/>
  <line x1="563" y1="218" x2="585" y2="202" stroke="#F0C0A0" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="538" cy="186" rx="3" ry="4" fill="#5A3820"/>
  <ellipse cx="552" cy="186" rx="3" ry="4" fill="#5A3820"/>
  <path d="M539,195 Q545,201 551,195" stroke="#8B4030" stroke-width="2" fill="none"/>
