  <line x1="378" y1="210" x2="345" y2="185" stroke="#F5C870" stroke-width="10" stroke-linecap="round"/>
  <line x1="422" y1="210" x2="455" y2="185" stroke="#F5C870" stroke-width="10" stroke-linecap="round"/>
  <!-- Son happy face -->
  <ellipse cx="393" cy="174" rx="3.5" ry="4" fill="#5A3820"/>
  <ellipse cx="407" cy="174" rx="3.5" ry="4" fill="#5A3820"/>
  <path d="M391,183 Q400,190 409,183" stroke="#8B4030" stroke-width="2.5" fill="none"/>
  <!-- Friend 1 (left) -->
  <circle cx="255" cy="185" r="19" fill="#F0A870"/>
  <ellipse cx="255" cy="171" rx="19" ry="10" fill="#3A2010"/>
  <polygon points="237,204 273,204 278,265 232,265" fill="#4080E0"/>
  <line x1="237" y1="216" x2="215" y2="200" stroke="#F0A870" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="248" cy="183" rx="3" ry="4" fill="#5A3820"/>
  <ellipse cx="262" cy="183" rx="3" ry="4" fill="#5A3820"/>
  <path d="M249,192 Q255,198 261,192" stroke="#8B4030" stroke-width="2" fill="none"/>
