<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="babel2_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="babel2_tower" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="babel2_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="380" fill="url(#babel2_sky)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="55" rx="65" ry="25" fill="white" opacity="0.85"/>
  <ellipse cx="135" cy="42" rx="48" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="680" cy="48" rx="72" ry="27" fill="white" opacity="0.85"/>
  <ellipse cx="718" cy="35" rx="50" ry="23" fill="white" opacity="0.85"/>
  <!-- Ground -->
  <rect x="0" y="320" width="800" height="60" fill="url(#babel2_ground)"/>
  <ellipse cx="400" cy="320" rx="500" ry="28" fill="#f59e0b"/>
  <!-- TOWER UNDER CONSTRUCTION (bigger, with scaffolding) -->
  <!-- Base layer -->
  <rect x="260" y="292" width="280" height="30" rx="3" fill="#92400e"/>
  <!-- Layer 2 -->
  <rect x="275" y="262" width="250" height="32" rx="3" fill="#d97706"/>
  <!-- Layer 3 -->
  <rect x="292" y="232" width="216" height="32" rx="3" fill="#b45309"/>
  <!-- Layer 4 -->
  <rect x="310" y="202" width="180" height="32" rx="3" fill="#d97706"/>
  <!-- Layer 5 partial (being built) -->
  <rect x="325" y="172" width="148" height="32" rx="3" fill="#f59e0b"/>
  <!-- Layer 6 partial (being built, incomplete) -->
  <rect x="340" y="145" width="80" height="28" rx="3" fill="#d97706"/>
  <rect x="435" y="145" width="50" height="20" rx="3" fill="#d97706" opacity="0.6"/>
  <!-- Brick texture lines on tower -->
  <line x1="262" y1="308" x2="538" y2="308" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
  <line x1="277" y1="278" x2="523" y2="278" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
  <line x1="294" y1="248" x2="506" y2="248" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
  <line x1="312" y1="218" x2="488" y2="218" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
  <line x1="327" y1="188" x2="473" y2="188" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
  <!-- Vertical brick lines -->
  <line x1="290" y1="262" x2="290" y2="292" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <line x1="320" y1="262" x2="320" y2="292" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <line x1="350" y1="262" x2="350" y2="292" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <line x1="380" y1="262" x2="380" y2="292" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <line x1="410" y1="262" x2="410" y2="292" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <line x1="440" y1="262" x2="440" y2="292" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <line x1="470" y1="262" x2="470" y2="292" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="262" x2="500" y2="292" stroke="#78350f" stroke-width="1.5" opacity="0.4"/>
  <!-- SCAFFOLDING left side -->
  <!-- Vertical poles -->
  <rect x="228" y="165" width="6" height="158" fill="#92400e"/>
  <rect x="248" y="180" width="6" height="143" fill="#92400e"/>
  <!-- Horizontal bars -->
  <rect x="228" y="165" width="38" height="6" fill="#78350f"/>
  <rect x="228" y="195" width="38" height="6" fill="#78350f"/>
  <rect x="228" y="225" width="38" height="6" fill="#78350f"/>
  <rect x="228" y="255" width="38" height="6" fill="#78350f"/>
  <rect x="228" y="285" width="38" height="6" fill="#78350f"/>
  <!-- Diagonal braces -->
  <line x1="228" y1="165" x2="254" y2="195" stroke="#78350f" stroke-width="3"/>
  <line x1="254" y1="165" x2="228" y2="195" stroke="#78350f" stroke-width="3" opacity="0.5"/>
  <line x1="228" y1="195" x2="254" y2="225" stroke="#78350f" stroke-width="3"/>
  <line x1="228" y1="225" x2="254" y2="255" stroke="#78350f" stroke-width="3"/>
  <line x1="228" y1="255" x2="254" y2="285" stroke="#78350f" stroke-width="3"/>
  <!-- SCAFFOLDING right side -->
  <rect x="566" y="172" width="6" height="151" fill="#92400e"/>
  <rect x="546" y="185" width="6" height="138" fill="#92400e"/>
  <rect x="546" y="172" width="32" height="6" fill="#78350f"/>
  <rect x="546" y="202" width="32" height="6" fill="#78350f"/>
  <rect x="546" y="232" width="32" height="6" fill="#78350f"/>
  <rect x="546" y="262" width="32" height="6" fill="#78350f"/>
  <rect x="546" y="292" width="32" height="6" fill="#78350f"/>
  <line x1="546" y1="172" x2="572" y2="202" stroke="#78350f" stroke-width="3"/>
  <line x1="546" y1="202" x2="572" y2="232" stroke="#78350f" stroke-width="3"/>
  <line x1="546" y1="232" width="32" y2="262" stroke="#78350f" stroke-width="3"/>
  <line x1="546" y1="262" x2="572" y2="292" stroke="#78350f" stroke-width="3"/>
  <!-- Workers on scaffolding -->
  <!-- Worker 1 on left scaffold -->
  <circle cx="240" cy="188" r="8" fill="#dc2626"/>
  <rect x="235" y="194" width="10" height="14" rx="3" fill="#ef4444"/>
  <!-- Worker carrying brick -->
  <rect x="222" y="192" width="16" height="8" rx="2" fill="#92400e"/>
  <!-- Worker 2 on tower level 4 -->
  <circle cx="330" cy="196" r="8" fill="#1d4ed8"/>
  <rect x="325" y="202" width="10" height="14" rx="3" fill="#2563eb"/>
  <!-- Worker 3 on top level left -->
  <circle cx="368" cy="138" r="8" fill="#15803d"/>
  <rect x="363" y="144" width="10" height="14" rx="3" fill="#16a34a"/>
  <!-- Worker laying bricks -->
  <rect x="385" y="142" width="18" height="8" rx="2" fill="#92400e"/>
  <!-- Worker 4 on right scaffold -->
  <circle cx="560" cy="186" r="8" fill="#7c3aed"/>
  <rect x="555" y="192" width="10" height="14" rx="3" fill="#6d28d9"/>
  <!-- Worker 5 on tower level 3 -->
  <circle cx="470" cy="225" r="8" fill="#f97316"/>
  <rect x="465" y="231" width="10" height="14" rx="3" fill="#ea580c"/>
  <!-- Workers on ground with bricks -->
  <circle cx="160" cy="312" r="9" fill="#0891b2"/>
  <rect x="154" y="318" width="12" height="16" rx="3" fill="#0e7490"/>
  <rect x="140" y="315" width="22" height="10" rx="2" fill="#92400e"/>
  <circle cx="640" cy="312" r="9" fill="#92400e"/>
  <rect x="634" y="318" width="12" height="16" rx="3" fill="#78350f"/>
  <rect x="650" y="315" width="22" height="10" rx="2" fill="#b45309"/>
  <!-- Ramp going up to tower left -->
  <polygon points="165,320 260,292 260,300 170,320" fill="#b45309"/>
  <!-- Ramp right -->
  <polygon points="540,292 635,320 625,320 540,300" fill="#b45309"/>
  <!-- Bricks being lifted (rope/pulley) -->
  <line x1="400" y1="145" x2="400" y2="90" stroke="#78350f" stroke-width="3"/>
  <rect x="388" y="80" width="24" height="14" rx="3" fill="#92400e"/>
  <circle cx="400" cy="78" r="5" fill="#d97706"/>
  <!-- People at base celebrating progress -->
  <circle cx="200" cy="316" r="8" fill="#f59e0b"/>
  <circle cx="218" cy="314" r="8" fill="#d97706"/>
  <circle cx="580" cy="316" r="8" fill="#1d4ed8"/>
  <circle cx="598" cy="314" r="8" fill="#7c3aed"/>
</svg>
