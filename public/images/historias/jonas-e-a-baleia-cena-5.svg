<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="jon5_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0077b6"/>
      <stop offset="50%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#48cae4"/>
    </linearGradient>
    <radialGradient id="jon5_sun" cx="85%" cy="12%" r="35%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffee58"/>
      <stop offset="100%" stop-color="#0077b6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jon5_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a850"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="jon5_building" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0c080"/>
      <stop offset="100%" stop-color="#b89040"/>
    </linearGradient>
  </defs>

  <!-- Cyan sky -->
  <rect width="800" height="380" fill="url(#jon5_sky)"/>
  <ellipse cx="680" cy="60" rx="240" ry="160" fill="url(#jon5_sun)"/>

  <!-- Sun -->
  <circle cx="740" cy="45" r="36" fill="#fff9c4"/>
  <circle cx="740" cy="45" r="28" fill="#ffee58"/>

  <!-- Fluffy clouds -->
  <ellipse cx="180" cy="50" rx="80" ry="26" fill="white" opacity="0.85"/>
  <ellipse cx="150" cy="56" rx="55" ry="22" fill="white" opacity="0.9"/>
  <ellipse cx="215" cy="57" rx="58" ry="20" fill="white" opacity="0.85"/>
  <ellipse cx="450" cy="40" rx="65" ry="22" fill="white" opacity="0.75"/>
  <ellipse cx="420" cy="46" rx="45" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="490" cy="46" rx="50" ry="17" fill="white" opacity="0.75"/>

  <!-- Ground / city square of Nineveh -->
  <rect x="0" y="295" width="800" height="85" fill="url(#jon5_ground)"/>
  <!-- Ground tiles / cobblestones -->
  <line x1="0" y1="318" x2="800" y2="318" stroke="#b89040" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="340" x2="800" y2="340" stroke="#b89040" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="362" x2="800" y2="362" stroke="#b89040" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="295" x2="100" y2="380" stroke="#b89040" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="295" x2="200" y2="380" stroke="#b89040" stroke-width="1.5" opacity="0.3"/>
  <line x1="300" y1="295" x2="300" y2="380" stroke="#b89040" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="295" x2="400" y2="380" stroke="#b89040" stroke-width="1.5" opacity="0.3"/>
  <line x1="500" y1="295" x2="500" y2="380" stroke="#b89040" stroke-width="1.5" opacity="0.3"/>
  <line x1="600" y1="295" x2="600" y2="380" stroke="#b89040" stroke-width="1.5" opacity="0.3"/>
  <line x1="700" y1="295" x2="700" y2="380" stroke="#b89040" stroke-width="1.5" opacity="0.3"/>

  <!-- Nineveh city buildings in background -->
  <rect x="0" y="155" width="55" height="140" fill="url(#jon5_building)" opacity="0.9"/>
  <rect x="60" y="135" width="60" height="160" fill="#d4b060" opacity="0.85"/>
  <rect x="125" y="148" width="50" height="147" fill="url(#jon5_building)" opacity="0.9"/>
  <rect x="180" y="140" width="45" height="155" fill="#c8a850" opacity="0.85"/>
  <!-- Background buildings right side -->
  <rect x="560" y="150" width="55" height="145" fill="url(#jon5_building)" opacity="0.85"/>
  <rect x="620" y="138" width="60" height="157" fill="#d4b060" opacity="0.8"/>
  <rect x="685" y="152" width="50" height="143" fill="url(#jon5_building)" opacity="0.85"/>
  <rect x="740" y="145" width="60" height="150" fill="#c8a850" opacity="0.8"/>
  <!-- Building windows -->
  <rect x="72" y="148" width="12" height="18" rx="2" fill="#5a3010" opacity="0.6"/>
  <rect x="88" y="148" width="12" height="18" rx="2" fill="#5a3010" opacity="0.6"/>
  <rect x="135" y="160" width="10" height="16" rx="2" fill="#5a3010" opacity="0.6"/>
  <rect x="150" y="160" width="10" height="16" rx="2" fill="#5a3010" opacity="0.6"/>
  <rect x="572" y="162" width="10" height="16" rx="2" fill="#5a3010" opacity="0.6"/>
  <rect x="632" y="152" width="12" height="18" rx="2" fill="#5a3010" opacity="0.6"/>
  <rect x="648" y="152" width="12" height="18" rx="2" fill="#5a3010" opacity="0.6"/>
  <!-- Domes / towers -->
  <ellipse cx="90" cy="132" rx="22" ry="10" fill="#c8a050" opacity="0.85"/>
  <rect x="85" y="120" width="10" height="14" fill="#c8a050" opacity="0.8"/>
  <ellipse cx="640" cy="135" rx="22" ry="10" fill="#c8a050" opacity="0.85"/>
  <rect x="635" y="122" width="10" height="14" fill="#c8a050" opacity="0.8"/>

  <!-- JONAS — standing on raised platform/steps, preaching with arm raised -->
  <!-- Steps -->
  <rect x="285" y="278" width="130" height="18" rx="4" fill="#c8a040"/>
  <rect x="295" y="264" width="110" height="18" rx="4" fill="#d4aa50"/>
  <!-- Robe -->
  <path d="M315 295 Q319 245 330 232 Q346 220 363 226 Q378 235 380 295Z" fill="#00b4d8"/>
  <!-- Mantle -->
  <path d="M311 289 Q315 248 327 235 Q312 258 311 289Z" fill="#0077b6"/>
  <path d="M380 289 Q382 252 372 235 Q382 260 380 289Z" fill="#0077b6"/>
  <!-- Belt -->
  <rect x="319" y="252" width="60" height="7" rx="3" fill="#0077b6"/>
  <!-- Head -->
  <circle cx="348" cy="224" r="22" fill="#c8956c"/>
  <!-- Hair/turban -->
  <path d="M328 216 Q332 202 348 199 Q364 202 368 216 Q362 222 348 224 Q334 222 328 216Z" fill="#0096c7"/>
  <!-- Confident joyful expression -->
  <circle cx="340" cy="220" r="3.5" fill="#3a2010"/>
  <circle cx="356" cy="220" r="3.5" fill="#3a2010"/>
  <circle cx="341" cy="219" r="1.3" fill="white"/>
  <circle cx="357" cy="219" r="1.3" fill="white"/>
  <path d="M339 231 Q348 237 357 231" stroke="#8b3a10" stroke-width="2.5" fill="none"/>
  <ellipse cx="336" cy="228" rx="5" ry="4" fill="#e07060" opacity="0.4"/>
  <ellipse cx="360" cy="228" rx="5" ry="4" fill="#e07060" opacity="0.4"/>
  <!-- Short beard -->
  <path d="M330 231 Q335 244 348 248 Q361 244 366 231" fill="#5a3010" opacity="0.7"/>
  <!-- Preaching arm raised high -->
  <line x1="365" y1="243" x2="400" y2="210" stroke="#c8956c" stroke-width="10" stroke-linecap="round"/>
  <circle cx="402" cy="208" r="9" fill="#c8956c"/>
  <!-- Other arm gesturing out toward crowd -->
  <line x1="322" y1="243" x2="288" y2="262" stroke="#c8956c" stroke-width="10" stroke-linecap="round"/>
  <circle cx="286" cy="263" r="9" fill="#c8956c"/>
  <!-- Legs on platform -->
  <line x1="330" y1="293" x2="322" y2="320" stroke="#c8956c" stroke-width="12" stroke-linecap="round"/>
  <line x1="363" y1="293" x2="370" y2="320" stroke="#c8956c" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="320" cy="322" rx="14" ry="6" fill="#8b5e20"/>
  <ellipse cx="371" cy="322" rx="14" ry="6" fill="#8b5e20"/>

  <!-- CROWD OF NINEVITES — listening attentively, diverse group -->
  <!-- Left crowd -->
  <!-- Person 1 -->
  <circle cx="80" cy="278" r="13" fill="#d4956a"/>
  <rect x="69" y="290" width="22" height="30" rx="3" fill="#e8a030"/>
  <circle cx="75" cy="274" r="2.5" fill="#3a2010"/>
  <circle cx="86" cy="274" r="2.5" fill="#3a2010"/>
  <path d="M74 282 Q80 286 86 282" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Person 2 -->
  <circle cx="128" cy="275" r="13" fill="#c8a870"/>
  <rect x="117" y="287" width="22" height="30" rx="3" fill="#ffcc80"/>
  <circle cx="122" cy="271" r="2.5" fill="#3a2010"/>
  <circle cx="133" cy="271" r="2.5" fill="#3a2010"/>
  <path d="M121 279 Q127 283 133 279" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Person 3 woman with scarf -->
  <circle cx="172" cy="277" r="13" fill="#d4a060"/>
  <path d="M160 270 Q165 260 172 258 Q179 260 184 270 Q179 277 172 279 Q165 277 160 270Z" fill="#e07030"/>
  <rect x="161" y="289" width="22" height="28" rx="3" fill="#ffe082"/>
  <path d="M163 278 Q172 283 181 278" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Person 4 -->
  <circle cx="215" cy="276" r="13" fill="#c8956a"/>
  <rect x="204" y="288" width="22" height="30" rx="3" fill="#ffb74d"/>
  <circle cx="209" cy="272" r="2.5" fill="#3a2010"/>
  <circle cx="220" cy="272" r="2.5" fill="#3a2010"/>
  <path d="M208 280 Q214 284 220 280" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Person 5 child (small) -->
  <circle cx="248" cy="285" r="10" fill="#d4b080"/>
  <rect x="239" y="294" width="18" height="22" rx="3" fill="#ffe082"/>
  <circle cx="243" cy="282" r="2" fill="#3a2010"/>
  <circle cx="252" cy="282" r="2" fill="#3a2010"/>
  <!-- Arm pointing at Jonas — excited child -->
  <line x1="257" y1="298" x2="272" y2="285" stroke="#d4b080" stroke-width="6" stroke-linecap="round"/>

  <!-- Right crowd -->
  <!-- Person 6 -->
  <circle cx="440" cy="278" r="13" fill="#d4a870"/>
  <rect x="429" y="290" width="22" height="30" rx="3" fill="#e8c880"/>
  <circle cx="434" cy="274" r="2.5" fill="#3a2010"/>
  <circle cx="445" cy="274" r="2.5" fill="#3a2010"/>
  <path d="M433 282 Q440 286 446 282" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Person 7 -->
  <circle cx="485" cy="275" r="13" fill="#c8956a"/>
  <rect x="474" y="287" width="22" height="30" rx="3" fill="#ffb74d"/>
  <circle cx="479" cy="271" r="2.5" fill="#3a2010"/>
  <circle cx="490" cy="271" r="2.5" fill="#3a2010"/>
  <path d="M478 279 Q484 283 490 279" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Person 8 woman -->
  <circle cx="530" cy="277" r="13" fill="#d4a060"/>
  <path d="M518 270 Q523 260 530 258 Q537 260 542 270 Q537 277 530 279 Q523 277 518 270Z" fill="#c87030"/>
  <rect x="519" y="289" width="22" height="28" rx="3" fill="#ffe082"/>
  <path d="M521 278 Q530 283 539 278" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Person 9 -->
  <circle cx="572" cy="276" r="13" fill="#c8a870"/>
  <rect x="561" y="288" width="22" height="30" rx="3" fill="#ffcc80"/>
  <circle cx="566" cy="272" r="2.5" fill="#3a2010"/>
  <circle cx="577" cy="272" r="2.5" fill="#3a2010"/>
  <path d="M565 280 Q572 284 578 280" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Person 10 bearded elder -->
  <circle cx="620" cy="274" r="14" fill="#c8956c"/>
  <path d="M606 284 Q611 296 620 300 Q629 296 634 284" fill="#d0d0d0"/>
  <rect x="608" y="287" width="24" height="30" rx="3" fill="#e8a030"/>
  <circle cx="613" cy="269" r="2.5" fill="#3a2010"/>
  <circle cx="625" cy="269" r="2.5" fill="#3a2010"/>
  <path d="M612 278 Q620 283 628 278" stroke="#8b3a10" stroke-width="2" fill="none"/>
  <!-- Person 11 -->
  <circle cx="668" cy="277" r="12" fill="#d4a870"/>
  <rect x="658" y="288" width="20" height="29" rx="3" fill="#ffe082"/>
  <!-- Raised hands in crowd — listening, moved -->
  <line x1="479" y1="287" x2="468" y2="268" stroke="#c8956a" stroke-width="7" stroke-linecap="round"/>
  <circle cx="467" cy="266" r="6" fill="#c8956a"/>
  <line x1="566" y1="288" x2="555" y2="270" stroke="#c8a870" stroke-width="7" stroke-linecap="round"/>
  <circle cx="554" cy="268" r="6" fill="#c8a870"/>

  <!-- Attention lines from crowd to Jonas -->
  <line x1="248" y1="273" x2="295" y2="258" stroke="#0077b6" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="440" y1="272" x2="395" y2="258" stroke="#0077b6" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Caption -->
  <rect x="10" y="344" width="390" height="28" rx="14" fill="#023e8a" opacity="0.85"/>
  <text x="205" y="363" font-family="Georgia, serif" font-size="14" fill="#90e0ef" text-anchor="middle" font-weight="bold">Jonas prega para o povo de Nínive</text>
</svg>
