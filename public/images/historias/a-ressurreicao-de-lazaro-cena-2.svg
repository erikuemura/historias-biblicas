<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="lz2_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="lz2_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#lz2_sky)"/>
  <!-- Stars -->
  <circle cx="100" cy="30" r="2" fill="white" opacity="0.7"/>
  <circle cx="250" cy="20" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="500" cy="35" r="2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <!-- Road in distance -->
  <polygon points="320,380 360,220 440,220 480,380" fill="#b45309" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="300" width="800" height="80" fill="url(#lz2_ground)"/>
  <!-- Messenger running to Jesus -->
  <!-- Messenger figure - running with scroll/message -->
  <rect x="580" y="240" width="38" height="85" rx="9" fill="#d97706"/>
  <circle cx="599" cy="228" r="19" fill="#fde68a"/>
  <ellipse cx="599" cy="219" rx="19" ry="10" fill="#78350f"/>
  <!-- worried rushing face -->
  <circle cx="592" cy="227" r="4" fill="#78350f"/>
  <circle cx="606" cy="227" r="4" fill="#78350f"/>
  <path d="M590,236 Q599,232 608,236" stroke="#92400e" stroke-width="2" fill="none"/>
  <!-- running arms -->
  <line x1="580" y1="258" x2="552" y2="245" stroke="#d97706" stroke-width="8" stroke-linecap="round"/>
  <line x1="618" y1="258" x2="640" y2="242" stroke="#d97706" stroke-width="8" stroke-linecap="round"/>
  <!-- scroll in hand -->
  <rect x="636" y="236" width="20" height="12" rx="4" fill="#fef9c3"/>
  <!-- Motion lines -->
  <line x1="625" y1="265" x2="648" y2="265" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="622" y1="278" x2="645" y2="278" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
  <!-- Jesus receiving the news - sad/sorrowful expression -->
  <!-- Jesus with disciples group -->
  <rect x="200" y="210" width="70" height="140" rx="14" fill="#ffffff"/>
  <circle cx="235" cy="195" r="33" fill="#fde68a"/>
  <ellipse cx="235" cy="183" rx="33" ry="19" fill="#92400e"/>
  <rect x="212" y="195" width="12" height="38" rx="5" fill="#92400e"/>
  <rect x="247" y="195" width="12" height="38" rx="5" fill="#92400e"/>
  <!-- Jesus sad/grieving expression -->
  <circle cx="225" cy="194" r="5" fill="#78350f"/>
  <circle cx="245" cy="194" r="5" fill="#78350f"/>
  <!-- closed/drooping eyes sad -->
  <path d="M220,188 Q225,183 230,188" stroke="#92400e" stroke-width="2.5" fill="none"/>
  <path d="M240,188 Q245,183 250,188" stroke="#92400e" stroke-width="2.5" fill="none"/>
  <path d="M220,205 Q235,198 250,205" stroke="#92400e" stroke-width="2.5" fill="none"/>
  <!-- tear drop -->
  <ellipse cx="224" cy="200" rx="2.5" ry="4" fill="#93c5fd" opacity="0.8"/>
  <!-- Jesus hand to his face / grief gesture -->
  <line x1="200" y1="235" x2="175" y2="220" stroke="#fde68a" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="170" cy="217" rx="13" ry="11" fill="#fde68a"/>
  <!-- Disciples around Jesus sorrowful -->
  <rect x="100" y="225" width="45" height="125" rx="10" fill="#4b5563"/>
  <circle cx="122" cy="213" r="21" fill="#b45309"/>
  <ellipse cx="122" cy="204" rx="21" ry="12" fill="#78350f"/>
  <circle cx="115" cy="212" r="4" fill="#78350f"/>
  <circle cx="129" cy="212" r="4" fill="#78350f"/>
  <path d="M113,222 Q122,218 131,222" stroke="#78350f" stroke-width="2" fill="none"/>
  <rect x="290" y="228" width="43" height="122" rx="10" fill="#374151"/>
  <circle cx="311" cy="216" r="21" fill="#92400e"/>
  <ellipse cx="311" cy="207" rx="21" ry="12" fill="#78350f"/>
  <circle cx="304" cy="215" r="4" fill="#78350f"/>
  <circle cx="318" cy="215" r="4" fill="#78350f"/>
  <path d="M302,225 Q311,221 320,225" stroke="#78350f" stroke-width="2" fill="none"/>
  <!-- Another disciple - hand to heart sorrowful -->
  <rect x="348" y="230" width="40" height="120" rx="9" fill="#6b7280"/>
  <circle cx="368" cy="218" r="20" fill="#d97706"/>
  <ellipse cx="368" cy="210" rx="20" ry="11" fill="#92400e"/>
  <circle cx="361" cy="217" r="4" fill="#78350f"/>
  <circle cx="375" cy="217" r="4" fill="#78350f"/>
  <!-- hand on heart -->
  <line x1="348" y1="252" x2="330" y2="240" stroke="#6b7280" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="328" cy="238" rx="12" ry="10" fill="#fde68a"/>
  <!-- Background trees silhouette -->
  <ellipse cx="700" cy="230" rx="60" ry="80" fill="#2e1065" opacity="0.7"/>
  <ellipse cx="730" cy="200" rx="40" ry="60" fill="#2e1065" opacity="0.5"/>
  <rect x="695" y="295" width="15" height="45" rx="3" fill="#1e1b4b"/>
  <ellipse cx="100" cy="228" rx="55" ry="75" fill="#2e1065" opacity="0.6"/>
  <rect x="95" y="295" width="12" height="45" rx="3" fill="#1e1b4b"/>
</svg>
