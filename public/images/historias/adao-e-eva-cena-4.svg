<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="adao4_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="adao4_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#65a30d"/>
      <stop offset="100%" stop-color="#365314"/>
    </linearGradient>
    <radialGradient id="adao4_shame" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#78350f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky (dimmer, after the fall) -->
  <rect width="800" height="380" fill="url(#adao4_sky)"/>
  <!-- Dark clouds showing changed atmosphere -->
  <ellipse cx="150" cy="70" rx="90" ry="35" fill="#d97706" opacity="0.6"/>
  <ellipse cx="190" cy="55" rx="65" ry="30" fill="#b45309" opacity="0.6"/>
  <ellipse cx="110" cy="62" rx="50" ry="25" fill="#92400e" opacity="0.5"/>
  <ellipse cx="620" cy="60" rx="95" ry="38" fill="#d97706" opacity="0.6"/>
  <ellipse cx="665" cy="45" rx="70" ry="32" fill="#b45309" opacity="0.6"/>
  <ellipse cx="580" cy="55" rx="52" ry="28" fill="#92400e" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="300" width="800" height="80" fill="url(#adao4_ground)"/>
  <ellipse cx="400" cy="300" rx="500" ry="28" fill="#84cc16"/>
  <!-- Some wilting/drooping plants (post-fall) -->
  <path d="M100 300 Q95 270 88 260 Q82 250 75 248" stroke="#65a30d" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M75 248 Q65 242 60 248 Q55 254 65 258" stroke="#65a30d" stroke-width="5" fill="none"/>
  <path d="M680 298 Q685 268 692 258 Q698 248 705 245" stroke="#65a30d" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M705 245 Q715 239 720 245 Q725 251 715 255" stroke="#65a30d" stroke-width="5" fill="none"/>
  <!-- Background trees (less vibrant) -->
  <rect x="55" y="175" width="16" height="125" fill="#78350f"/>
  <ellipse cx="63" cy="167" rx="55" ry="65" fill="#166534"/>
  <rect x="700" y="168" width="16" height="132" fill="#78350f"/>
  <ellipse cx="708" cy="160" rx="58" ry="68" fill="#166534"/>
  <!-- Shame glow -->
  <ellipse cx="400" cy="300" rx="200" ry="60" fill="url(#adao4_shame)"/>
  <!-- ADAO figure (left, hunched, ashamed) -->
  <!-- Leaves covering body -->
  <ellipse cx="270" cy="285" rx="28" ry="15" fill="#15803d"/>
  <!-- Body hunched -->
  <path d="M270 240 Q255 265 250 295" stroke="#d97706" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Arms crossed/covering face -->
  <path d="M258 255 Q240 248 230 255" stroke="#d97706" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M262 260 Q245 270 238 278" stroke="#d97706" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Head down -->
  <circle cx="270" cy="232" r="30" fill="#d97706"/>
  <!-- Hair -->
  <ellipse cx="270" cy="215" rx="30" ry="16" fill="#92400e"/>
  <!-- Sad face, head down -->
  <circle cx="260" cy="228" r="5" fill="#1c1917"/>
  <circle cx="280" cy="228" r="5" fill="#1c1917"/>
  <path d="M260 242 Q270 237 280 242" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tear on Adao -->
  <ellipse cx="260" cy="236" rx="3" ry="5" fill="#93c5fd" opacity="0.8"/>
  <!-- Legs -->
  <rect x="245" y="300" width="16" height="28" rx="6" fill="#b45309"/>
  <rect x="265" y="300" width="16" height="28" rx="6" fill="#b45309"/>
  <!-- EVA figure (right, sad, hands over face) -->
  <!-- Body -->
  <ellipse cx="530" cy="272" rx="26" ry="40" fill="#f59e0b"/>
  <!-- Leaf covering -->
  <ellipse cx="530" cy="285" rx="24" ry="13" fill="#15803d"/>
  <!-- Arms up covering face -->
  <path d="M506 260 Q490 245 485 238" stroke="#fbbf24" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M554 260 Q570 245 575 238" stroke="#fbbf24" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="530" cy="228" r="30" fill="#fbbf24"/>
  <!-- Long hair -->
  <ellipse cx="530" cy="210" rx="30" ry="18" fill="#92400e"/>
  <path d="M505 225 Q495 265 502 300" stroke="#92400e" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M555 225 Q565 265 558 300" stroke="#92400e" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Hands over face -->
  <ellipse cx="487" cy="236" rx="14" ry="10" fill="#fbbf24"/>
  <ellipse cx="573" cy="236" rx="14" ry="10" fill="#fbbf24"/>
  <!-- Visible sad eyes between hands -->
  <circle cx="522" cy="226" r="4" fill="#1c1917"/>
  <circle cx="538" cy="226" r="4" fill="#1c1917"/>
  <!-- Tears Eva -->
  <ellipse cx="520" cy="235" rx="3" ry="6" fill="#93c5fd" opacity="0.8"/>
  <ellipse cx="540" cy="234" rx="3" ry="6" fill="#93c5fd" opacity="0.8"/>
  <!-- Mouth sad -->
  <path d="M522 242 Q530 238 538 242" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Legs Eva -->
  <rect x="512" y="302" width="16" height="28" rx="6" fill="#d97706"/>
  <rect x="532" y="302" width="16" height="28" rx="6" fill="#d97706"/>
  <!-- Bitten/half eaten fruit on ground between them -->
  <circle cx="400" cy="308" r="15" fill="#dc2626"/>
  <ellipse cx="408" cy="303" rx="10" ry="8" fill="#fef9c3" opacity="0.7"/>
  <!-- Sad birds perched -->
  <ellipse cx="140" cy="165" rx="18" ry="12" fill="#475569"/>
  <circle cx="145" cy="158" r="8" fill="#334155"/>
  <ellipse cx="148" cy="162" rx="5" ry="3" fill="#fbbf24"/>
  <ellipse cx="640" cy="160" rx="18" ry="12" fill="#475569"/>
  <circle cx="645" cy="153" r="8" fill="#334155"/>
  <ellipse cx="648" cy="157" rx="5" ry="3" fill="#fbbf24"/>
  <!-- Wilted flower -->
  <path d="M400 360 Q400 340 400 330" stroke="#65a30d" stroke-width="4" fill="none"/>
  <path d="M400 330 Q390 315 382 318" stroke="#65a30d" stroke-width="3" fill="none"/>
  <circle cx="382" cy="318" r="6" fill="#a3e635" opacity="0.7"/>
  <path d="M400 330 Q408 313 418 316" stroke="#65a30d" stroke-width="3" fill="none"/>
  <circle cx="418" cy="316" r="6" fill="#a3e635" opacity="0.7"/>
</svg>
