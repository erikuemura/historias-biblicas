<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="lz1_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="lz1_room" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
    <linearGradient id="lz1_bed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  <!-- Background / exterior wall -->
  <rect width="800" height="380" fill="url(#lz1_bg)"/>
  <!-- Room interior -->
  <rect x="80" y="60" width="640" height="300" fill="#92400e"/>
  <rect x="80" y="60" width="640" height="15" fill="#b45309"/>
  <rect x="80" y="345" width="640" height="15" fill="#b45309"/>
  <!-- Floor -->
  <rect x="80" y="330" width="640" height="30" fill="#78350f"/>
  <!-- Arch window -->
  <rect x="660" y="80" width="60" height="100" rx="30 30 0 0" fill="#0ea5e9" opacity="0.5"/>
  <!-- Candle on table -->
  <rect x="400" y="270" width="10" height="50" rx="2" fill="#d97706"/>
  <ellipse cx="405" cy="265" rx="8" ry="15" fill="#fbbf24" opacity="0.9"/>
  <ellipse cx="405" cy="260" rx="5" ry="10" fill="#fef9c3"/>
  <!-- Bed with sick Lazarus -->
  <rect x="160" y="220" width="350" height="120" rx="12" fill="#b45309"/>
  <!-- mattress -->
  <rect x="165" y="215" width="340" height="40" rx="6" fill="url(#lz1_bed)"/>
  <!-- Lazarus lying sick - pale face -->
  <ellipse cx="455" cy="208" rx="30" ry="22" fill="#f1f5f9"/>
  <!-- pillow -->
  <ellipse cx="455" cy="208" rx="38" ry="25" fill="#e2e8f0"/>
  <!-- Lazarus body under cover -->
  <rect x="175" y="222" width="260" height="108" rx="8" fill="#f1f5f9"/>
  <!-- cover lines -->
  <line x1="175" y1="245" x2="435" y2="245" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="175" y1="265" x2="435" y2="265" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Lazarus head sick on pillow -->
  <circle cx="450" cy="210" r="28" fill="#fbbf24" opacity="0.7"/>
  <!-- sick/pale look -->
  <circle cx="441" cy="207" r="5" fill="#78350f" opacity="0.7"/>
  <circle cx="459" cy="207" r="5" fill="#78350f" opacity="0.7"/>
  <!-- closed/drooping eyes - sick -->
  <line x1="437" y1="207" x2="447" y2="207" stroke="#78350f" stroke-width="2.5"/>
  <line x1="455" y1="207" x2="465" y2="207" stroke="#78350f" stroke-width="2.5"/>
  <path d="M439,218 Q450,214 461,218" stroke="#92400e" stroke-width="2" fill="none"/>
  <!-- sweat on forehead -->
  <ellipse cx="448" cy="197" rx="3" ry="5" fill="#bfdbfe" opacity="0.7"/>
  <!-- Mary - blue - kneeling by bed -->
  <rect x="460" y="245" width="40" height="100" rx="9" fill="#3b82f6"/>
  <circle cx="480" cy="233" r="20" fill="#fde68a"/>
  <ellipse cx="480" cy="224" rx="20" ry="11" fill="#1d4ed8"/>
  <!-- crying -->
  <circle cx="473" cy="232" r="4" fill="#78350f"/>
  <circle cx="487" cy="232" r="4" fill="#78350f"/>
  <path d="M471,243 Q480,238 489,243" stroke="#78350f" stroke-width="2" fill="none"/>
  <ellipse cx="473" cy="238" rx="2" ry="3.5" fill="#93c5fd" opacity="0.8"/>
  <ellipse cx="487" cy="238" rx="2" ry="3.5" fill="#93c5fd" opacity="0.8"/>
  <!-- hand on Lazarus -->
  <line x1="460" y1="268" x2="435" y2="255" stroke="#fde68a" stroke-width="7" stroke-linecap="round"/>
  <!-- Marta - pink/red - standing behind -->
  <rect x="530" y="225" width="42" height="120" rx="9" fill="#ec4899"/>
  <circle cx="551" cy="213" r="21" fill="#fde68a"/>
  <ellipse cx="551" cy="204" rx="21" ry="12" fill="#be185d"/>
  <!-- very worried face -->
  <circle cx="543" cy="212" r="4" fill="#78350f"/>
  <circle cx="559" cy="212" r="4" fill="#78350f"/>
  <path d="M541,205 Q551,200 561,205" stroke="#92400e" stroke-width="2.5" fill="none"/>
  <path d="M541,224 Q551,220 561,224" stroke="#92400e" stroke-width="2" fill="none"/>
  <!-- hand to mouth worried -->
  <line x1="530" y1="255" x2="508" y2="240" stroke="#ec4899" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="504" cy="237" rx="12" ry="10" fill="#fde68a"/>
  <!-- Oil lamp on shelf -->
  <rect x="105" y="145" width="50" height="8" rx="2" fill="#92400e"/>
  <ellipse cx="125" cy="138" rx="15" ry="10" fill="#b45309"/>
  <ellipse cx="125" cy="135" rx="8" ry="18" fill="#fbbf24" opacity="0.8"/>
  <ellipse cx="125" cy="130" rx="5" ry="12" fill="#fef9c3"/>
  <!-- Another character in doorway praying/worried -->
  <rect x="90" y="210" width="35" height="110" rx="8" fill="#7c3aed"/>
  <circle cx="107" cy="199" r="18" fill="#d97706"/>
  <ellipse cx="107" cy="191" rx="18" ry="10" fill="#6d28d9"/>
  <!-- praying hands -->
  <line x1="90" y1="240" x2="72" y2="228" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
  <line x1="125" y1="240" x2="118" y2="222" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="115" cy="220" rx="12" ry="10" fill="#fde68a"/>
</svg>
