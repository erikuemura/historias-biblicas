<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyDG3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffcc80"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyDG3)"/>
  <!-- Tent interior / throne room -->
  <rect x="0" y="0" width="800" height="380" fill="#fff8e1"/>
  <path d="M0,0 Q400,30 800,0 L800,60 Q400,90 0,60Z" fill="#ef6c00" opacity="0.3"/>
  <!-- Wall hangings / banners -->
  <rect x="60" y="30" width="50" height="90" rx="4" fill="#e53935" opacity="0.6"/>
  <rect x="690" y="30" width="50" height="90" rx="4" fill="#e53935" opacity="0.6"/>
  <polygon points="60,30 85,50 110,30" fill="#ffd54f" opacity="0.7"/>
  <polygon points="690,30 715,50 740,30" fill="#ffd54f" opacity="0.7"/>
  <!-- Floor -->
  <rect x="0" y="328" width="800" height="52" fill="#f5deb3"/>
  <!-- KING SAUL on throne (center) -->
  <g transform="translate(310,95)">
    <!-- Throne -->
    <rect x="-15" y="62" width="110" height="195" rx="8" fill="#ff8f00" opacity="0.7"/>
    <rect x="-8" y="68" width="96" height="180" rx="6" fill="#ffe082"/>
    <rect x="-15" y="55" width="110" height="20" rx="5" fill="#ffd54f"/>
    <!-- King body -->
    <ellipse cx="40" cy="228" rx="40" ry="9" fill="#e65100" opacity="0.2"/>
    <path d="M4,68 Q2,186 0,218 Q40,228 80,218 Q76,186 74,68 Q58,50 40,47 Q22,50 4,68Z" fill="#c62828"/>
    <path d="M3,158 Q40,168 78,158 Q76,192 40,198 Q4,192 3,158Z" fill="#b71c1c" opacity="0.4"/>
    <rect x="20" y="208" width="12" height="36" rx="5" fill="#c62828" opacity="0.7"/>
    <rect x="42" y="208" width="12" height="36" rx="5" fill="#b71c1c" opacity="0.7"/>
    <!-- Crown -->
    <rect x="14" y="4" width="52" height="16" rx="3" fill="#ffd54f"/>
    <polygon points="14,4 24,4 19,-10" fill="#ffd54f"/>
    <polygon points="35,4 40,4 37,-12" fill="#ffd54f"/>
    <polygon points="56,4 66,4 61,-10" fill="#ffd54f"/>
    <circle cx="19" cy="4" r="4" fill="#e53935"/>
    <circle cx="37" cy="4" r="4" fill="#4caf50"/>
    <circle cx="61" cy="4" r="4" fill="#1565c0"/>
    <!-- Head -->
    <circle cx="40" cy="34" r="28" fill="#e8a87a"/>
    <path d="M15,22 Q40,6 65,22 Q63,12 40,8 Q17,12 15,22Z" fill="#4e342e"/>
    <circle cx="28" cy="26" r="4.5" fill="#4e342e"/>
    <circle cx="52" cy="26" r="4.5" fill="#4e342e"/>
    <circle cx="29" cy="25" r="1.8" fill="white"/>
    <circle cx="53" cy="25" r="1.8" fill="white"/>
    <!-- Thoughtful expression -->
    <path d="M26,42 Q40,50 54,42" stroke="#a1887f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M22,20 Q28,15 34,20" stroke="#4e342e" stroke-width="2" fill="none"/>
    <path d="M46,20 Q52,15 58,20" stroke="#4e342e" stroke-width="2" fill="none"/>
    <circle cx="18" cy="35" r="9" fill="#ef9a9a" opacity="0.35"/>
    <circle cx="62" cy="35" r="9" fill="#ef9a9a" opacity="0.35"/>
    <rect x="32" y="60" width="16" height="14" rx="4" fill="#e8a87a"/>
    <!-- Scepter in one hand -->
    <path d="M74,75 Q100,68 110,55" stroke="#c62828" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="111" cy="54" r="11" fill="#e8a87a"/>
    <rect x="118" y="10" width="8" height="50" rx="4" fill="#ffd54f"/>
    <circle cx="122" cy="8" r="8" fill="#e53935"/>
    <!-- Other hand gesturing -->
    <path d="M4,75 Q-18,90 -22,110" stroke="#c62828" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-22" cy="112" r="11" fill="#e8a87a"/>
  </g>
  <!-- DAVID (small, young, standing before king) -->
  <g transform="translate(130,190)">
    <ellipse cx="38" cy="155" rx="32" ry="8" fill="#558b2f" opacity="0.2"/>
    <!-- Simple shepherd tunic -->
    <path d="M7,42 Q5,120 3,148 Q38,156 73,148 Q70,120 68,42 Q54,28 38,25 Q22,28 7,42Z" fill="#a5d6a7"/>
    <rect x="20" y="142" width="10" height="28" rx="4" fill="#81c784" opacity="0.7"/>
    <rect x="40" y="142" width="10" height="28" rx="4" fill="#66bb6a" opacity="0.7"/>
    <!-- Head -->
    <circle cx="38" cy="18" r="22" fill="#ffccbc"/>
    <path d="M18,10 Q38,-3 58,10 Q56,2 38,-1 Q20,2 18,10Z" fill="#6d4c41"/>
    <circle cx="28" cy="14" r="3.5" fill="#5d4037"/>
    <circle cx="48" cy="14" r="3.5" fill="#5d4037"/>
    <circle cx="29" cy="13" r="1.3" fill="white"/>
    <circle cx="49" cy="13" r="1.3" fill="white"/>
    <!-- Brave confident expression -->
    <path d="M26,26 Q38,34 50,26" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="7" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="56" cy="20" r="7" fill="#ef9a9a" opacity="0.4"/>
    <rect x="30" y="38" width="14" height="10" rx="3" fill="#ffccbc"/>
    <!-- Arms gesturing bravely -->
    <path d="M7,48 Q-12,64 -14,88" stroke="#a5d6a7" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="-13" cy="90" r="10" fill="#ffccbc"/>
    <path d="M68,48 Q86,62 88,86" stroke="#a5d6a7" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="88" cy="88" r="10" fill="#ffccbc"/>
    <!-- Shepherd staff beside him -->
    <rect x="85" y="24" width="8" height="148" rx="4" fill="#8d6e63"/>
    <path d="M85,24 Q78,10 88,8 Q98,10 92,24" fill="#8d6e63"/>
  </g>
  <!-- Guards flanking king -->
  <g transform="translate(225,175)" opacity="0.7">
    <path d="M2,38 L0,108 L26,108 L28,38 Q14,28 12,26 Q6,28 2,38Z" fill="#78909c"/>
    <circle cx="13" cy="16" r="16" fill="#8d6e63"/>
    <path d="M-1,8 Q13,-4 27,8 Q25,2 13,-1 Q1,2 -1,8Z" fill="#546e7a"/>
    <!-- Spear -->
    <rect x="26" y="-15" width="6" height="130" rx="3" fill="#a1887f"/>
    <polygon points="26,-15 32,-15 29,-35" fill="#78909c"/>
  </g>
  <g transform="translate(545,175)" opacity="0.7">
    <path d="M2,38 L0,108 L26,108 L28,38 Q14,28 12,26 Q6,28 2,38Z" fill="#78909c"/>
    <circle cx="13" cy="16" r="16" fill="#8d6e63"/>
    <path d="M-1,8 Q13,-4 27,8 Q25,2 13,-1 Q1,2 -1,8Z" fill="#546e7a"/>
    <rect x="-2" y="-15" width="6" height="130" rx="3" fill="#a1887f"/>
    <polygon points="-2,-15 4,-15 1,-35" fill="#78909c"/>
  </g>
</svg>
