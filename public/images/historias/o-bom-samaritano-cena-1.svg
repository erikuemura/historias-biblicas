<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bs1_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E8F8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bs1_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8B060;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A89040;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="bs1_sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE870;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFB030;stop-opacity:0.8"/>
    </radialGradient>
  </defs>
  <!-- Sky - warm afternoon -->
  <rect width="800" height="380" fill="url(#bs1_sky)"/>
  <!-- Sun warm afternoon -->
  <circle cx="660" cy="75" r="48" fill="url(#bs1_sun)"/>
  <circle cx="660" cy="75" r="65" fill="#FFE040" opacity="0.2"/>
  <!-- Clouds -->
  <ellipse cx="180" cy="65" rx="80" ry="28" fill="white" opacity="0.8"/>
  <ellipse cx="240" cy="52" rx="60" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="480" cy="55" rx="70" ry="25" fill="white" opacity="0.7"/>
  <!-- Jerusalem skyline in background -->
  <!-- City walls -->
  <rect x="400" y="125" width="400" height="160" fill="#E0C880" opacity="0.6"/>
  <!-- Towers -->
  <rect x="420" y="100" width="45" height="185" fill="#D8C070" opacity="0.7" rx="2"/>
  <rect x="500" y="110" width="50" height="175" fill="#E0C880" opacity="0.7" rx="2"/>
  <rect x="580" y="95" width="55" height="190" fill="#D8C070" opacity="0.65" rx="2"/>
  <rect x="660" y="115" width="45" height="170" fill="#E0C880" opacity="0.7" rx="2"/>
  <rect x="730" y="105" width="50" height="180" fill="#D8C070" opacity="0.65" rx="2"/>
  <!-- Battlements on towers -->
  <rect x="420" y="98" width="8" height="10" fill="#D8C070" opacity="0.8"/>
  <rect x="432" y="98" width="8" height="10" fill="#D8C070" opacity="0.8"/>
  <rect x="444" y="98" width="8" height="10" fill="#D8C070" opacity="0.8"/>
  <rect x="580" y="92" width="9" height="11" fill="#D8C070" opacity="0.8"/>
  <rect x="594" y="92" width="9" height="11" fill="#D8C070" opacity="0.8"/>
  <rect x="608" y="92" width="9" height="11" fill="#D8C070" opacity="0.8"/>
  <!-- Ground -->
  <rect x="0" y="290" width="800" height="90" fill="url(#bs1_ground)"/>
  <!-- Road stones -->
  <ellipse cx="200" cy="305" rx="28" ry="9" fill="#B8A050" opacity="0.5"/>
  <ellipse cx="500" cy="302" rx="32" ry="10" fill="#B8A050" opacity="0.4"/>
  <!-- BIG TREE - shade scene -->
  <rect x="100" y="185" width="18" height="120" fill="#7A5030"/>
  <circle cx="109" cy="163" r="55" fill="#5A8030"/>
  <circle cx="82" cy="185" r="35" fill="#4A7020"/>
  <circle cx="138" cy="180" r="38" fill="#4A7020"/>
  <circle cx="109" cy="135" r="38" fill="#6A9040"/>
  <!-- Root at base -->
  <path d="M100,305 Q82,295 68,305" stroke="#7A5030" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M118,305 Q136,296 150,305" stroke="#7A5030" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- JESUS - standing under tree, speaking with scholar -->
  <circle cx="270" cy="195" r="24" fill="#F5D090"/>
  <ellipse cx="270" cy="178" rx="24" ry="13" fill="#8B5020"/>
  <path d="M257,178 Q243,200 247,217" stroke="#8B5020" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M283,178 Q297,200 293,217" stroke="#8B5020" stroke-width="9" fill="none" stroke-linecap="round"/>
  <ellipse cx="270" cy="216" rx="15" ry="9" fill="#9A6030" opacity="0.8"/>
  <polygon points="246,222 294,222 302,295 238,295" fill="#F8F0D8"/>
  <polygon points="238,229 302,229 310,295 230,295" fill="#4870C0" opacity="0.65"/>
  <!-- Jesus arm gesturing, telling parable -->
  <line x1="294" y1="234" x2="330" y2="225" stroke="#F5D090" stroke-width="11" stroke-linecap="round"/>
  <line x1="246" y1="234" x2="222" y2="240" stroke="#F5D090" stroke-width="11" stroke-linecap="round"/>
  <circle cx="333" cy="223" r="10" fill="#F5D090"/>
  <!-- Jesus expression - teaching with wisdom -->
  <ellipse cx="262" cy="194" rx="4.5" ry="5.5" fill="#5A3820"/>
  <ellipse cx="278" cy="194" rx="4.5" ry="5.5" fill="#5A3820"/>
  <circle cx="261" cy="193" r="1.8" fill="white" opacity="0.6"/>
  <circle cx="277" cy="193" r="1.8" fill="white" opacity="0.6"/>
  <path d="M260,206 Q270,214 280,206" stroke="#8B4020" stroke-width="2.5" fill="none"/>
  <!-- RELIGIOUS SCHOLAR - standing, listening with scroll -->
  <circle cx="460" cy="200" r="22" fill="#F0B880"/>
  <ellipse cx="460" cy="184" rx="22" ry="12" fill="#7A5020"/>
  <!-- Scholar headdress - religious leader -->
  <ellipse cx="460" cy="181" rx="26" ry="16" fill="#D8C080" opacity="0.8"/>
  <rect x="434" y="181" width="52" height="8" fill="#C0A060"/>
  <!-- Fine religious robe -->
  <polygon points="438,222 482,222 488,295 432,295" fill="#F0E0A0"/>
  <!-- Prayer tassels at corners -->
  <line x1="438" y1="270" x2="428" y2="290" stroke="#4A60A0" stroke-width="3"/>
  <line x1="482" y1="270" x2="492" y2="290" stroke="#4A60A0" stroke-width="3"/>
  <!-- Scholar holding scroll - the law -->
  <line x1="482" y1="232" x2="510" y2="225" stroke="#F0B880" stroke-width="10" stroke-linecap="round"/>
  <!-- Scroll in hand -->
  <rect x="505" y="215" width="40" height="22" fill="#F5E8C0" rx="3"/>
  <ellipse cx="505" cy="226" rx="7" ry="11" fill="#E0D0A0"/>
  <ellipse cx="545" cy="226" rx="7" ry="11" fill="#E0D0A0"/>
  <line x1="517" y1="215" x2="517" y2="237" stroke="#C0A050" stroke-width="1.5"/>
  <line x1="530" y1="215" x2="530" y2="237" stroke="#C0A050" stroke-width="1.5"/>
  <line x1="438" y1="232" x2="415" y2="242" stroke="#F0B880" stroke-width="10" stroke-linecap="round"/>
  <!-- Scholar attentive but slightly skeptical face -->
  <ellipse cx="452" cy="199" rx="4" ry="5" fill="#5A3820"/>
  <ellipse cx="468" cy="199" rx="4" ry="5" fill="#5A3820"/>
  <circle cx="451" cy="198" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="467" cy="198" r="1.5" fill="white" opacity="0.5"/>
  <!-- Slightly furrowed - questioning -->
  <path d="M448,191 Q452,187 456,191" stroke="#5A3820" stroke-width="2" fill="none"/>
  <path d="M464,191 Q468,187 472,191" stroke="#5A3820" stroke-width="2" fill="none"/>
  <!-- Mouth slightly open - engaged in dialogue -->
  <path d="M451,211 Q460,216 469,211" stroke="#8B5030" stroke-width="2" fill="none"/>
  <!-- Speech bubble from scholar -->
  <ellipse cx="530" cy="168" rx="55" ry="22" fill="#F5E8C0" opacity="0.7"/>
  <text x="530" y="173" font-family="Georgia, serif" font-size="11" fill="#8B4020" text-anchor="middle">Quem é meu próximo?</text>
  <!-- Title -->
  <rect x="0" y="345" width="800" height="35" fill="#C05820" opacity="0.65"/>
  <text x="400" y="368" font-family="Georgia, serif" font-size="17" fill="white" text-anchor="middle" font-weight="bold">O Bom Samaritano — Cena 1: A Pergunta</text>
</svg>
