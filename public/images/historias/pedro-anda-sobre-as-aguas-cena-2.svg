<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="pa2_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="pa2_sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>
    <radialGradient id="pa2_jesusGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#fde047;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fde047;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="380" fill="url(#pa2_sky)"/>
  <!-- Storm clouds -->
  <ellipse cx="120" cy="55" rx="150" ry="65" fill="#1e293b" opacity="0.9"/>
  <ellipse cx="400" cy="48" rx="170" ry="60" fill="#0c4a6e" opacity="0.85"/>
  <ellipse cx="650" cy="58" rx="160" ry="62" fill="#1e293b" opacity="0.8"/>
  <!-- Wind lines -->
  <path d="M0,120 Q200,100 400,120 Q600,140 800,115" stroke="#93c5fd" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M0,145 Q180,130 360,148 Q540,165 800,138" stroke="#93c5fd" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Sea stormy -->
  <rect x="0" y="215" width="800" height="165" fill="url(#pa2_sea)"/>
  <path d="M0,225 Q50,200 100,228 Q150,258 200,222 Q250,190 300,228 Q350,258 400,220 Q450,188 500,228 Q550,258 600,220 Q650,188 700,228 Q750,258 800,220" fill="#0ea5e9" opacity="0.6"/>
  <path d="M0,255 Q70,235 140,262 Q210,288 280,252 Q350,220 420,258 Q490,288 560,250 Q630,218 700,258 Q750,278 800,255" fill="#0284c7" opacity="0.4"/>
  <!-- White foam -->
  <ellipse cx="100" cy="228" rx="28" ry="7" fill="white" opacity="0.3"/>
  <ellipse cx="300" cy="230" rx="30" ry="7" fill="white" opacity="0.3"/>
  <ellipse cx="500" cy="228" rx="28" ry="7" fill="white" opacity="0.3"/>
  <ellipse cx="700" cy="230" rx="30" ry="7" fill="white" opacity="0.3"/>
  <!-- Jesus glowing figure approaching on water - in middle distance -->
  <!-- Large glow effect -->
  <circle cx="220" cy="190" r="120" fill="url(#pa2_jesusGlow)"/>
  <!-- Jesus silhouette walking on water, robes flowing in wind -->
  <rect x="188" y="185" width="70" height="130" rx="14" fill="#ffffff" opacity="0.95"/>
  <!-- Robe flowing in wind to right -->
  <polygon points="258,190 320,220 310,310 258,310" fill="#f8fafc" opacity="0.7"/>
  <circle cx="223" cy="170" r="32" fill="#fde68a"/>
  <ellipse cx="223" cy="158" rx="32" ry="18" fill="#92400e"/>
  <rect x="200" y="170" width="12" height="37" rx="5" fill="#92400e"/>
  <rect x="235" y="170" width="12" height="37" rx="5" fill="#92400e"/>
  <!-- Jesus calm face - serene amid storm -->
  <circle cx="213" cy="168" r="5" fill="#78350f"/>
  <circle cx="233" cy="168" r="5" fill="#78350f"/>
  <path d="M209,180 Q223,191 237,180" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- Jesus feet on water - ripples -->
  <ellipse cx="210" cy="320" rx="22" ry="9" fill="#7dd3fc" opacity="0.5"/>
  <ellipse cx="245" cy="323" rx="22" ry="9" fill="#7dd3fc" opacity="0.5"/>
  <!-- Wider ripples -->
  <ellipse cx="223" cy="322" rx="40" ry="14" fill="#7dd3fc" opacity="0.3"/>
  <ellipse cx="223" cy="322" rx="60" ry="20" fill="#7dd3fc" opacity="0.2"/>
  <!-- Glow rays from Jesus -->
  <line x1="223" y1="140" x2="223" y2="110" stroke="#fef9c3" stroke-width="2" opacity="0.5"/>
  <line x1="168" y1="155" x2="148" y2="140" stroke="#fef9c3" stroke-width="1.5" opacity="0.4"/>
  <line x1="278" y1="155" x2="298" y2="140" stroke="#fef9c3" stroke-width="1.5" opacity="0.4"/>
  <!-- Boat in distance right side - disciples seeing the figure -->
  <ellipse cx="590" cy="258" rx="140" ry="35" fill="#92400e"/>
  <rect x="462" y="228" width="256" height="38" rx="10" fill="#78350f"/>
  <!-- Mast -->
  <rect x="585" y="155" width="8" height="80" rx="3" fill="#92400e"/>
  <polygon points="593,162 593,228 650,205" fill="#e2e8f0" opacity="0.55"/>
  <!-- Disciples in boat - pointing at Jesus in disbelief -->
  <!-- Multiple heads -->
  <circle cx="510" cy="222" r="14" fill="#fde68a"/>
  <ellipse cx="510" cy="215" rx="14" ry="8" fill="#374151"/>
  <ellipse cx="510" cy="222" rx="4" ry="5" fill="#78350f"/>
  <!-- pointing -->
  <line x1="510" y1="236" x2="480" y2="225" stroke="#374151" stroke-width="6" stroke-linecap="round"/>
  <circle cx="540" cy="222" r="14" fill="#fbbf24"/>
  <ellipse cx="540" cy="215" rx="14" ry="8" fill="#1d4ed8"/>
  <circle cx="570" cy="222" r="14" fill="#fde68a"/>
  <ellipse cx="570" cy="215" rx="14" ry="8" fill="#78350f"/>
  <circle cx="640" cy="222" r="14" fill="#d97706"/>
  <ellipse cx="640" cy="215" rx="14" ry="8" fill="#92400e"/>
  <circle cx="668" cy="222" r="13" fill="#fbbf24"/>
  <ellipse cx="668" cy="215" rx="13" ry="7.5" fill="#374151"/>
  <!-- Peter specifically looking - will go out -->
  <circle cx="490" cy="218" r="16" fill="#fbbf24"/>
  <ellipse cx="490" cy="210" rx="16" ry="9" fill="#92400e"/>
  <!-- bigger eyes - fascinated -->
  <ellipse cx="484" cy="218" rx="5" ry="6" fill="white" opacity="0.8"/>
  <ellipse cx="496" cy="218" rx="5" ry="6" fill="white" opacity="0.8"/>
  <circle cx="485" cy="218" r="3" fill="#451a03"/>
  <circle cx="497" cy="218" r="3" fill="#451a03"/>
</svg>
