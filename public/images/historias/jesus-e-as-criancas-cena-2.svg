<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="jc2_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="jc2_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#jc2_sky)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="50" rx="75" ry="30" fill="white" opacity="0.85"/>
  <ellipse cx="680" cy="45" rx="80" ry="32" fill="white" opacity="0.8"/>
  <!-- Ground -->
  <rect x="0" y="300" width="800" height="80" fill="url(#jc2_ground)"/>
  <!-- Disciples group - looking stern/serious, blocking -->
  <!-- Disciple 1 center - large authoritative figure -->
  <rect x="350" y="185" width="55" height="130" rx="12" fill="#374151"/>
  <circle cx="377" cy="172" r="25" fill="#b45309"/>
  <ellipse cx="377" cy="161" rx="25" ry="14" fill="#78350f"/>
  <!-- stern face with furrowed brow -->
  <path d="M366,168 Q377,163 388,168" stroke="#78350f" stroke-width="3" fill="none"/>
  <circle cx="368" cy="171" r="4.5" fill="#451a03"/>
  <circle cx="386" cy="171" r="4.5" fill="#451a03"/>
  <path d="M367,184 Q377,180 387,184" stroke="#451a03" stroke-width="2" fill="none"/>
  <!-- hands on hips or gesturing stop -->
  <line x1="350" y1="218" x2="318" y2="205" stroke="#b45309" stroke-width="10" stroke-linecap="round"/>
  <line x1="405" y1="218" x2="435" y2="205" stroke="#374151" stroke-width="10" stroke-linecap="round"/>
  <!-- Open palm stop gesture -->
  <ellipse cx="312" cy="202" rx="12" ry="16" fill="#fde68a"/>
  <ellipse cx="440" cy="202" rx="12" ry="16" fill="#fde68a"/>
  <!-- Disciple 2 - left -->
  <rect x="260" y="200" width="48" height="125" rx="10" fill="#4b5563"/>
  <circle cx="284" cy="188" r="22" fill="#d97706"/>
  <ellipse cx="284" cy="178" rx="22" ry="12" fill="#92400e"/>
  <path d="M274,183 Q284,178 294,183" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <circle cx="276" cy="187" r="4" fill="#451a03"/>
  <circle cx="292" cy="187" r="4" fill="#451a03"/>
  <path d="M275,199 Q284,195 293,199" stroke="#451a03" stroke-width="2" fill="none"/>
  <line x1="260" y1="232" x2="228" y2="220" stroke="#4b5563" stroke-width="9" stroke-linecap="round"/>
  <!-- Disciple 3 - right -->
  <rect x="450" y="198" width="48" height="127" rx="10" fill="#6b7280"/>
  <circle cx="474" cy="186" r="22" fill="#a16207"/>
  <ellipse cx="474" cy="176" rx="22" ry="12" fill="#78350f"/>
  <path d="M464,181 Q474,176 484,181" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <circle cx="466" cy="185" r="4" fill="#451a03"/>
  <circle cx="482" cy="185" r="4" fill="#451a03"/>
  <path d="M465,197 Q474,193 483,197" stroke="#451a03" stroke-width="2" fill="none"/>
  <line x1="498" y1="230" x2="525" y2="218" stroke="#6b7280" stroke-width="9" stroke-linecap="round"/>
  <!-- Parents with children on left - surprised/worried expressions -->
  <!-- Parent 1 -->
  <rect x="65" y="225" width="44" height="100" rx="10" fill="#3b82f6"/>
  <circle cx="87" cy="213" r="20" fill="#fde68a"/>
  <ellipse cx="87" cy="204" rx="20" ry="11" fill="#1d4ed8"/>
  <!-- surprised O mouth -->
  <circle cx="80" cy="212" r="3.5" fill="#78350f"/>
  <circle cx="94" cy="212" r="3.5" fill="#78350f"/>
  <ellipse cx="87" cy="222" rx="5" ry="6" fill="#92400e"/>
  <!-- Child beside, also surprised -->
  <rect x="112" y="258" width="28" height="55" rx="8" fill="#fde047"/>
  <circle cx="126" cy="248" r="14" fill="#fbbf24"/>
  <ellipse cx="126" cy="240" rx="14" ry="8" fill="#92400e"/>
  <ellipse cx="126" cy="257" rx="4" ry="5" fill="#92400e"/>
  <!-- Parent 2 -->
  <rect x="148" y="228" width="44" height="97" rx="10" fill="#dc2626"/>
  <circle cx="170" cy="216" r="20" fill="#d97706"/>
  <ellipse cx="170" cy="207" rx="20" ry="11" fill="#78350f"/>
  <circle cx="163" cy="215" r="3.5" fill="#78350f"/>
  <circle cx="177" cy="215" r="3.5" fill="#78350f"/>
  <ellipse cx="170" cy="225" rx="4" ry="5" fill="#92400e"/>
  <!-- raised hands surprised gesture -->
  <line x1="148" y1="250" x2="125" y2="235" stroke="#dc2626" stroke-width="8" stroke-linecap="round"/>
  <line x1="192" y1="250" x2="210" y2="235" stroke="#dc2626" stroke-width="8" stroke-linecap="round"/>
  <!-- Speech/thought bubbles - exclamation from disciples -->
  <ellipse cx="377" cy="135" rx="35" ry="25" fill="white" opacity="0.9"/>
  <circle cx="365" cy="158" r="5" fill="white" opacity="0.7"/>
  <circle cx="360" cy="168" r="3" fill="white" opacity="0.5"/>
  <line x1="380" y1="125" x2="377" y2="118" stroke="#ef4444" stroke-width="3"/>
  <line x1="377" y1="118" x2="377" y2="110" stroke="#ef4444" stroke-width="3"/>
  <circle cx="377" cy="106" r="4" fill="#ef4444"/>
  <!-- Jesus in background watching, concerned -->
  <rect x="640" y="210" width="55" height="110" rx="12" fill="#ffffff"/>
  <circle cx="667" cy="197" r="26" fill="#fde68a"/>
  <ellipse cx="667" cy="187" rx="26" ry="14" fill="#92400e"/>
  <rect x="648" y="180" width="10" height="28" rx="4" fill="#92400e"/>
  <rect x="677" y="180" width="10" height="28" rx="4" fill="#92400e"/>
  <circle cx="660" cy="196" r="4" fill="#78350f"/>
  <circle cx="674" cy="196" r="4" fill="#78350f"/>
  <!-- Jesus concerned expression -->
  <path d="M658,206 Q667,210 676,206" stroke="#92400e" stroke-width="2.5" fill="none"/>
</svg>
