<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="samuel_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="samuel_glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#fde68a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="samuel_lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="1"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Night sky background -->
  <rect width="800" height="400" fill="url(#samuel_bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="25" r="2" fill="white" opacity="0.8"/>
  <circle cx="120" cy="15" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="200" cy="35" r="2" fill="white" opacity="0.9"/>
  <circle cx="320" cy="10" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="580" cy="20" r="2" fill="white" opacity="0.8"/>
  <circle cx="680" cy="12" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="750" cy="30" r="2" fill="white" opacity="0.9"/>
  <circle cx="720" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="90" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="640" cy="45" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="450" cy="18" r="2" fill="white" opacity="0.7"/>
  <circle cx="170" cy="55" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="530" cy="40" r="1.5" fill="white" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="680" cy="60" r="35" fill="#fef9c3"/>
  <circle cx="695" cy="52" r="30" fill="#1e3a8a"/><!-- crescent effect -->
  <!-- Temple exterior walls -->
  <rect x="80" y="160" width="640" height="220" rx="5" fill="#44403c"/>
  <rect x="80" y="155" width="640" height="15" rx="3" fill="#78716c"/>
  <!-- Columns -->
  <rect x="110" y="160" width="22" height="215" rx="4" fill="#57534e"/>
  <rect x="155" y="160" width="22" height="215" rx="4" fill="#78716c"/>
  <rect x="200" y="160" width="22" height="215" rx="4" fill="#57534e"/>
  <rect x="580" y="160" width="22" height="215" rx="4" fill="#57534e"/>
  <rect x="625" y="160" width="22" height="215" rx="4" fill="#78716c"/>
  <rect x="670" y="160" width="22" height="215" rx="4" fill="#57534e"/>
  <!-- Temple roof -->
  <polygon points="70,160 400,100 730,160" fill="#57534e"/>
  <polygon points="70,160 400,112 730,160" fill="#78716c" opacity="0.5"/>
  <!-- Interior -->
  <rect x="100" y="175" width="600" height="205" fill="#2d2d2d"/>
  <!-- Divine light from above (center) -->
  <ellipse cx="400" cy="175" rx="180" ry="120" fill="url(#samuel_glow)"/>
  <!-- Light rays -->
  <polygon points="380,175 360,320 370,320" fill="#fef9c3" opacity="0.15"/>
  <polygon points="400,175 390,330 410,330" fill="#fef9c3" opacity="0.2"/>
  <polygon points="420,175 430,320 440,320" fill="#fef9c3" opacity="0.15"/>
  <!-- Temple floor -->
  <rect x="100" y="340" width="600" height="40" fill="#57534e"/>
  <!-- Altar/table -->
  <rect x="340" y="280" width="120" height="60" rx="4" fill="#78350f"/>
  <rect x="330" y="276" width="140" height="12" rx="3" fill="#92400e"/>
  <!-- SAMUEL sleeping on mat -->
  <!-- Mat -->
  <ellipse cx="400" cy="358" rx="90" ry="18" fill="#854d0e"/>
  <!-- Body lying down -->
  <ellipse cx="400" cy="348" rx="80" ry="15" fill="#b45309"/>
  <!-- Samuel's body (lying) -->
  <ellipse cx="390" cy="340" rx="55" ry="13" fill="#d97706"/>
  <!-- Head -->
  <circle cx="455" cy="337" r="22" fill="#fbbf24"/>
  <!-- Hair -->
  <ellipse cx="455" cy="323" rx="22" ry="13" fill="#92400e"/>
  <!-- Sleeping face (peaceful) -->
  <path d="M446" cy="336" cx="446" cy="336" fill="none"/>
  <path d="M446 336 Q455 340 464 336" stroke="#1c1917" stroke-width="2" fill="none"/>
  <!-- Closed eyes -->
  <path d="M449 330 Q455 333 461 330" stroke="#1c1917" stroke-width="2.5" fill="none"/>
  <!-- Blanket/robe -->
  <ellipse cx="380" cy="348" rx="68" ry="13" fill="#1d4ed8" opacity="0.7"/>
  <!-- LAMPLIGHT (oil lamp) -->
  <!-- Lamp stand -->
  <rect x="528" y="295" width="8" height="55" fill="#b45309"/>
  <ellipse cx="532" cy="296" rx="22" ry="8" fill="#92400e"/>
  <!-- Oil lamp -->
  <ellipse cx="532" cy="284" rx="18" ry="10" fill="#d97706"/>
  <ellipse cx="532" cy="278" rx="8" ry="6" fill="#b45309"/>
  <!-- Flame -->
  <ellipse cx="532" cy="278" rx="60" ry="60" fill="url(#samuel_lamp)"/>
  <path d="M528 278 Q532 258 536 278" fill="#fde047"/>
  <path d="M530 278 Q532 262 534 278" fill="#fbbf24"/>
  <path d="M531 278 Q532 265 533 278" fill="white"/>
  <!-- Sound waves / voice of God (symbolic waves) -->
  <path d="M400 200 Q360 210 340 230" stroke="#fef9c3" stroke-width="3" fill="none" opacity="0.5" stroke-dasharray="8,5"/>
  <path d="M400 200 Q360 220 330 248" stroke="#fef9c3" stroke-width="2.5" fill="none" opacity="0.4" stroke-dasharray="8,5"/>
  <path d="M400 200 Q440 210 460 230" stroke="#fef9c3" stroke-width="3" fill="none" opacity="0.5" stroke-dasharray="8,5"/>
</svg>
