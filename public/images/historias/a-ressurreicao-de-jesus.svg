<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="skyR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a148c"/>
      <stop offset="25%" stop-color="#e65100"/>
      <stop offset="55%" stop-color="#ff8f00"/>
      <stop offset="80%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </linearGradient>
    <linearGradient id="groundR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8bc34a"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
    <radialGradient id="tombLight" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffe082" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffb300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="60%" stop-color="#ffe082" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyR)"/>

  <!-- Sunrise glow -->
  <ellipse cx="400" cy="250" r="320" fill="url(#sunR)" opacity="0.5"/>
  <!-- Sun just peeking above hill -->
  <circle cx="400" cy="380" r="90" fill="#ffe082" opacity="0.6"/>
  <circle cx="400" cy="380" r="62" fill="#fff9c4" opacity="0.75"/>
  <!-- Sun rays -->
  <g stroke="#ffe082" stroke-width="2.5" opacity="0.45" stroke-linecap="round">
    <line x1="400" y1="282" x2="400" y2="265"/>
    <line x1="444" y1="296" x2="456" y2="284"/>
    <line x1="466" y1="335" x2="482" y2="330"/>
    <line x1="356" y1="296" x2="344" y2="284"/>
    <line x1="334" y1="335" x2="318" y2="330"/>
    <line x1="454" y1="360" x2="472" y2="360"/>
    <line x1="346" y1="360" x2="328" y2="360"/>
  </g>

  <!-- Background hill with tomb -->
  <ellipse cx="420" cy="415" rx="480" ry="160" fill="#558b2f" opacity="0.7"/>
  <ellipse cx="180" cy="400" rx="260" ry="135" fill="#4caf50" opacity="0.65"/>
  <ellipse cx="680" cy="405" rx="235" ry="128" fill="#43a047" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="420" width="800" height="80" fill="url(#groundR)"/>

  <!-- TOMB (rocky hillside opening) -->
  <!-- Rock face -->
  <ellipse cx="400" cy="355" rx="145" ry="110" fill="#90a4ae"/>
  <ellipse cx="400" cy="360" rx="130" ry="98" fill="#78909c"/>
  <!-- Tomb opening (dark) -->
  <ellipse cx="400" cy="358" rx="72" ry="80" fill="#263238"/>
  <!-- Bright golden light from inside tomb -->
  <ellipse cx="400" cy="358" rx="65" ry="72" fill="url(#tombLight)"/>
  <ellipse cx="400" cy="350" rx="48" ry="55" fill="#fffde7" opacity="0.7"/>

  <!-- ROLLED STONE (to the right) -->
  <circle cx="542" cy="372" r="56" fill="#90a4ae" stroke="#607d8b" stroke-width="3"/>
  <circle cx="542" cy="372" r="46" fill="#78909c"/>
  <!-- Stone texture cracks -->
  <g stroke="#607d8b" stroke-width="1.5" opacity="0.4">
    <path d="M520,348 Q535,362 530,378"/>
    <path d="M550,345 Q558,358 555,375"/>
    <path d="M515,372 Q528,368 540,375"/>
  </g>
  <circle cx="542" cy="372" r="18" fill="#90a4ae" stroke="#607d8b" stroke-width="2"/>

  <!-- ANGEL (white robe, left of tomb) -->
  <g transform="translate(220,252)">
    <ellipse cx="30" cy="168" rx="28" ry="8" fill="#558b2f" opacity="0.2"/>
    <!-- Wings (simple) -->
    <path d="M-18,50 Q-55,20 -60,80 Q-40,90 -18,70Z" fill="#e3f2fd" opacity="0.9"/>
    <path d="M78,50 Q115,20 120,80 Q100,90 78,70Z" fill="#e3f2fd" opacity="0.9"/>
    <!-- Wing highlights -->
    <path d="M-18,52 Q-50,24 -55,78" stroke="#bbdefb" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M78,52 Q110,24 115,78" stroke="#bbdefb" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- White robe -->
    <path d="M5,55 Q1,140 -2,168 Q30,178 62,168 Q58,140 56,55 Q44,40 30,38 Q18,40 5,55Z" fill="white"/>
    <!-- Robe detail -->
    <path d="M8,58 Q4,120 2,155" stroke="#e0e0e0" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Belt (gold) -->
    <rect x="4" y="102" width="54" height="9" rx="4" fill="#ffd54f" opacity="0.7"/>
    <!-- Legs -->
    <rect x="14" y="160" width="12" height="34" rx="5" fill="#f5f5f5"/>
    <rect x="34" y="160" width="12" height="34" rx="5" fill="#eeeeee"/>
    <!-- Arms outstretched -->
    <path d="M5,64 Q-12,86 -10,108" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-9" cy="110" r="10" fill="#ffccbc"/>
    <path d="M56,64 Q72,86 70,108" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="70" cy="110" r="10" fill="#ffccbc"/>
    <!-- Head -->
    <circle cx="30" cy="28" r="24" fill="#ffccbc"/>
    <!-- Light blond / golden hair -->
    <path d="M8,18 Q30,-4 52,18 Q50,8 30,5 Q10,8 8,18Z" fill="#ffe082"/>
    <!-- Eyes -->
    <circle cx="20" cy="22" r="4" fill="#1565c0"/>
    <circle cx="40" cy="22" r="4" fill="#1565c0"/>
    <circle cx="21" cy="21" r="1.5" fill="white"/>
    <circle cx="41" cy="21" r="1.5" fill="white"/>
    <!-- Brows -->
    <path d="M14,15 Q20,11 26,15" stroke="#a0a0a0" stroke-width="2" fill="none"/>
    <path d="M34,15 Q40,11 46,15" stroke="#a0a0a0" stroke-width="2" fill="none"/>
    <!-- Gentle smile -->
    <path d="M18,36 Q30,46 42,36" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="12" cy="30" r="7" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="48" cy="30" r="7" fill="#ef9a9a" opacity="0.4"/>
    <!-- Neck -->
    <rect x="23" y="50" width="14" height="12" rx="4" fill="#ffccbc"/>
    <!-- Halo (golden) -->
    <circle cx="30" cy="28" r="30" fill="none" stroke="#ffd54f" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- WOMAN 1 (Mary Magdalene, amazed, left) -->
  <g transform="translate(90,288)">
    <ellipse cx="42" cy="160" rx="32" ry="8" fill="#558b2f" opacity="0.2"/>
    <!-- Red/rose robe -->
    <path d="M4,48 Q0,128 -4,160 Q42,172 88,160 Q83,128 82,48 Q64,32 42,29 Q22,32 4,48Z" fill="#e53935"/>
    <!-- Hem -->
    <path d="M0,144 Q42,156 86,144 Q83,165 42,172 Q1,165 0,144Z" fill="#c62828" opacity="0.5"/>
    <!-- Legs -->
    <rect x="24" y="152" width="12" height="36" rx="5" fill="#c62828" opacity="0.7"/>
    <rect x="44" y="152" width="12" height="36" rx="5" fill="#b71c1c" opacity="0.7"/>
    <!-- Belt -->
    <rect x="3" y="96" width="80" height="8" rx="4" fill="#8e24aa" opacity="0.45"/>
    <!-- Arms raised in amazement -->
    <path d="M4,58 Q-16,40 -20,20" stroke="#e53935" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-20" cy="17" r="10" fill="#ffccbc"/>
    <path d="M82,58 Q98,42 100,24" stroke="#e53935" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="101" cy="21" r="10" fill="#ffccbc"/>
    <!-- Head -->
    <circle cx="42" cy="22" r="24" fill="#ffccbc"/>
    <!-- Dark hair -->
    <path d="M20,12 Q42,-6 64,12 Q62,4 42,1 Q22,4 20,12Z" fill="#3e2723"/>
    <!-- Hair sides -->
    <path d="M20,14 Q14,45 18,70" stroke="#3e2723" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M64,14 Q70,45 66,70" stroke="#3e2723" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Eyes (wide, amazed) -->
    <circle cx="32" cy="18" r="5" fill="white"/>
    <circle cx="52" cy="18" r="5" fill="white"/>
    <circle cx="32" cy="18" r="3.5" fill="#4e342e"/>
    <circle cx="52" cy="18" r="3.5" fill="#4e342e"/>
    <circle cx="33" cy="17" r="1.5" fill="white"/>
    <circle cx="53" cy="17" r="1.5" fill="white"/>
    <!-- Brows (raised in surprise) -->
    <path d="M25,10 Q32,5 39,10" stroke="#4e342e" stroke-width="2" fill="none"/>
    <path d="M45,10 Q52,5 59,10" stroke="#4e342e" stroke-width="2" fill="none"/>
    <!-- Open O mouth amazed -->
    <ellipse cx="42" cy="30" rx="4" ry="4.5" fill="#c62828" opacity="0.8"/>
    <!-- Cheeks -->
    <circle cx="23" cy="24" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="61" cy="24" r="8" fill="#ef9a9a" opacity="0.4"/>
    <!-- Neck -->
    <rect x="35" y="44" width="14" height="12" rx="4" fill="#ffccbc"/>
  </g>

  <!-- WOMAN 2 (other Mary, kneeling/bowing) -->
  <g transform="translate(580,295)">
    <ellipse cx="38" cy="152" rx="30" ry="8" fill="#558b2f" opacity="0.18"/>
    <!-- Purple/violet robe -->
    <path d="M4,46 Q0,122 -3,152 Q38,163 80,152 Q76,122 76,46 Q60,30 38,27 Q18,30 4,46Z" fill="#7b1fa2"/>
    <path d="M1,137 Q38,148 79,137 Q76,158 38,164 Q0,158 1,137Z" fill="#6a1b9a" opacity="0.5"/>
    <rect x="3" y="90" width="74" height="8" rx="4" fill="#e91e63" opacity="0.45"/>
    <rect x="21" y="144" width="11" height="34" rx="5" fill="#6a1b9a" opacity="0.7"/>
    <rect x="40" y="144" width="11" height="34" rx="5" fill="#4a148c" opacity="0.7"/>
    <!-- Arms reaching toward tomb -->
    <path d="M4,56 Q-12,78 -8,104" stroke="#7b1fa2" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-7" cy="106" r="10" fill="#e8a87a"/>
    <path d="M76,56 Q92,78 90,104" stroke="#7b1fa2" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="90" cy="106" r="10" fill="#e8a87a"/>
    <!-- Head -->
    <circle cx="38" cy="20" r="23" fill="#e8a87a"/>
    <!-- Dark brown hair -->
    <path d="M17,11 Q38,-5 59,11 Q57,3 38,0 Q19,3 17,11Z" fill="#5d4037"/>
    <path d="M17,13 Q12,42 16,66" stroke="#5d4037" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M59,13 Q64,42 60,66" stroke="#5d4037" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Eyes (joyful, squinting a little with smile) -->
    <circle cx="28" cy="17" r="4" fill="#4e342e"/>
    <circle cx="48" cy="17" r="4" fill="#4e342e"/>
    <circle cx="29" cy="16" r="1.5" fill="white"/>
    <circle cx="49" cy="16" r="1.5" fill="white"/>
    <path d="M22,10 Q28,6 34,10" stroke="#4e342e" stroke-width="2" fill="none"/>
    <path d="M42,10 Q48,6 54,10" stroke="#4e342e" stroke-width="2" fill="none"/>
    <!-- Big happy smile -->
    <path d="M24,30 Q38,42 52,30" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="19" cy="22" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="57" cy="22" r="8" fill="#ef9a9a" opacity="0.4"/>
    <rect x="31" y="41" width="14" height="12" rx="4" fill="#e8a87a"/>
  </g>

  <!-- White burial cloth (empty) inside tomb -->
  <path d="M356,340 Q400,330 444,340 Q450,356 444,362 Q400,355 356,362 Q350,356 356,340Z" fill="white" opacity="0.6"/>

  <!-- Lily flowers in foreground -->
  <g>
    <!-- Lily 1 -->
    <rect x="48" y="388" width="4" height="35" rx="2" fill="#558b2f"/>
    <g transform="translate(50,386)">
      <ellipse cx="0" cy="0" rx="8" ry="14" fill="white" transform="rotate(-20,0,0)"/>
      <ellipse cx="0" cy="0" rx="8" ry="14" fill="white" transform="rotate(20,0,0)"/>
      <ellipse cx="0" cy="0" rx="8" ry="14" fill="white" transform="rotate(60,0,0)"/>
      <circle cx="0" cy="-4" r="4" fill="#ffe082"/>
    </g>
    <!-- Lily 2 -->
    <rect x="72" y="395" width="4" height="28" rx="2" fill="#558b2f"/>
    <g transform="translate(74,393)">
      <ellipse cx="0" cy="0" rx="7" ry="12" fill="#fff9c4" transform="rotate(-25,0,0)"/>
      <ellipse cx="0" cy="0" rx="7" ry="12" fill="white" transform="rotate(25,0,0)"/>
      <circle cx="0" cy="-3" r="3.5" fill="#ffe082"/>
    </g>
    <!-- Pink flowers right -->
    <circle cx="720" cy="428" r="6" fill="#f48fb1" opacity="0.85"/>
    <circle cx="738" cy="422" r="5" fill="#e91e63" opacity="0.85"/>
    <circle cx="755" cy="430" r="6" fill="#ce93d8" opacity="0.8"/>
    <!-- Yellow flower -->
    <circle cx="700" cy="432" r="5" fill="#fff176" opacity="0.85"/>
  </g>

  <!-- Sparkles of light around tomb -->
  <g fill="#fff176" opacity="0.75">
    <circle cx="338" cy="308" r="3"/>
    <circle cx="462" cy="302" r="3"/>
    <circle cx="400" cy="285" r="3.5"/>
    <circle cx="370" cy="295" r="2"/>
    <circle cx="430" cy="295" r="2"/>
  </g>
</svg>
