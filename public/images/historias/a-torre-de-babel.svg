<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="babel_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <linearGradient id="babel_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="babel_tower" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="babel_sun" cx="80%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="400" fill="url(#babel_sky)"/>
  <!-- Sun -->
  <circle cx="680" cy="65" r="48" fill="#fde047"/>
  <ellipse cx="680" cy="65" rx="80" ry="80" fill="url(#babel_sun)"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="55" rx="75" ry="28" fill="white" opacity="0.75"/>
  <ellipse cx="160" cy="42" rx="52" ry="24" fill="white" opacity="0.75"/>
  <ellipse cx="85" cy="48" rx="40" ry="20" fill="white" opacity="0.75"/>
