  <rect x="250" y="265" width="10" height="12" rx="3" fill="#1c1917"/>
  <circle cx="290" cy="230" r="7" fill="#7c3aed"/>
  <rect x="285" y="235" width="10" height="12" rx="3" fill="#7c3aed"/>
  <circle cx="510" cy="230" r="7" fill="#1d4ed8"/>
  <rect x="505" y="235" width="10" height="12" rx="3" fill="#1d4ed8"/>
  <circle cx="540" cy="262" r="7" fill="#15803d"/>
  <rect x="535" y="267" width="10" height="12" rx="3" fill="#15803d"/>
  <circle cx="350" cy="200" r="7" fill="#dc2626"/>
  <rect x="345" y="205" width="10" height="12" rx="3" fill="#dc2626"/>
  <circle cx="450" cy="200" r="7" fill="#0891b2"/>
  <rect x="445" y="205" width="10" height="12" rx="3" fill="#0891b2"/>
