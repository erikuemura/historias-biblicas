  <rect x="80" y="270" width="55" height="55" rx="3" fill="#d97706"/>
  <polygon points="80,270 107,248 135,270" fill="#b45309"/>
  <rect x="90" y="285" width="15" height="20" fill="#78350f"/>
  <rect x="110" y="285" width="15" height="20" fill="#78350f"/>
  <rect x="155" y="280" width="45" height="45" rx="3" fill="#d97706"/>
  <polygon points="155,280 177,262 200,280" fill="#b45309"/>
  <rect x="620" y="268" width="55" height="57" rx="3" fill="#d97706"/>
  <polygon points="620,268 647,245 675,268" fill="#b45309"/>
  <rect x="630" y="283" width="15" height="20" fill="#78350f"/>
  <rect x="650" y="283" width="15" height="20" fill="#78350f"/>
  <rect x="665" y="277" width="45" height="48" rx="3" fill="#d97706"/>
  <!-- MAIN TOWER (BABEL) -->
  <!-- Base layer (widest) -->
  <rect x="240" y="295" width="320" height="32" rx="4" fill="#b45309"/>
  <!-- Layer 2 -->
  <rect x="258" y="265" width="284" height="32" rx="4" fill="#d97706"/>
  <!-- Layer 3 -->
  <rect x="278" y="235" width="244" height="32" rx="4" fill="#f59e0b"/>
  <!-- Layer 4 -->
  <rect x="298" y="205" width="204" height="32" rx="4" fill="#d97706"/>
  <!-- Layer 5 -->
  <rect x="318" y="175" width="164" height="32" rx="4" fill="#b45309"/>
