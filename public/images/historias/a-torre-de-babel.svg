  <rect x="55" y="265" width="8" height="65" fill="#92400e"/>
  <ellipse cx="59" cy="258" rx="28" ry="18" fill="#22c55e"/>
  <path d="M59 258 Q40 240 25 248" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M59 258 Q78 235 90 242" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M59 258 Q52 235 48 238" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <rect x="735" y="262" width="8" height="68" fill="#92400e"/>
  <ellipse cx="739" cy="255" rx="28" ry="18" fill="#22c55e"/>
  <path d="M739 255 Q720 237 705 245" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M739 255 Q758 232 770 239" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M739 255 Q730 232 728 236" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
