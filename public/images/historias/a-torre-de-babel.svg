  <line x1="285" y1="265" x2="285" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="315" y1="265" x2="315" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="345" y1="265" x2="345" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="375" y1="265" x2="375" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="405" y1="265" x2="405" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="435" y1="265" x2="435" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="465" y1="265" x2="465" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="495" y1="265" x2="495" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  <line x1="525" y1="265" x2="525" y2="295" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
