  <line x1="320" y1="195" x2="480" y2="195" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="165" x2="460" y2="165" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <line x1="355" y1="135" x2="445" y2="135" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
