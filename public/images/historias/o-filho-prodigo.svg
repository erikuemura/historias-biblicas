<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="fph_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fda4af"/><stop offset="100%" stop-color="#fb7185"/></linearGradient>
    <radialGradient id="fph_glow" cx="50%" cy="80%"><stop offset="0%" stop-color="#fef3c7" stop-opacity="0.8"/><stop offset="100%" stop-color="#fb7185" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#fph_sky)"/>
  <ellipse cx="400" cy="380" rx="500" ry="100" fill="url(#fph_glow)"/>
  <!-- sunset hills -->
  <ellipse cx="200" cy="420" rx="350" ry="120" fill="#be185d"/>
  <ellipse cx="650" cy="430" rx="300" ry="110" fill="#9d174d"/>
  <!-- ground path -->
  <ellipse cx="400" cy="400" rx="500" ry="80" fill="#f43f5e" opacity="0.4"/>
  <!-- sun setting -->
  <circle cx="400" cy="300" r="60" fill="#fbbf24" opacity="0.7"/>
  <!-- father running figure -->
  <ellipse cx="500" cy="250" rx="22" ry="26" fill="#fde68a"/>
  <rect x="480" y="273" width="40" height="55" rx="8" fill="#be185d"/>
  <!-- arms open wide running -->
  <line x1="480" y1="285" x2="448" y2="268" stroke="#be185d" stroke-width="9" stroke-linecap="round"/>
  <line x1="520" y1="285" x2="552" y2="268" stroke="#be185d" stroke-width="9" stroke-linecap="round"/>
  <!-- son figure (smaller, coming from left) -->
  <ellipse cx="280" cy="258" rx="18" ry="22" fill="#fde68a"/>
  <rect x="264" y="278" width="32" height="48" rx="7" fill="#c2410c"/>
  <!-- heart/love symbols -->
  <text x="400" y="180" font-size="28" text-anchor="middle" fill="#fda4af" opacity="0.6">♥</text>
  <text x="340" y="210" font-size="18" text-anchor="middle" fill="#fda4af" opacity="0.4">♥</text>
  <text x="460" y="220" font-size="20" text-anchor="middle" fill="#fda4af" opacity="0.5">♥</text>
</svg>
