<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyJP4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b3e5fc"/>
      <stop offset="50%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#e1f5fe"/>
    </linearGradient>
    <linearGradient id="waterJP4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyJP4)"/>
  <!-- Sun -->
  <circle cx="700" cy="65" r="46" fill="#fff9c4" opacity="0.9"/>
  <!-- Distant hills -->
  <ellipse cx="400" cy="310" rx="500" ry="80" fill="#a5d6a7" opacity="0.4"/>
  <!-- Shore / ground -->
  <rect x="0" y="285" width="800" height="95" fill="#ffcc80"/>
  <!-- Water edge -->
  <path d="M0,290 Q150,280 300,290 Q450,300 600,290 Q700,283 800,290" fill="url(#waterJP4)" opacity="0.7"/>
  <rect x="0" y="290" width="340" height="5" fill="none"/>
  <!-- Lake water left -->
  <rect x="0" y="288" width="280" height="42" fill="#4dd0e1" opacity="0.6"/>
  <path d="M0,295 Q80,289 160,295 Q240,301 280,295" fill="none" stroke="#80deea" stroke-width="2" opacity="0.6"/>
  <!-- JESUS (center, calling with open arms) -->
  <g transform="translate(340,130)">
    <ellipse cx="52" cy="218" rx="45" ry="10" fill="#e65100" opacity="0.2"/>
    <!-- White robe -->
    <path d="M8,60 Q4,172 2,208 Q52,218 102,208 Q98,172 94,60 Q76,42 52,39 Q28,42 8,60Z" fill="white"/>
    <path d="M6,152 Q52,162 100,152 Q98,190 52,196 Q6,190 6,152Z" fill="#e0e0e0" opacity="0.4"/>
    <!-- Blue sash -->
    <rect x="6" y="118" width="92" height="10" rx="5" fill="#1565c0" opacity="0.5"/>
    <rect x="28" y="202" width="13" height="40" rx="5" fill="white" opacity="0.7"/>
    <rect x="53" y="202" width="13" height="40" rx="5" fill="#e0e0e0" opacity="0.7"/>
    <!-- Head -->
    <circle cx="52" cy="30" r="27" fill="#ffccbc"/>
    <path d="M27,18 Q52,2 77,18 Q75,8 52,5 Q29,8 27,18Z" fill="#5d4037"/>
    <circle cx="40" cy="24" r="4" fill="#5d4037"/>
    <circle cx="64" cy="24" r="4" fill="#5d4037"/>
    <circle cx="41" cy="23" r="1.5" fill="white"/>
    <circle cx="65" cy="23" r="1.5" fill="white"/>
    <!-- Warm inviting smile -->
    <path d="M36,38 Q52,50 68,38" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="27" cy="32" r="9" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="77" cy="32" r="9" fill="#ef9a9a" opacity="0.4"/>
    <rect x="44" y="56" width="16" height="14" rx="4" fill="#ffccbc"/>
    <!-- Beard -->
    <path d="M35,48 Q52,60 69,48 Q67,58 52,62 Q37,58 35,48Z" fill="#5d4037" opacity="0.7"/>
    <!-- Arms wide open calling -->
    <path d="M8,68 Q-30,80 -55,68" stroke="white" stroke-width="15" fill="none" stroke-linecap="round"/>
    <circle cx="-57" cy="67" r="12" fill="#ffccbc"/>
    <path d="M94,68 Q130,80 158,68" stroke="white" stroke-width="15" fill="none" stroke-linecap="round"/>
    <circle cx="160" cy="67" r="12" fill="#ffccbc"/>
  </g>
  <!-- FISHERMEN responding (2 men coming from water) -->
  <g transform="translate(115,195)">
    <ellipse cx="38" cy="140" rx="34" ry="8" fill="#0097a7" opacity="0.2"/>
    <path d="M6,46 Q4,112 2,132 Q38,140 74,132 Q70,112 68,46 Q54,30 38,27 Q22,30 6,46Z" fill="#546e7a"/>
    <rect x="20" y="128" width="11" height="28" rx="4" fill="#455a64"/>
    <rect x="40" y="128" width="11" height="28" rx="4" fill="#37474f"/>
    <circle cx="38" cy="20" r="22" fill="#e8a87a"/>
    <path d="M18,11 Q38,-3 58,11 Q56,3 38,0 Q20,3 18,11Z" fill="#4e342e"/>
    <circle cx="28" cy="15" r="3.5" fill="#4e342e"/>
    <circle cx="48" cy="15" r="3.5" fill="#4e342e"/>
    <circle cx="29" cy="14" r="1.3" fill="white"/>
    <circle cx="49" cy="14" r="1.3" fill="white"/>
    <!-- Responding smile -->
    <path d="M26,28 Q38,36 50,28" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="20" cy="22" r="7" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="56" cy="22" r="7" fill="#ef9a9a" opacity="0.4"/>
    <path d="M6,52 Q-14,68 -12,94" stroke="#546e7a" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="-11" cy="96" r="10" fill="#e8a87a"/>
    <path d="M68,52 Q86,66 84,92" stroke="#546e7a" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="83" cy="94" r="10" fill="#e8a87a"/>
    <!-- Fishing net dragging -->
    <path d="M-15,100 Q10,115 40,108" stroke="#8d6e63" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M-10,108 Q15,120 42,115" stroke="#8d6e63" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M-5,116 Q18,128 44,122" stroke="#8d6e63" stroke-width="2" fill="none" opacity="0.5"/>
    <line x1="-15" y1="100" x2="-5" y2="116" stroke="#8d6e63" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="108" x2="20" y2="122" stroke="#8d6e63" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="108" x2="44" y2="122" stroke="#8d6e63" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Second fisherman -->
  <g transform="translate(64,208)">
    <path d="M5,40 Q3,98 1,116 Q32,124 63,116 Q60,98 58,40 Q46,26 32,23 Q18,26 5,40Z" fill="#795548"/>
    <circle cx="32" cy="14" r="20" fill="#ffccbc"/>
    <path d="M14,7 Q32,-5 50,7 Q48,0 32,-2 Q16,0 14,7Z" fill="#5d4037"/>
    <circle cx="22" cy="11" r="3" fill="#5d4037"/>
    <circle cx="42" cy="11" r="3" fill="#5d4037"/>
    <path d="M21,22 Q32,30 43,22" stroke="#c62828" stroke-width="2" fill="none"/>
    <path d="M5,44 Q-14,58 -12,80" stroke="#795548" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="-11" cy="82" r="9" fill="#ffccbc"/>
    <path d="M58,44 Q74,56 72,78" stroke="#795548" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="71" cy="80" r="9" fill="#ffccbc"/>
  </g>
  <!-- Light rays from Jesus -->
  <g stroke="#fff9c4" stroke-width="1.5" opacity="0.3">
    <line x1="340" y1="140" x2="200" y2="240"/>
    <line x1="395" y1="135" x2="395" y2="280"/>
    <line x1="450" y1="140" x2="580" y2="230"/>
  </g>
</svg>
