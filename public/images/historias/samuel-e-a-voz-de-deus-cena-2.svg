<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="sam2_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="sam2_lampglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="1"/>
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sam2_windowglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Night background -->
  <rect width="800" height="380" fill="url(#sam2_bg)"/>
  <!-- Stars through window -->
  <circle cx="680" cy="40" r="2" fill="white" opacity="0.8"/>
  <circle cx="720" cy="20" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="750" cy="50" r="2" fill="white" opacity="0.9"/>
  <circle cx="760" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <!-- Moon outside -->
  <circle cx="720" cy="65" r="30" fill="#fef9c3" opacity="0.9"/>
  <!-- Temple room interior -->
  <!-- Walls -->
  <rect x="60" y="50" width="680" height="310" fill="#2c2c2c"/>
  <!-- Stone wall texture -->
  <rect x="60" y="50" width="680" height="20" fill="#44403c"/>
  <rect x="60" y="88" width="680" height="20" fill="#44403c"/>
  <rect x="60" y="126" width="680" height="20" fill="#44403c"/>
  <rect x="60" y="164" width="680" height="20" fill="#44403c"/>
  <rect x="60" y="202" width="680" height="20" fill="#44403c"/>
  <!-- Vertical stone lines -->
  <line x1="150" y1="50" x2="150" y2="360" stroke="#44403c" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="50" x2="250" y2="360" stroke="#44403c" stroke-width="2" opacity="0.5"/>
  <line x1="350" y1="50" x2="350" y2="360" stroke="#44403c" stroke-width="2" opacity="0.5"/>
  <line x1="450" y1="50" x2="450" y2="360" stroke="#44403c" stroke-width="2" opacity="0.5"/>
  <line x1="550" y1="50" x2="550" y2="360" stroke="#44403c" stroke-width="2" opacity="0.5"/>
  <line x1="650" y1="50" x2="650" y2="360" stroke="#44403c" stroke-width="2" opacity="0.5"/>
  <!-- Window (left wall) -->
  <rect x="80" y="80" width="100" height="120" rx="10" fill="#0f172a"/>
  <rect x="80" y="80" width="100" height="120" rx="10" stroke="#78716c" stroke-width="6" fill="none"/>
  <!-- Window glow (moonlight) -->
  <ellipse cx="130" cy="140" rx="60" ry="70" fill="url(#sam2_windowglow)"/>
  <!-- Cross bars on window -->
  <line x1="130" y1="82" x2="130" y2="198" stroke="#78716c" stroke-width="4"/>
  <line x1="82" y1="140" x2="178" y2="140" stroke="#78716c" stroke-width="4"/>
  <!-- Moon visible through window -->
  <circle cx="130" cy="120" r="22" fill="#fef9c3" opacity="0.8"/>
  <!-- Stars through window -->
  <circle cx="90" cy="95" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="170" cy="100" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="160" cy="175" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="95" cy="172" r="1.5" fill="white" opacity="0.7"/>
  <!-- Floor -->
  <rect x="60" y="330" width="680" height="30" fill="#44403c"/>
  <!-- Mat/sleeping area -->
  <ellipse cx="350" cy="340" rx="160" ry="22" fill="#92400e"/>
  <ellipse cx="350" cy="335" rx="145" ry="18" fill="#b45309"/>
  <!-- SAMUEL sleeping figure -->
  <!-- Body on mat -->
  <ellipse cx="345" cy="326" rx="120" ry="16" fill="#d97706"/>
  <!-- Head (sleeping) -->
  <circle cx="470" cy="320" r="26" fill="#fbbf24"/>
  <!-- Hair dark -->
  <ellipse cx="470" cy="306" rx="26" ry="15" fill="#78350f"/>
  <!-- Sleeping face -->
  <path d="M461 318 Q470 322 479 318" stroke="#1c1917" stroke-width="2.5" fill="none"/>
  <!-- Closed eyes (sleeping) -->
  <path d="M463 312 Q470 315 477 312" stroke="#1c1917" stroke-width="2.5" fill="none"/>
  <!-- Blanket/covering -->
  <ellipse cx="330" cy="330" rx="130" ry="16" fill="#1d4ed8" opacity="0.75"/>
  <!-- LAMPLIGHT (oil lamp on stand) -->
  <!-- Stand -->
  <rect x="590" y="255" width="10" height="85" fill="#92400e"/>
  <rect x="574" y="248" width="42" height="10" rx="3" fill="#b45309"/>
  <!-- Lamp bowl -->
  <ellipse cx="595" cy="245" rx="26" ry="12" fill="#d97706"/>
  <ellipse cx="595" cy="238" rx="10" ry="7" fill="#b45309"/>
  <!-- Lamp glow -->
  <ellipse cx="595" cy="220" rx="110" ry="110" fill="url(#sam2_lampglow)"/>
  <!-- Flame -->
  <path d="M590 238 Q595 215 600 238" fill="#fde047"/>
  <path d="M592 238 Q595 220 598 238" fill="#fbbf24"/>
  <path d="M593 238 Q595 224 597 238" fill="white" opacity="0.8"/>
  <!-- Ark/altar in background (shadowy) -->
  <rect x="330" y="165" width="160" height="90" rx="5" fill="#78350f" opacity="0.6"/>
  <rect x="315" y="160" width="170" height="14" rx="4" fill="#92400e" opacity="0.6"/>
  <!-- Cherubim decoration (simplified) -->
  <ellipse cx="340" cy="175" rx="15" ry="12" fill="#d97706" opacity="0.4"/>
  <ellipse cx="470" cy="175" rx="15" ry="12" fill="#d97706" opacity="0.4"/>
  <!-- Silence/peaceful mood - small light particles -->
  <circle cx="250" cy="280" r="2" fill="#fde047" opacity="0.4"/>
  <circle cx="280" cy="250" r="2" fill="#fde047" opacity="0.3"/>
  <circle cx="420" cy="260" r="2" fill="#fde047" opacity="0.4"/>
  <circle cx="200" cy="300" r="2" fill="#fde047" opacity="0.3"/>
</svg>
