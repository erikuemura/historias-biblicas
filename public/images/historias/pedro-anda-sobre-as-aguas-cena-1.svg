<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="pa1_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="pa1_sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>
  </defs>
  <!-- Dark stormy night sky -->
  <rect width="800" height="380" fill="url(#pa1_sky)"/>
  <!-- Moon partially hidden -->
  <circle cx="680" cy="55" r="30" fill="#fde68a" opacity="0.7"/>
  <!-- Dark storm clouds covering most of sky -->
  <ellipse cx="100" cy="60" rx="160" ry="70" fill="#0c4a6e" opacity="0.9"/>
  <ellipse cx="50" cy="45" rx="100" ry="50" fill="#1e293b"/>
  <ellipse cx="180" cy="40" rx="110" ry="55" fill="#1e3a5f"/>
  <ellipse cx="400" cy="50" rx="180" ry="65" fill="#0c4a6e" opacity="0.85"/>
  <ellipse cx="350" cy="35" rx="130" ry="55" fill="#1e293b" opacity="0.9"/>
  <ellipse cx="600" cy="55" rx="150" ry="62" fill="#0c4a6e" opacity="0.7"/>
  <!-- Stars barely visible -->
  <circle cx="720" cy="20" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="760" cy="40" r="1" fill="white" opacity="0.4"/>
  <!-- Rain lines -->
  <line x1="100" y1="80" x2="90" y2="130" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="70" x2="188" y2="125" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
  <line x1="350" y1="75" x2="338" y2="130" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
  <line x1="500" y1="72" x2="488" y2="128" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
  <line x1="650" y1="78" x2="638" y2="135" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
  <!-- Big waves -->
  <rect x="0" y="200" width="800" height="180" fill="url(#pa1_sea)"/>
  <path d="M0,210 Q60,185 120,215 Q180,245 240,208 Q300,175 360,215 Q420,248 480,208 Q540,172 600,215 Q660,248 720,210 Q760,190 800,210" fill="#0284c7" opacity="0.7"/>
  <path d="M0,240 Q80,218 160,248 Q240,278 320,238 Q400,200 480,245 Q560,278 640,238 Q720,200 800,240" fill="#0ea5e9" opacity="0.5"/>
  <path d="M0,268 Q100,250 200,275 Q300,300 400,265 Q500,233 600,270 Q700,300 800,268" fill="#0369a1" opacity="0.4"/>
  <!-- White foam -->
  <ellipse cx="120" cy="215" rx="28" ry="7" fill="white" opacity="0.35"/>
  <ellipse cx="360" cy="218" rx="32" ry="7" fill="white" opacity="0.35"/>
  <ellipse cx="600" cy="218" rx="28" ry="7" fill="white" opacity="0.35"/>
  <!-- Big boat tossing on waves -->
  <ellipse cx="400" cy="250" rx="180" ry="42" fill="#92400e"/>
  <rect x="235" y="215" width="330" height="45" rx="12" fill="#78350f"/>
  <!-- Mast -->
  <rect x="393" y="130" width="10" height="95" rx="3" fill="#92400e"/>
  <!-- Torn sail flapping in wind -->
  <polygon points="403,138 403,212 490,180" fill="#e2e8f0" opacity="0.6"/>
  <!-- Oars sticking out -->
  <line x1="235" y1="240" x2="195" y2="255" stroke="#b45309" stroke-width="5"/>
  <line x1="565" y1="240" x2="605" y2="255" stroke="#b45309" stroke-width="5"/>
  <!-- Disciples in boat - terrified -->
  <!-- Disciple 1 - holding mast -->
  <rect x="360" y="185" width="34" height="68" rx="8" fill="#4b5563"/>
  <circle cx="377" cy="175" r="17" fill="#fde68a"/>
  <ellipse cx="377" cy="167" rx="17" ry="9" fill="#374151"/>
  <!-- terrified face -->
  <ellipse cx="371" cy="175" rx="4" ry="5" fill="#78350f"/>
  <ellipse cx="383" cy="175" rx="4" ry="5" fill="#78350f"/>
  <ellipse cx="377" cy="185" rx="4" ry="5" fill="#92400e"/>
  <line x1="360" y1="200" x2="395" y2="185" stroke="#374151" stroke-width="6" stroke-linecap="round"/>
  <!-- Disciple 2 - left, praying/holding on -->
  <rect x="280" y="190" width="34" height="65" rx="8" fill="#374151"/>
  <circle cx="297" cy="180" r="17" fill="#fbbf24"/>
  <ellipse cx="297" cy="172" rx="17" ry="9" fill="#78350f"/>
  <ellipse cx="291" cy="180" rx="4" ry="5" fill="#78350f"/>
  <ellipse cx="303" cy="180" rx="4" ry="5" fill="#78350f"/>
  <ellipse cx="297" cy="190" rx="4" ry="5" fill="#92400e"/>
  <!-- Disciple 3 - right -->
  <rect x="450" y="188" width="34" height="67" rx="8" fill="#6b7280"/>
  <circle cx="467" cy="178" r="17" fill="#d97706"/>
  <ellipse cx="467" cy="170" rx="17" ry="9" fill="#92400e"/>
  <ellipse cx="461" cy="178" rx="4" ry="5" fill="#78350f"/>
  <ellipse cx="473" cy="178" rx="4" ry="5" fill="#78350f"/>
  <ellipse cx="467" cy="188" rx="4" ry="5" fill="#92400e"/>
  <!-- Disciple 4 - far right -->
  <rect x="500" y="192" width="32" height="63" rx="8" fill="#1d4ed8"/>
  <circle cx="516" cy="182" r="16" fill="#fde68a"/>
  <ellipse cx="516" cy="175" rx="16" ry="9" fill="#1e40af"/>
  <ellipse cx="510" cy="182" rx="4" ry="4.5" fill="#78350f"/>
  <ellipse cx="522" cy="182" rx="4" ry="4.5" fill="#78350f"/>
  <ellipse cx="516" cy="191" rx="3.5" ry="4.5" fill="#92400e"/>
  <!-- Disciple 5 - far left -->
  <rect x="248" y="192" width="32" height="63" rx="8" fill="#dc2626"/>
  <circle cx="264" cy="182" r="16" fill="#fbbf24"/>
  <ellipse cx="264" cy="175" rx="16" ry="9" fill="#b91c1c"/>
  <ellipse cx="258" cy="182" rx="4" ry="4.5" fill="#78350f"/>
  <ellipse cx="270" cy="182" rx="4" ry="4.5" fill="#78350f"/>
  <ellipse cx="264" cy="191" rx="3.5" ry="4.5" fill="#92400e"/>
  <!-- Lightning bolt in sky -->
  <path d="M200 50 L188 85 L205 85 L188 122" stroke="#fef9c3" stroke-width="3" fill="none" opacity="0.8"/>
</svg>
