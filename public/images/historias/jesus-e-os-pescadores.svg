<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="skyF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="35%" stop-color="#ffb74d"/>
      <stop offset="65%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </linearGradient>
    <linearGradient id="seaF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="shoreF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a76a"/>
      <stop offset="100%" stop-color="#a0785a"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyF)"/>

  <!-- Sun -->
  <circle cx="680" cy="115" r="52" fill="#ffe082" opacity="0.9"/>
  <circle cx="680" cy="115" r="36" fill="#fff9c4"/>
  <!-- Sun rays -->
  <g stroke="#ffe082" stroke-width="2.5" opacity="0.55" stroke-linecap="round">
    <line x1="680" y1="54" x2="680" y2="44"/><line x1="714" y1="67" x2="721" y2="60"/>
    <line x1="730" y1="100" x2="740" y2="97"/><line x1="626" y1="67" x2="619" y2="60"/>
    <line x1="612" y1="100" x2="602" y2="97"/>
  </g>

  <!-- Background hills -->
  <ellipse cx="140" cy="295" rx="240" ry="105" fill="#ff8f00" opacity="0.3"/>
  <ellipse cx="660" cy="290" rx="195" ry="92" fill="#e65100" opacity="0.22"/>

  <!-- Sea -->
  <path d="M0,290 Q200,275 400,285 Q600,295 800,280 L800,385 Q600,372 400,360 Q200,348 0,365Z" fill="url(#seaF)"/>
  <!-- Sea shimmer -->
  <g stroke="#81d4fa" stroke-width="1.5" fill="none" opacity="0.35">
    <path d="M30,315 Q90,306 150,315"/><path d="M200,330 Q265,320 330,330"/>
    <path d="M380,318 Q440,309 500,318"/><path d="M560,308 Q615,300 670,308"/>
  </g>

  <!-- Shore -->
  <path d="M0,368 Q200,354 400,363 Q600,372 800,360 L800,500 L0,500Z" fill="url(#shoreF)"/>

  <!-- Fish jumping -->
  <g fill="#4fc3f7" opacity="0.85">
    <ellipse cx="488" cy="284" rx="13" ry="6" transform="rotate(-30,488,284)"/>
    <polygon points="488,279 496,274 492,284" fill="#0288d1" opacity="0.8"/>
    <ellipse cx="528" cy="292" rx="10" ry="5" transform="rotate(20,528,292)"/>
  </g>

  <!-- BOAT -->
  <g transform="translate(448,268)">
    <!-- Hull -->
    <path d="M-115,22 Q-105,-6 105,-6 Q118,22 112,44 Q0,60 -115,44Z" fill="#8d6e63"/>
    <path d="M-115,22 Q0,14 112,22" stroke="#6d4c41" stroke-width="2.5" fill="none"/>
    <path d="M-103,24 Q0,17 103,24 Q110,40 103,42 Q0,52 -103,42Z" fill="#795548"/>
    <!-- Mast -->
    <rect x="-2" y="-68" width="7" height="88" rx="2" fill="#6d4c41"/>
    <!-- Sail -->
    <path d="M5,-63 Q33,-48 27,-18 Q13,-20 5,-20Z" fill="#fff9c4" opacity="0.75"/>

    <!-- NET over side -->
    <g stroke="#90a4ae" stroke-width="1.5" fill="none" opacity="0.65">
      <line x1="68" y1="-3" x2="82" y2="30"/>
      <line x1="78" y1="-3" x2="92" y2="30"/>
      <line x1="88" y1="0" x2="100" y2="30"/>
      <line x1="66" y1="10" x2="102" y2="10"/>
      <line x1="64" y1="20" x2="102" y2="20"/>
    </g>

    <!-- FISHERMAN PETER (bearded, standing) -->
    <g transform="translate(-42,-28)">
      <!-- Body -->
      <path d="M-14,18 L-12,86 L22,86 L24,18 Q10,6 4,4 Q-2,6 -14,18Z" fill="#ef6c00"/>
      <!-- Belt -->
      <rect x="-12" y="50" width="34" height="8" rx="3" fill="#bf360c"/>
      <!-- Legs -->
      <rect x="-8" y="78" width="12" height="30" rx="5" fill="#a1887f"/>
      <rect x="7" y="78" width="12" height="30" rx="5" fill="#8d6e63"/>
      <!-- Sandals -->
      <ellipse cx="-2" cy="109" rx="10" ry="4" fill="#5d4037"/>
      <ellipse cx="13" cy="109" rx="10" ry="4" fill="#4e342e"/>
      <!-- Arms holding net -->
      <path d="M-14,26 Q-30,46 -26,62" stroke="#ef6c00" stroke-width="12" fill="none" stroke-linecap="round"/>
      <circle cx="-25" cy="64" r="9" fill="#ffccbc"/>
      <path d="M24,26 Q38,46 36,62" stroke="#ef6c00" stroke-width="12" fill="none" stroke-linecap="round"/>
      <circle cx="36" cy="64" r="9" fill="#ffccbc"/>
      <!-- Head -->
      <circle cx="4" cy="6" r="22" fill="#e8a87a"/>
      <!-- Hair -->
      <path d="M-15,0 Q4,-16 23,0 Q21,-6 4,-8 Q-13,-6 -15,0Z" fill="#3e2723"/>
      <!-- Beard -->
      <path d="M-13,14 Q-10,36 4,42 Q18,36 21,14" fill="#3e2723" opacity="0.6"/>
      <!-- Eyes -->
      <circle cx="-5" cy="3" r="4" fill="#3e2723"/>
      <circle cx="13" cy="3" r="4" fill="#3e2723"/>
      <circle cx="-4" cy="2" r="1.5" fill="white"/>
      <circle cx="14" cy="2" r="1.5" fill="white"/>
      <!-- Brows -->
      <path d="M-11,-3 Q-4,-7 3,-3" stroke="#3e2723" stroke-width="2" fill="none"/>
      <path d="M7,-3 Q14,-7 21,-3" stroke="#3e2723" stroke-width="2" fill="none"/>
      <!-- Amazed open mouth -->
      <ellipse cx="4" cy="28" rx="4" ry="4.5" fill="#c62828" opacity="0.75"/>
      <!-- Cheeks -->
      <circle cx="-12" cy="8" r="6" fill="#ef9a9a" opacity="0.4"/>
      <circle cx="20" cy="8" r="6" fill="#ef9a9a" opacity="0.4"/>
    </g>

    <!-- FISHERMAN ANDREW (kneeling, pulling net) -->
    <g transform="translate(33,8)">
      <path d="M-12,14 L-10,66 L18,66 L20,14 Q8,4 3,2 Q-3,4 -12,14Z" fill="#26a69a"/>
      <rect x="-10" y="42" width="28" height="7" rx="3" fill="#00796b"/>
      <rect x="-8" y="62" width="10" height="22" rx="4" fill="#a1887f"/>
      <rect x="5" y="62" width="10" height="22" rx="4" fill="#8d6e63"/>
      <!-- Arms -->
      <path d="M-12,22 Q-24,36 -22,50" stroke="#26a69a" stroke-width="12" fill="none" stroke-linecap="round"/>
      <circle cx="-21" cy="52" r="9" fill="#ffccbc"/>
      <path d="M20,22 Q30,36 28,50" stroke="#26a69a" stroke-width="12" fill="none" stroke-linecap="round"/>
      <circle cx="28" cy="52" r="9" fill="#ffccbc"/>
      <!-- Head -->
      <circle cx="3" cy="4" r="20" fill="#ffccbc"/>
      <!-- Hair -->
      <path d="M-14,-2 Q3,-16 20,-2 Q18,-8 3,-10 Q-12,-8 -14,-2Z" fill="#5d4037"/>
      <!-- Eyes (wide, amazed) -->
      <circle cx="-5" cy="1" r="4" fill="#4e342e"/>
      <circle cx="11" cy="1" r="4" fill="#4e342e"/>
      <circle cx="-4" cy="0" r="1.5" fill="white"/>
      <circle cx="12" cy="0" r="1.5" fill="white"/>
      <!-- Open mouth amazed -->
      <ellipse cx="3" cy="12" rx="4" ry="4.5" fill="#c62828" opacity="0.7"/>
      <!-- Cheeks -->
      <circle cx="-11" cy="6" r="6" fill="#ef9a9a" opacity="0.4"/>
      <circle cx="17" cy="6" r="6" fill="#ef9a9a" opacity="0.4"/>
    </g>
  </g>

  <!-- JESUS (on shore, left) -->
  <g transform="translate(110,205)">
    <ellipse cx="52" cy="200" rx="40" ry="9" fill="#a07050" opacity="0.22"/>
    <!-- White robe -->
    <path d="M10,55 Q6,150 2,200 Q52,212 103,200 Q98,150 96,55 Q78,38 52,35 Q28,38 10,55Z" fill="#f5f5f5"/>
    <!-- Blue sash -->
    <rect x="8" y="108" width="94" height="9" rx="4" fill="#1565c0" opacity="0.55"/>
    <!-- Legs -->
    <rect x="34" y="192" width="13" height="42" rx="5" fill="#f0f0f0"/>
    <rect x="55" y="192" width="13" height="42" rx="5" fill="#e8e8e8"/>
    <!-- Sandals -->
    <ellipse cx="40" cy="235" rx="12" ry="5" fill="#8d6e63"/>
    <ellipse cx="61" cy="235" rx="12" ry="5" fill="#8d6e63"/>
    <!-- Arms: one beckoning open toward boat -->
    <path d="M10,65 Q-16,88 -20,115" stroke="#f5f5f5" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-19" cy="117" r="11" fill="#ffccbc"/>
    <path d="M96,65 Q125,78 128,64" stroke="#f5f5f5" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="129" cy="61" r="11" fill="#ffccbc"/>
    <!-- Head -->
    <circle cx="52" cy="28" r="26" fill="#ffccbc"/>
    <!-- Hair -->
    <path d="M28,18 Q52,-4 76,18 Q74,8 52,5 Q30,8 28,18Z" fill="#795548"/>
    <!-- Hair sides -->
    <path d="M28,20 Q22,52 26,78" stroke="#795548" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M76,20 Q82,52 78,78" stroke="#795548" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Beard -->
    <path d="M30,44 Q33,62 52,68 Q71,62 74,44" fill="#8d6e63" opacity="0.6"/>
    <!-- Eyes -->
    <circle cx="40" cy="22" r="4" fill="#4e342e"/>
    <circle cx="64" cy="22" r="4" fill="#4e342e"/>
    <circle cx="41" cy="21" r="1.5" fill="white"/>
    <circle cx="65" cy="21" r="1.5" fill="white"/>
    <!-- Brows -->
    <path d="M34,15 Q40,11 46,15" stroke="#6d4c41" stroke-width="2" fill="none"/>
    <path d="M58,15 Q64,11 70,15" stroke="#6d4c41" stroke-width="2" fill="none"/>
    <!-- Big warm smile -->
    <path d="M38,40 Q52,52 66,40" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="32" cy="32" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="72" cy="32" r="8" fill="#ef9a9a" opacity="0.4"/>
    <!-- Neck -->
    <rect x="45" y="52" width="14" height="13" rx="4" fill="#ffccbc"/>
  </g>

  <!-- Seagulls -->
  <g stroke="#795548" stroke-width="2.5" fill="none" opacity="0.6">
    <path d="M315,162 Q325,155 335,162"/>
    <path d="M348,142 Q360,135 372,142"/>
    <path d="M258,178 Q268,172 278,178"/>
  </g>

  <!-- Rocks on shore -->
  <ellipse cx="92" cy="384" rx="20" ry="9" fill="#90a4ae" opacity="0.65"/>
  <ellipse cx="108" cy="390" rx="14" ry="7" fill="#78909c" opacity="0.65"/>
  <ellipse cx="700" cy="380" rx="18" ry="8" fill="#90a4ae" opacity="0.55"/>
</svg>
