<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="jc_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="60%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
    <linearGradient id="jc_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="400" fill="url(#jc_sky)"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="60" rx="80" ry="35" fill="white" opacity="0.8"/>
  <ellipse cx="160" cy="50" rx="60" ry="30" fill="white" opacity="0.9"/>
  <ellipse cx="80" cy="55" rx="50" ry="28" fill="white" opacity="0.8"/>
  <ellipse cx="600" cy="50" rx="90" ry="38" fill="white" opacity="0.8"/>
  <ellipse cx="645" cy="40" rx="65" ry="30" fill="white" opacity="0.9"/>
  <ellipse cx="555" cy="48" rx="55" ry="28" fill="white" opacity="0.7"/>
  <!-- Sun -->
  <circle cx="720" cy="70" r="45" fill="#fef08a"/>
  <circle cx="720" cy="70" r="35" fill="#fde047"/>
  <!-- Sun rays -->
  <line x1="720" y1="15" x2="720" y2="5" stroke="#fde047" stroke-width="3"/>
  <line x1="762" y1="28" x2="772" y2="18" stroke="#fde047" stroke-width="3"/>
  <line x1="775" y1="70" x2="787" y2="70" stroke="#fde047" stroke-width="3"/>
  <line x1="762" y1="112" x2="772" y2="122" stroke="#fde047" stroke-width="3"/>
  <line x1="678" y1="28" x2="668" y2="18" stroke="#fde047" stroke-width="3"/>
  <line x1="665" y1="70" x2="653" y2="70" stroke="#fde047" stroke-width="3"/>
  <!-- Green field -->
  <rect x="0" y="280" width="800" height="120" fill="url(#jc_ground)"/>
  <!-- Flowers -->
  <circle cx="60" cy="285" r="6" fill="#f472b6"/>
  <circle cx="58" cy="285" r="4" fill="#fbbf24"/>
  <circle cx="130" cy="288" r="6" fill="#a78bfa"/>
  <circle cx="200" cy="282" r="7" fill="#fb923c"/>
  <circle cx="320" cy="287" r="6" fill="#f472b6"/>
  <circle cx="450" cy="283" r="6" fill="#fde047"/>
  <circle cx="570" cy="286" r="7" fill="#34d399"/>
  <circle cx="650" cy="284" r="6" fill="#f472b6"/>
  <circle cx="740" cy="287" r="6" fill="#a78bfa"/>
  <!-- Flower stems -->
  <line x1="60" y1="291" x2="60" y2="300" stroke="#16a34a" stroke-width="2"/>
  <line x1="130" y1="294" x2="130" y2="303" stroke="#16a34a" stroke-width="2"/>
  <line x1="200" y1="289" x2="200" y2="300" stroke="#16a34a" stroke-width="2"/>
  <!-- Hills background -->
  <ellipse cx="200" cy="285" rx="220" ry="60" fill="#86efac" opacity="0.5"/>
  <ellipse cx="600" cy="285" rx="240" ry="55" fill="#86efac" opacity="0.5"/>
  <!-- Jesus seated center -->
  <rect x="360" y="220" width="80" height="110" rx="15" fill="#ffffff"/>
  <circle cx="400" cy="205" r="32" fill="#fde68a"/>
  <!-- Jesus hair -->
  <ellipse cx="400" cy="195" rx="32" ry="20" fill="#92400e"/>
  <rect x="375" y="205" width="10" height="30" rx="5" fill="#92400e"/>
  <rect x="415" y="205" width="10" height="30" rx="5" fill="#92400e"/>
  <!-- Jesus face smiling -->
  <circle cx="390" cy="204" r="5" fill="#78350f"/>
  <circle cx="410" cy="204" r="5" fill="#78350f"/>
  <path d="M386,215 Q400,226 414,215" stroke="#92400e" stroke-width="2.5" fill="none"/>
  <!-- Jesus arms open wide -->
  <line x1="360" y1="250" x2="310" y2="235" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <line x1="440" y1="250" x2="490" y2="235" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <!-- Children around Jesus -->
  <!-- Child 1 - left, yellow dress -->
  <rect x="258" y="265" width="35" height="60" rx="10" fill="#fde047"/>
  <circle cx="275" cy="254" r="18" fill="#fbbf24"/>
  <ellipse cx="275" cy="244" rx="18" ry="10" fill="#92400e"/>
  <!-- pigtails -->
  <circle cx="258" cy="247" r="7" fill="#92400e"/>
  <circle cx="292" cy="247" r="7" fill="#92400e"/>
  <!-- smile -->
  <path d="M269,258 Q275,264 281,258" stroke="#78350f" stroke-width="2" fill="none"/>
  <!-- Child 2 - right, green -->
  <rect x="510" y="268" width="35" height="60" rx="10" fill="#4ade80"/>
  <circle cx="527" cy="257" r="18" fill="#fbbf24"/>
  <ellipse cx="527" cy="247" rx="18" ry="10" fill="#78350f"/>
  <path d="M521,261 Q527,267 533,261" stroke="#78350f" stroke-width="2" fill="none"/>
  <!-- Child 3 - near left, purple -->
  <rect x="305" y="275" width="30" height="55" rx="9" fill="#c084fc"/>
  <circle cx="320" cy="265" r="16" fill="#fde68a"/>
  <ellipse cx="320" cy="256" rx="16" ry="9" fill="#7c3aed"/>
  <path d="M315,269 Q320,275 325,269" stroke="#78350f" stroke-width="2" fill="none"/>
  <!-- Child 4 - near right, orange -->
  <rect x="468" y="272" width="30" height="58" rx="9" fill="#fb923c"/>
  <circle cx="483" cy="262" r="16" fill="#fbbf24"/>
  <ellipse cx="483" cy="253" rx="16" ry="9" fill="#b45309"/>
  <path d="M478,266 Q483,272 488,266" stroke="#78350f" stroke-width="2" fill="none"/>
  <!-- Child 5 - sitting near Jesus, red -->
  <rect x="415" y="285" width="28" height="50" rx="8" fill="#ef4444"/>
  <circle cx="429" cy="275" r="15" fill="#fde68a"/>
  <ellipse cx="429" cy="267" rx="15" ry="8" fill="#92400e"/>
  <!-- Child 6 - sitting left of Jesus, blue -->
  <rect x="355" y="288" width="28" height="45" rx="8" fill="#60a5fa"/>
  <circle cx="369" cy="278" r="15" fill="#fbbf24"/>
  <ellipse cx="369" cy="270" rx="15" ry="8" fill="#7c3aed"/>
  <!-- Tree on the right -->
  <rect x="720" y="220" width="20" height="100" rx="5" fill="#92400e"/>
  <circle cx="730" cy="190" r="55" fill="#22c55e"/>
  <circle cx="700" cy="210" r="35" fill="#16a34a"/>
  <circle cx="760" cy="208" r="35" fill="#16a34a"/>
  <!-- Tree left -->
  <rect x="60" y="225" width="18" height="95" rx="5" fill="#92400e"/>
  <circle cx="69" cy="196" r="50" fill="#22c55e"/>
  <circle cx="42" cy="215" r="32" fill="#16a34a"/>
  <circle cx="96" cy="213" r="32" fill="#16a34a"/>
</svg>
