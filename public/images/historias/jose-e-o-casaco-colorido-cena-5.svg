<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyJC5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffcc80"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyJC5)"/>
  <!-- Pyramids background -->
  <polygon points="500,280 580,130 660,280" fill="#ffb300" opacity="0.75"/>
  <polygon points="620,280 690,158 760,280" fill="#ff8f00" opacity="0.6"/>
  <!-- Ground -->
  <rect x="0" y="280" width="800" height="100" fill="#ffcc80"/>
  <!-- Column/throne area -->
  <rect x="170" y="160" width="18" height="128" rx="4" fill="#ffb300" opacity="0.7"/>
  <rect x="215" y="150" width="18" height="138" rx="4" fill="#ffa000" opacity="0.6"/>
  <rect x="155" y="148" width="85" height="18" rx="4" fill="#ff8f00" opacity="0.7"/>
  <!-- Throne -->
  <rect x="145" y="168" width="105" height="88" rx="8" fill="#ff8f00" opacity="0.8"/>
  <rect x="152" y="175" width="91" height="75" rx="6" fill="#ffe082"/>
  <!-- JOSE as governor (on throne, gold/blue robes) -->
  <g transform="translate(162,120)">
    <ellipse cx="42" cy="138" rx="36" ry="8" fill="#e65100" opacity="0.2"/>
    <!-- Egyptian-style robe -->
    <path d="M5,50 Q2,125 -2,138 Q42,148 86,138 Q82,125 80,50 Q64,34 42,31 Q22,34 5,50Z" fill="#1565c0"/>
