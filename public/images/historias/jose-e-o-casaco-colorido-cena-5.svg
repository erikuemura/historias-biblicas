    <rect x="24" y="130" width="11" height="35" rx="5" fill="#1565c0" opacity="0.7"/>
    <rect x="43" y="130" width="11" height="35" rx="5" fill="#0d47a1" opacity="0.7"/>
    <!-- Head -->
    <circle cx="42" cy="24" r="24" fill="#ffccbc"/>
    <!-- Egyptian collar/necklace -->
    <path d="M20,48 Q42,56 64,48 Q62,62 42,66 Q22,62 20,48Z" fill="#ffd54f" opacity="0.8"/>
    <path d="M22,14 Q42,-3 62,14 Q60,5 42,2 Q24,5 22,14Z" fill="#4e342e"/>
    <circle cx="31" cy="18" r="4" fill="#4e342e"/>
    <circle cx="53" cy="18" r="4" fill="#4e342e"/>
    <circle cx="32" cy="17" r="1.5" fill="white"/>
    <circle cx="54" cy="17" r="1.5" fill="white"/>
    <!-- Kind warm smile -->
    <path d="M28,33 Q42,44 56,33" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="23" cy="27" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="61" cy="27" r="8" fill="#ef9a9a" opacity="0.4"/>
    <rect x="35" y="46" width="14" height="12" rx="4" fill="#ffccbc"/>
    <!-- Arms open embracing -->
    <path d="M5,58 Q-18,72 -22,98" stroke="#1565c0" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-21" cy="100" r="11" fill="#ffccbc"/>
    <path d="M80,58 Q102,72 106,98" stroke="#1565c0" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="106" cy="100" r="11" fill="#ffccbc"/>
  </g>
  <!-- BROTHERS bowing (3 simplified figures kneeling) -->
  <g transform="translate(295,218)">
    <!-- Brother 1 bowing -->
    <ellipse cx="35" cy="62" rx="28" ry="8" fill="#e65100" opacity="0.2"/>
    <path d="M8,10 Q8,45 5,62 Q35,68 65,62 Q60,45 62,10 Q50,2 35,0 Q20,2 8,10Z" fill="#ef6c00"/>
