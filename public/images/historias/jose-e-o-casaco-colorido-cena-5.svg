    <path d="M18,-22 Q35,-34 52,-22 Q50,-28 35,-30 Q20,-28 18,-22Z" fill="#3e2723"/>
    <!-- Head bowing down -->
    <path d="M35,0 Q35,-12 35,-14" stroke="#e8a87a" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(390,225)">
    <ellipse cx="32" cy="55" rx="26" ry="7" fill="#e65100" opacity="0.2"/>
    <path d="M6,10 Q6,42 4,55 Q32,62 60,55 Q58,42 58,10 Q48,2 32,0 Q18,2 6,10Z" fill="#26a69a"/>
    <circle cx="32" cy="-12" r="18" fill="#ffccbc"/>
    <path d="M16,-20 Q32,-32 48,-20 Q46,-26 32,-28 Q18,-26 16,-20Z" fill="#5d4037"/>
    <path d="M32,0 Q32,-10 32,-12" stroke="#ffccbc" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(475,218)">
    <ellipse cx="32" cy="62" rx="26" ry="8" fill="#e65100" opacity="0.2"/>
    <path d="M6,10 Q6,48 4,62 Q32,68 60,62 Q58,48 58,10 Q48,2 32,0 Q18,2 6,10Z" fill="#8e24aa"/>
    <circle cx="32" cy="-14" r="18" fill="#e8a87a"/>
    <path d="M16,-22 Q32,-34 48,-22 Q46,-28 32,-30 Q18,-28 16,-22Z" fill="#3e2723"/>
    <path d="M32,0 Q32,-12 32,-14" stroke="#e8a87a" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Sparkles of reunion joy -->
  <g fill="#fff176" opacity="0.75">
    <circle cx="255" cy="200" r="4"/><circle cx="590" cy="195" r="4"/>
    <circle cx="420" cy="178" r="3.5"/><circle cx="260" cy="245" r="2.5"/>
  </g>
</svg>
