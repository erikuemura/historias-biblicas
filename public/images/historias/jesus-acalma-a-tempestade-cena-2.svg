<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyJAT2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474f"/>
      <stop offset="40%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
    <linearGradient id="waterJAT2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyJAT2)"/>
  <!-- Dark storm clouds -->
  <ellipse cx="200" cy="80" rx="130" ry="65" fill="#263238" opacity="0.9"/>
  <ellipse cx="150" cy="95" rx="90" ry="50" fill="#1c313a" opacity="0.95"/>
  <ellipse cx="260" cy="85" rx="100" ry="55" fill="#263238" opacity="0.85"/>
  <ellipse cx="500" cy="70" rx="140" ry="68" fill="#37474f" opacity="0.9"/>
  <ellipse cx="450" cy="85" rx="95" ry="52" fill="#263238" opacity="0.95"/>
  <ellipse cx="580" cy="78" rx="110" ry="58" fill="#1c313a" opacity="0.9"/>
  <ellipse cx="700" cy="90" rx="120" ry="60" fill="#263238" opacity="0.85"/>
  <!-- Lightning -->
  <polyline points="280,100 268,140 278,140 262,190" stroke="#fff176" stroke-width="3" fill="none" opacity="0.9"/>
  <polyline points="560,85 548,130 558,130 542,178" stroke="#fff176" stroke-width="2.5" fill="none" opacity="0.85"/>
