    <path d="M228,-10 Q278,-48 225,-68 Q185,-35 228,-10Z" fill="white" opacity="0.7"/>
    <!-- Frightened disciples -->
    <g transform="translate(50,22)">
      <path d="M0,30 L-1,65 L20,65 L21,30 Q10,22 8,20 Q4,22 0,30Z" fill="#546e7a"/>
      <circle cx="10" cy="10" r="12" fill="#e8a87a"/>
      <!-- Scared eyes wide -->
      <circle cx="5" cy="8" r="3.5" fill="#3e2723"/>
      <circle cx="15" cy="8" r="3.5" fill="#3e2723"/>
      <circle cx="5.5" cy="7.5" r="1.5" fill="white"/>
      <circle cx="15.5" cy="7.5" r="1.5" fill="white"/>
      <!-- Scared mouth open -->
      <path d="M4,18 Q10,14 16,18" stroke="#c62828" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(130,16)">
      <path d="M0,30 L-1,68 L20,68 L21,30 Q10,22 8,20 Q4,22 0,30Z" fill="#ef6c00"/>
      <circle cx="10" cy="10" r="12" fill="#ffccbc"/>
      <circle cx="5" cy="8" r="3.5" fill="#4e342e"/>
      <circle cx="15" cy="8" r="3.5" fill="#4e342e"/>
      <circle cx="5.5" cy="7.5" r="1.5" fill="white"/>
      <circle cx="15.5" cy="7.5" r="1.5" fill="white"/>
      <path d="M4,18 Q10,14 16,18" stroke="#c62828" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(320,18)">
      <path d="M0,30 L-1,66 L20,66 L21,30 Q10,22 8,20 Q4,22 0,30Z" fill="#26a69a"/>
      <circle cx="10" cy="10" r="12" fill="#e8a87a"/>
      <circle cx="5" cy="8" r="3.5" fill="#3e2723"/>
      <circle cx="15" cy="8" r="3.5" fill="#3e2723"/>
      <circle cx="5.5" cy="7.5" r="1.5" fill="white"/>
      <circle cx="15.5" cy="7.5" r="1.5" fill="white"/>
      <path d="M4,18 Q10,14 16,18" stroke="#c62828" stroke-width="2" fill="none"/>
    </g>
    <!-- JESUS still sleeping -->
    <g transform="translate(395,32)">
      <ellipse cx="32" cy="42" rx="40" ry="10" fill="#ffe082"/>
      <path d="M0,30 Q32,16 64,20 Q66,34 64,38 Q32,42 0,38Z" fill="white"/>
      <circle cx="5" cy="26" r="18" fill="#ffccbc"/>
      <path d="M-8,17 Q5,6 18,17 Q16,10 5,7 Q-6,10 -8,17Z" fill="#5d4037"/>
      <path d="M-2,22 Q3,18 9,22" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M1,22 Q7,18 13,22" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M-3,32 Q5,37 13,32" stroke="#c62828" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
