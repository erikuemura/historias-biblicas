    <line x1="160" y1="145" x2="150" y2="205"/><line x1="220" y1="135" x2="210" y2="195"/>
    <line x1="280" y1="150" x2="270" y2="210"/><line x1="340" y1="140" x2="330" y2="200"/>
    <line x1="400" y1="148" x2="390" y2="208"/><line x1="460" y1="138" x2="450" y2="198"/>
    <line x1="520" y1="152" x2="510" y2="212"/><line x1="580" y1="142" x2="570" y2="202"/>
    <line x1="640" y1="148" x2="630" y2="208"/><line x1="700" y1="136" x2="690" y2="196"/>
    <line x1="760" y1="144" x2="750" y2="204"/>
    <line x1="75" y1="165" x2="65" y2="225"/><line x1="135" y1="158" x2="125" y2="218"/>
    <line x1="195" y1="172" x2="185" y2="232"/><line x1="255" y1="162" x2="245" y2="222"/>
  </g>
  <!-- Rough waves -->
  <rect x="0" y="268" width="800" height="112" fill="url(#waterJAT2)"/>
  <path d="M0,272 Q50,258 100,272 Q150,286 200,272 Q250,258 300,272 Q350,286 400,272 Q450,258 500,272 Q550,286 600,272 Q650,258 700,272 Q750,286 800,272" fill="none" stroke="#1565c0" stroke-width="5" opacity="0.7"/>
  <path d="M0,288 Q60,274 120,288 Q180,302 240,288 Q300,274 360,288 Q420,302 480,288 Q540,274 600,288 Q660,302 720,288 Q760,280 800,288" fill="#0d47a1" opacity="0.5"/>
  <!-- Boat tossing -->
  <g transform="translate(130,210) rotate(-8,240,80)">
    <path d="M0,55 Q240,32 480,55 Q470,95 240,103 Q10,95 0,55Z" fill="#8d6e63"/>
    <path d="M10,60 Q240,38 470,60 Q460,88 240,94 Q20,88 10,60Z" fill="#a1887f"/>
