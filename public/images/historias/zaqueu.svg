<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="zqh_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bbf7d0"/><stop offset="100%" stop-color="#4ade80"/></linearGradient>
    <radialGradient id="zqh_tree" cx="50%" cy="30%"><stop offset="0%" stop-color="#15803d"/><stop offset="100%" stop-color="#166534"/></radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#zqh_sky)"/>
  <!-- ground -->
  <ellipse cx="400" cy="410" rx="600" ry="90" fill="#15803d"/>
  <!-- tree trunk -->
  <rect x="360" y="180" width="60" height="200" rx="12" fill="#78350f"/>
  <!-- tree foliage - sycamore -->
  <ellipse cx="390" cy="160" rx="140" ry="100" fill="url(#zqh_tree)"/>
  <ellipse cx="340" cy="130" rx="80" ry="70" fill="#16a34a"/>
  <ellipse cx="440" cy="140" rx="90" ry="75" fill="#15803d"/>
  <ellipse cx="390" cy="100" rx="70" ry="55" fill="#22c55e"/>
  <!-- Zaqueu in tree - small well-dressed man -->
  <ellipse cx="420" cy="170" rx="16" ry="18" fill="#fde68a"/>
  <rect x="406" y="186" width="28" height="30" rx="6" fill="#7c3aed"/>
  <!-- crowd below - silhouettes -->
  <ellipse cx="150" cy="345" rx="18" ry="22" fill="#78350f"/>
  <rect x="134" y="364" width="32" height="38" rx="7" fill="#92400e"/>
  <ellipse cx="220" cy="340" rx="16" ry="20" fill="#b45309"/>
  <rect x="206" y="358" width="28" height="36" rx="6" fill="#d97706"/>
  <ellipse cx="600" cy="342" rx="18" ry="22" fill="#78350f"/>
  <rect x="584" y="361" width="32" height="38" rx="7" fill="#92400e"/>
  <ellipse cx="670" cy="345" rx="16" ry="20" fill="#b45309"/>
  <rect x="656" y="363" width="28" height="36" rx="6" fill="#d97706"/>
  <!-- Jesus figure below tree looking up -->
  <ellipse cx="390" cy="310" rx="20" ry="24" fill="#fde68a"/>
  <rect x="372" y="332" width="36" height="50" rx="8" fill="#f97316"/>
  <!-- arms raised toward Zaqueu -->
  <line x1="372" y1="345" x2="350" y2="325" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
  <line x1="408" y1="345" x2="430" y2="325" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
</svg>
