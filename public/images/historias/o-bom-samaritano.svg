<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bsh_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <radialGradient id="bsh_sun" cx="50%" cy="50%"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#f59e0b"/></radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bsh_sky)"/>
  <!-- sun -->
  <circle cx="120" cy="80" r="45" fill="url(#bsh_sun)"/>
  <!-- rocky road terrain -->
  <ellipse cx="400" cy="430" rx="600" ry="110" fill="#d97706"/>
  <ellipse cx="400" cy="400" rx="500" ry="80" fill="#b45309"/>
  <!-- road marks -->
  <rect x="350" y="340" width="100" height="10" rx="3" fill="#92400e" opacity="0.4"/>
  <!-- rocks -->
  <ellipse cx="200" cy="340" rx="35" ry="22" fill="#78350f"/>
  <ellipse cx="600" cy="330" rx="40" ry="25" fill="#78350f"/>
  <ellipse cx="160" cy="355" rx="20" ry="14" fill="#92400e"/>
  <!-- Samaritan kneeling beside injured man -->
  <!-- injured man lying down -->
  <ellipse cx="480" cy="330" rx="50" ry="15" fill="#fde68a" opacity="0.7"/>
  <!-- samaritan kneeling -->
  <ellipse cx="380" cy="295" rx="20" ry="23" fill="#fde68a"/>
  <rect x="362" y="315" width="36" height="45" rx="8" fill="#f97316"/>
  <!-- arm reaching to help -->
  <line x1="395" y1="320" x2="435" y2="320" stroke="#f97316" stroke-width="9" stroke-linecap="round"/>
  <!-- donkey in background -->
  <ellipse cx="620" cy="310" rx="55" ry="30" fill="#78350f"/>
  <ellipse cx="580" cy="295" rx="22" ry="18" fill="#92400e"/>
  <line x1="590" y1="315" x2="585" y2="355" stroke="#78350f" stroke-width="8" stroke-linecap="round"/>
  <line x1="610" y1="318" x2="605" y2="358" stroke="#78350f" stroke-width="8" stroke-linecap="round"/>
  <!-- heart symbol -->
  <text x="400" y="200" font-size="40" text-anchor="middle" fill="#fb923c" opacity="0.5">♥</text>
</svg>
