<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="pa4_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="pa4_sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#pa4_sky)"/>
  <!-- Very dark storm clouds - maximum storm -->
  <ellipse cx="100" cy="50" rx="180" ry="75" fill="#0f172a" opacity="0.95"/>
  <ellipse cx="50" cy="38" rx="110" ry="58" fill="#020617"/>
  <ellipse cx="420" cy="45" rx="200" ry="70" fill="#0f172a" opacity="0.9"/>
  <ellipse cx="700" cy="52" rx="170" ry="68" fill="#0f172a" opacity="0.9"/>
  <!-- Multiple lightning bolts -->
  <path d="M150 15 L136 55 L155 55 L136 98" stroke="#fef9c3" stroke-width="3" fill="none" opacity="0.9"/>
  <path d="M450 20 L435 62 L452 62 L432 108" stroke="#fef9c3" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M680 18 L666 58 L683 58 L664 100" stroke="#fef9c3" stroke-width="2.5" fill="none" opacity="0.7"/>
  <!-- Very rough sea -->
  <rect x="0" y="180" width="800" height="200" fill="url(#pa4_sea)"/>
  <!-- Big dramatic waves -->
  <path d="M0,195 Q40,165 80,200 Q120,238 160,195 Q200,158 240,200 Q280,238 320,192 Q360,155 400,198 Q440,238 480,195 Q520,158 560,198 Q600,238 640,195 Q680,158 720,200 Q760,240 800,195" fill="#2563eb" opacity="0.8"/>
  <path d="M0,228 Q60,200 120,235 Q180,268 240,228 Q300,192 360,235 Q420,270 480,228 Q540,190 600,235 Q660,270 720,228 Q760,208 800,228" fill="#1d4ed8" opacity="0.6"/>
  <path d="M0,260 Q80,238 160,268 Q240,298 320,258 Q400,222 480,265 Q560,300 640,260 Q720,225 800,262" fill="#1e3a8a" opacity="0.5"/>
  <!-- Heavy foam on waves -->
  <ellipse cx="80" cy="200" rx="32" ry="9" fill="white" opacity="0.5"/>
  <ellipse cx="240" cy="200" rx="35" ry="9" fill="white" opacity="0.5"/>
  <ellipse cx="400" cy="200" rx="32" ry="9" fill="white" opacity="0.5"/>
  <ellipse cx="560" cy="200" rx="35" ry="9" fill="white" opacity="0.5"/>
  <ellipse cx="720" cy="200" rx="32" ry="9" fill="white" opacity="0.5"/>
  <!-- Peter sinking! - in center of image - big waves around him -->
  <!-- Wave crashing over Peter -->
  <ellipse cx="400" cy="255" rx="85" ry="35" fill="#2563eb" opacity="0.7"/>
  <ellipse cx="400" cy="248" rx="70" ry="25" fill="#3b82f6" opacity="0.5"/>
  <!-- Peter - only upper body visible, sinking fast -->
  <!-- Just head and arms above water -->
  <circle cx="400" cy="215" r="28" fill="#fbbf24"/>
  <ellipse cx="400" cy="204" rx="28" ry="16" fill="#92400e"/>
  <!-- Peter extremely scared face -->
  <!-- Wide open terrified eyes -->
  <ellipse cx="390" cy="213" rx="7" ry="8" fill="white" opacity="0.9"/>
  <ellipse cx="410" cy="213" rx="7" ry="8" fill="white" opacity="0.9"/>
  <circle cx="391" cy="214" r="4.5" fill="#451a03"/>
  <circle cx="411" cy="214" r="4.5" fill="#451a03"/>
  <!-- light reflection in eyes scared -->
  <circle cx="392" cy="212" r="2" fill="white"/>
  <circle cx="412" cy="212" r="2" fill="white"/>
  <!-- Screaming mouth -->
  <ellipse cx="400" cy="226" rx="8" ry="9" fill="#92400e"/>
  <!-- Arms flailing above water desperately -->
  <line x1="380" y1="228" x2="330" y2="195" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <ellipse cx="324" cy="191" rx="15" ry="13" fill="#fbbf24"/>
  <line x1="420" y1="228" x2="468" y2="195" stroke="#4b5563" stroke-width="10" stroke-linecap="round"/>
  <ellipse cx="474" cy="191" rx="15" ry="13" fill="#fbbf24"/>
  <!-- Torso barely visible -->
  <rect x="374" y="232" width="52" height="40" rx="10" fill="#4b5563" opacity="0.7"/>
  <!-- Water splashing around Peter -->
  <path d="M340,245 Q360,220 380,255" stroke="#7dd3fc" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M420,255 Q440,220 460,245" stroke="#7dd3fc" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Jesus coming to rescue - glowing -->
  <circle cx="195" cy="195" r="80" fill="#fef9c3" opacity="0.2"/>
  <rect x="163" y="185" width="66" height="110" rx="13" fill="#ffffff"/>
  <circle cx="196" cy="170" r="30" fill="#fde68a"/>
  <ellipse cx="196" cy="158" rx="30" ry="17" fill="#92400e"/>
  <!-- Jesus urgent expression reaching for Peter -->
  <circle cx="187" cy="168" r="4.5" fill="#78350f"/>
  <circle cx="205" cy="168" r="4.5" fill="#78350f"/>
  <path d="M183,180 Q196,190 209,180" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- Jesus arm reaching urgently toward Peter -->
  <line x1="229" y1="210" x2="310" y2="215" stroke="#fde68a" stroke-width="11" stroke-linecap="round"/>
  <ellipse cx="317" cy="217" rx="15" ry="13" fill="#fde68a"/>
  <!-- Boat in background very distant -->
  <ellipse cx="650" cy="265" rx="100" ry="22" fill="#92400e" opacity="0.7"/>
  <rect x="562" y="246" width="176" height="26" rx="8" fill="#78350f" opacity="0.7"/>
  <!-- Small heads in boat -->
  <circle cx="590" cy="240" r="10" fill="#fde68a" opacity="0.7"/>
  <circle cx="615" cy="240" r="10" fill="#fbbf24" opacity="0.7"/>
  <circle cx="640" cy="240" r="10" fill="#d97706" opacity="0.7"/>
  <circle cx="665" cy="240" r="10" fill="#fde68a" opacity="0.7"/>
  <circle cx="690" cy="240" r="10" fill="#fbbf24" opacity="0.7"/>
</svg>
