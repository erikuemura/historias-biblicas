    <rect x="720" y="180" width="7" height="170" rx="3"/>
    <ellipse cx="723" cy="178" rx="11" ry="20" fill="#7cb342"/>
  </g>
  <!-- River bank / ground -->
  <rect x="0" y="310" width="800" height="70" fill="#ffcc80"/>
