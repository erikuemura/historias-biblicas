    <path d="M35,36 Q48,44 61,36" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="25" cy="30" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="71" cy="30" r="8" fill="#ef9a9a" opacity="0.4"/>
    <rect x="40" y="52" width="16" height="14" rx="4" fill="#e8a87a"/>
