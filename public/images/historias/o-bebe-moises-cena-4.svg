  <rect x="0" y="270" width="800" height="60" fill="url(#skyBM4)" opacity="0.7"/>
  <path d="M0,275 Q200,268 400,275 Q600,282 800,275" fill="none" stroke="#80deea" stroke-width="2.5" opacity="0.5"/>
