    <circle cx="35" cy="22" r="4" fill="#3e2723"/>
    <circle cx="61" cy="22" r="4" fill="#3e2723"/>
    <circle cx="36" cy="21" r="1.5" fill="white"/>
    <circle cx="62" cy="21" r="1.5" fill="white"/>
