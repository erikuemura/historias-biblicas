  <ellipse cx="425" cy="179" rx="10" ry="5" fill="#dc2626"/>
  <!-- Other servants/guests in background watching with surprise -->
  <rect x="560" y="195" width="46" height="145" rx="10" fill="#4b5563"/>
  <circle cx="583" cy="183" r="21" fill="#d97706"/>
  <ellipse cx="583" cy="174" rx="21" ry="12" fill="#78350f"/>
  <!-- also surprised -->
  <ellipse cx="576" cy="182" rx="5" ry="6" fill="white" opacity="0.8"/>
  <ellipse cx="590" cy="182" rx="5" ry="6" fill="white" opacity="0.8"/>
  <circle cx="577" cy="183" r="3" fill="#451a03"/>
  <circle cx="591" cy="183" r="3" fill="#451a03"/>
  <ellipse cx="583" cy="193" rx="4" ry="5" fill="#92400e"/>
  <rect x="620" y="200" width="44" height="140" rx="10" fill="#374151"/>
  <circle cx="642" cy="188" r="21" fill="#fbbf24"/>
  <ellipse cx="642" cy="179" rx="21" ry="12" fill="#374151"/>
  <ellipse cx="635" cy="187" rx="5" ry="6" fill="white" opacity="0.8"/>
  <ellipse cx="649" cy="187" rx="5" ry="6" fill="white" opacity="0.8"/>
  <circle cx="636" cy="188" r="3" fill="#451a03"/>
  <circle cx="650" cy="188" r="3" fill="#451a03"/>
  <ellipse cx="642" cy="198" rx="4" ry="5" fill="#92400e"/>
  <!-- Servant on left carrying a cup to the head waiter -->
  <rect x="135" y="192" width="46" height="148" rx="10" fill="#4b5563"/>
  <circle cx="158" cy="180" r="21" fill="#fbbf24"/>
  <ellipse cx="158" cy="171" rx="21" ry="12" fill="#374151"/>
  <!-- excited face -->
  <circle cx="151" cy="179" r="4" fill="#78350f"/>
  <circle cx="165" cy="179" r="4" fill="#78350f"/>
  <path d="M149,190 Q158,198 167,190" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- carrying cup of wine toward banquet master -->
  <line x1="181" y1="218" x2="205" y2="205" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <!-- cup with red wine -->
  <rect x="200" y="197" width="18" height="14" rx="4" fill="#6b7280"/>
  <ellipse cx="209" cy="198" rx="9" ry="4" fill="#dc2626"/>
  <!-- Head banquet master on far left - being served -->
  <rect x="60" y="195" width="52" height="145" rx="11" fill="#1d4ed8"/>
  <circle cx="86" cy="182" r="24" fill="#d97706"/>
  <ellipse cx="86" cy="171" rx="24" ry="14" fill="#78350f"/>
  <!-- honorable headband -->
  <rect x="64" y="162" width="44" height="10" rx="3" fill="#f59e0b"/>
  <circle cx="86" cy="161" r="5" fill="#fbbf24"/>
  <!-- looking surprised at the wine -->
  <ellipse cx="79" cy="181" rx="5" ry="6" fill="white" opacity="0.8"/>
  <ellipse cx="93" cy="181" rx="5" ry="6" fill="white" opacity="0.8"/>
  <circle cx="80" cy="182" r="3" fill="#451a03"/>
  <circle cx="94" cy="182" r="3" fill="#451a03"/>
  <path d="M78,195 Q86,204 94,195" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- Jesus in background - humble smile, knowing -->
  <rect x="245" y="205" width="52" height="115" rx="11" fill="#ffffff" opacity="0.8"/>
  <circle cx="271" cy="192" r="24" fill="#fde68a" opacity="0.9"/>
  <ellipse cx="271" cy="181" rx="24" ry="14" fill="#92400e" opacity="0.9"/>
  <circle cx="263" cy="191" r="4" fill="#78350f" opacity="0.8"/>
  <circle cx="279" cy="191" r="4" fill="#78350f" opacity="0.8"/>
  <path d="M259,203 Q271,213 283,203" stroke="#78350f" stroke-width="2.5" fill="none" opacity="0.9"/>
</svg>
