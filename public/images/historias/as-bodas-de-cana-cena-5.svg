<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bc5_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbeb"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
    <linearGradient id="bc5_floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <radialGradient id="bc5_miracle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bc5_bg)"/>
  <!-- Ceiling decoration -->
  <rect x="0" y="0" width="800" height="8" fill="#f59e0b"/>
  <!-- Festive banners restored -->
  <path d="M0,22 Q100,38 200,22 Q300,6 400,22 Q500,38 600,22 Q700,6 800,22" stroke="#84cc16" stroke-width="2.5" fill="none" opacity="0.7"/>
  <polygon points="80,22 100,48 120,22" fill="#ef4444" opacity="0.7"/>
  <polygon points="300,22 320,48 340,22" fill="#10b981" opacity="0.7"/>
  <polygon points="470,22 490,48 510,22" fill="#8b5cf6" opacity="0.7"/>
  <polygon points="660,22 680,48 700,22" fill="#ef4444" opacity="0.7"/>
  <!-- Floor -->
  <rect x="0" y="320" width="800" height="60" fill="url(#bc5_floor)"/>
  <!-- The LARGE stone jar filled with WINE - red glowing -->
  <!-- Miracle glow around the main jar -->
  <circle cx="350" cy="240" r="130" fill="url(#bc5_miracle)"/>
  <!-- Main large jar - center -->
  <ellipse cx="350" cy="305" rx="45" ry="28" fill="#7f1d1d"/>
  <rect x="305" y="165" width="90" height="145" rx="22" fill="#991b1b"/>
  <ellipse cx="350" cy="166" rx="45" ry="22" fill="#b91c1c"/>
  <ellipse cx="350" cy="162" rx="36" ry="14" fill="#dc2626"/>
  <!-- RED WINE overflowing at top - the miracle visible! -->
  <ellipse cx="350" cy="164" rx="33" ry="13" fill="#dc2626"/>
  <!-- Wine dripping over side -->
  <path d="M317,175 Q310,195 315,220" stroke="#dc2626" stroke-width="5" fill="none" opacity="0.8"/>
  <path d="M383,175 Q390,195 385,220" stroke="#dc2626" stroke-width="5" fill="none" opacity="0.8"/>
  <!-- Wine shine on jar -->
  <ellipse cx="325" cy="200" rx="8" ry="25" fill="#f87171" opacity="0.3"/>
  <!-- Main servant - tasting the miracle wine - SHOCKED/AMAZED expression -->
  <!-- Servant figure center-right -->
  <rect x="460" y="175" width="58" height="165" rx="12" fill="#6b7280"/>
  <circle cx="489" cy="160" r="28" fill="#fbbf24"/>
  <ellipse cx="489" cy="149" rx="28" ry="16" fill="#374151"/>
  <!-- VERY SURPRISED face - eyes WIDE, eyebrows UP, big O mouth -->
  <!-- Wide open eyes in surprise -->
  <ellipse cx="479" cy="158" rx="8" ry="9" fill="white" opacity="0.9"/>
  <ellipse cx="499" cy="158" rx="8" ry="9" fill="white" opacity="0.9"/>
  <circle cx="480" cy="159" r="5.5" fill="#451a03"/>
  <circle cx="500" cy="159" r="5.5" fill="#451a03"/>
  <!-- light in eyes - surprised sparkle -->
  <circle cx="481" cy="157" r="2.5" fill="white"/>
  <circle cx="501" cy="157" r="2.5" fill="white"/>
  <!-- Eyebrows raised high in surprise -->
  <path d="M472,147 Q479,141 486,147" stroke="#374151" stroke-width="3" fill="none"/>
  <path d="M492,147 Q499,141 506,147" stroke="#374151" stroke-width="3" fill="none"/>
  <!-- BIG OPEN surprised mouth - O shape -->
  <ellipse cx="489" cy="174" rx="9" ry="10" fill="#92400e"/>
  <ellipse cx="489" cy="175" rx="6" ry="7" fill="#b91c1c"/>
