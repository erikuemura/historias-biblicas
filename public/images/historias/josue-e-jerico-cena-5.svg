<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="jos5_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="50%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="jos5_dust" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a060" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c8905a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="jos5_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#8b5e20"/>
    </linearGradient>
    <radialGradient id="jos5_dustcloud" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#d4a060" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d4a060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dramatic sky -->
  <rect width="800" height="380" fill="url(#jos5_sky)"/>

  <!-- Huge dust cloud from falling walls -->
  <ellipse cx="530" cy="220" rx="230" ry="160" fill="url(#jos5_dustcloud)"/>
  <ellipse cx="580" cy="260" rx="200" ry="120" fill="#d4a060" opacity="0.5"/>
  <ellipse cx="500" cy="280" rx="160" ry="80" fill="#c89050" opacity="0.4"/>
  <ellipse cx="620" cy="240" rx="140" ry="100" fill="#e0b070" opacity="0.35"/>

  <!-- Ground -->
  <rect x="0" y="318" width="800" height="62" fill="url(#jos5_ground)"/>

  <!-- FALLING WALLS — crumbling, tilted blocks -->
  <!-- Wall section 1 — tilting left -->
  <rect x="420" y="60" width="80" height="220" rx="4" fill="#c8a060" transform="rotate(-18 460 280)"/>
  <rect x="420" y="60" width="80" height="220" rx="4" fill="#b89050" opacity="0.4" transform="rotate(-18 460 280)"/>
  <!-- Stone lines on tilted wall -->
  <line x1="420" y1="100" x2="500" y2="100" stroke="#a07030" stroke-width="2" opacity="0.4" transform="rotate(-18 460 280)"/>
  <line x1="420" y1="140" x2="500" y2="140" stroke="#a07030" stroke-width="2" opacity="0.4" transform="rotate(-18 460 280)"/>
  <line x1="420" y1="180" x2="500" y2="180" stroke="#a07030" stroke-width="2" opacity="0.4" transform="rotate(-18 460 280)"/>

  <!-- Wall section 2 — tilting right -->
  <rect x="510" y="40" width="90" height="240" rx="4" fill="#b89050" transform="rotate(22 555 280)"/>
  <rect x="510" y="40" width="90" height="240" rx="4" fill="#d4b070" opacity="0.35" transform="rotate(22 555 280)"/>

  <!-- Wall section 3 — falling forward (flat) -->
  <rect x="600" y="200" width="120" height="50" rx="4" fill="#c8a060" transform="rotate(-5 660 225)"/>
  <rect x="600" y="200" width="120" height="50" rx="4" fill="#b89050" opacity="0.4" transform="rotate(-5 660 225)"/>

  <!-- Scattered rubble blocks on ground -->
  <rect x="380" y="295" width="45" height="30" rx="3" fill="#b89050" transform="rotate(-8 402 310)"/>
  <rect x="440" y="300" width="35" height="25" rx="3" fill="#c8a060" transform="rotate(12 457 312)"/>
  <rect x="490" y="305" width="50" height="28" rx="3" fill="#a07840" transform="rotate(-5 515 319)"/>
  <rect x="555" y="298" width="40" height="32" rx="3" fill="#b89050" transform="rotate(8 575 314)"/>
  <rect x="610" y="308" width="30" height="22" rx="3" fill="#c8a060" transform="rotate(-12 625 319)"/>
  <rect x="650" y="302" width="44" height="26" rx="3" fill="#b89050" transform="rotate(5 672 315)"/>
  <!-- Small rubble -->
  <ellipse cx="400" cy="322" rx="15" ry="8" fill="#a07030"/>
  <ellipse cx="470" cy="328" rx="12" ry="7" fill="#b08040"/>
  <ellipse cx="540" cy="325" rx="18" ry="9" fill="#a07030"/>
  <ellipse cx="620" cy="330" rx="14" ry="7" fill="#b08040"/>
  <ellipse cx="700" cy="320" rx="16" ry="8" fill="#a07030"/>

  <!-- Crack lines on remaining wall pieces -->
  <path d="M430 80 Q440 120 425 160" stroke="#8b5e20" stroke-width="2.5" fill="none"/>
  <path d="M520 60 Q508 100 518 140" stroke="#8b5e20" stroke-width="2.5" fill="none"/>

  <!-- CELEBRATING ISRAELITES — left side, arms raised in victory -->
  <!-- Person 1 — jumping -->
  <circle cx="50" cy="265" r="14" fill="#d4956a"/>
  <rect x="38" y="278" width="24" height="32" rx="3" fill="#e8a030"/>
  <!-- Big smile -->
  <path d="M43 270 Q50 276 57 270" stroke="#8b3a10" stroke-width="2" fill="none"/>
  <!-- Rosy cheeks -->
  <ellipse cx="43" cy="268" rx="5" ry="4" fill="#e07060" opacity="0.5"/>
  <ellipse cx="57" cy="268" rx="5" ry="4" fill="#e07060" opacity="0.5"/>
  <!-- Arms up -->
  <line x1="38" y1="285" x2="18" y2="258" stroke="#d4956a" stroke-width="8" stroke-linecap="round"/>
  <line x1="62" y1="285" x2="82" y2="258" stroke="#d4956a" stroke-width="8" stroke-linecap="round"/>
  <circle cx="16" cy="256" r="7" fill="#d4956a"/>
  <circle cx="84" cy="256" r="7" fill="#d4956a"/>

  <!-- Person 2 -->
  <circle cx="115" cy="263" r="14" fill="#c8a870"/>
  <rect x="103" y="276" width="24" height="32" rx="3" fill="#ffcc80"/>
  <path d="M108 269 Q115 275 122 269" stroke="#8b3a10" stroke-width="2" fill="none"/>
  <ellipse cx="108" cy="267" rx="5" ry="4" fill="#e07060" opacity="0.5"/>
  <ellipse cx="122" cy="267" rx="5" ry="4" fill="#e07060" opacity="0.5"/>
  <line x1="103" y1="283" x2="83" y2="256" stroke="#c8a870" stroke-width="8" stroke-linecap="round"/>
  <line x1="127" y1="283" x2="147" y2="256" stroke="#c8a870" stroke-width="8" stroke-linecap="round"/>
  <circle cx="81" cy="254" r="7" fill="#c8a870"/>
  <circle cx="149" cy="254" r="7" fill="#c8a870"/>

  <!-- Person 3 — woman with scarf -->
  <circle cx="180" cy="267" r="14" fill="#d4a060"/>
  <path d="M166 262 Q172 252 180 250 Q188 252 194 262 Q188 270 180 272 Q172 270 166 262Z" fill="#e07030"/>
  <rect x="168" y="280" width="24" height="30" rx="3" fill="#ffe082"/>
  <path d="M172 271 Q180 277 188 271" stroke="#8b3a10" stroke-width="2" fill="none"/>
  <line x1="168" y1="287" x2="150" y2="260" stroke="#d4a060" stroke-width="8" stroke-linecap="round"/>
  <line x1="192" y1="287" x2="210" y2="260" stroke="#d4a060" stroke-width="8" stroke-linecap="round"/>

  <!-- Person 4 -->
  <circle cx="248" cy="265" r="14" fill="#c8956a"/>
  <rect x="236" y="278" width="24" height="32" rx="3" fill="#ffb74d"/>
  <path d="M241 271 Q248 277 255 271" stroke="#8b3a10" stroke-width="2" fill="none"/>
  <line x1="236" y1="285" x2="216" y2="258" stroke="#c8956a" stroke-width="8" stroke-linecap="round"/>
  <line x1="260" y1="285" x2="280" y2="258" stroke="#c8956a" stroke-width="8" stroke-linecap="round"/>

  <!-- Person 5 — Josué, center, triumphant -->
  <circle cx="330" cy="255" r="17" fill="#c8956c"/>
  <rect x="315" y="271" width="30" height="45" rx="4" fill="#e8a030"/>
  <!-- Headband -->
  <rect x="315" y="249" width="30" height="9" rx="4" fill="#c87020"/>
  <!-- Short beard -->
  <path d="M317 265 Q322 275 330 277 Q338 275 343 265" fill="#5a3010" opacity="0.7"/>
  <!-- Big triumphant smile -->
  <path d="M320 267 Q330 274 340 267" stroke="#8b3a10" stroke-width="2.5" fill="none"/>
  <ellipse cx="320" cy="264" rx="5" ry="4" fill="#e07060" opacity="0.5"/>
  <ellipse cx="340" cy="264" rx="5" ry="4" fill="#e07060" opacity="0.5"/>
  <!-- Both arms raised high — VICTORY -->
  <line x1="317" y1="278" x2="290" y2="240" stroke="#c8956c" stroke-width="11" stroke-linecap="round"/>
  <line x1="343" y1="278" x2="370" y2="240" stroke="#c8956c" stroke-width="11" stroke-linecap="round"/>
  <circle cx="288" cy="238" r="10" fill="#c8956c"/>
  <circle cx="372" cy="238" r="10" fill="#c8956c"/>
  <!-- Fist raised -->
  <ellipse cx="288" cy="236" rx="10" ry="8" fill="#c8956c"/>
  <ellipse cx="372" cy="236" rx="10" ry="8" fill="#c8956c"/>
  <!-- Legs apart — strong stance -->
  <line x1="322" y1="315" x2="308" y2="348" stroke="#c8956c" stroke-width="13" stroke-linecap="round"/>
  <line x1="338" y1="315" x2="352" y2="348" stroke="#c8956c" stroke-width="13" stroke-linecap="round"/>
  <ellipse cx="306" cy="350" rx="15" ry="6" fill="#8b5e20"/>
  <ellipse cx="353" cy="350" rx="15" ry="6" fill="#8b5e20"/>

  <!-- Stars / sparkles of celebration -->
  <path d="M140 230 L143 240 L153 240 L145 246 L148 256 L140 250 L132 256 L135 246 L127 240 L137 240Z" fill="#ffd700" opacity="0.8" transform="scale(0.5) translate(140,220)"/>
  <path d="M140 230 L143 240 L153 240 L145 246 L148 256 L140 250 L132 256 L135 246 L127 240 L137 240Z" fill="#ffd700" opacity="0.7" transform="scale(0.4) translate(650,400)"/>
  <path d="M140 230 L143 240 L153 240 L145 246 L148 256 L140 250 L132 256 L135 246 L127 240 L137 240Z" fill="#ff8f00" opacity="0.8" transform="scale(0.45) translate(850,300)"/>

  <!-- Caption -->
  <rect x="10" y="344" width="360" height="28" rx="14" fill="#1565c0" opacity="0.82"/>
  <text x="190" y="363" font-family="Georgia, serif" font-size="14" fill="#ffe082" text-anchor="middle" font-weight="bold">Os muros caem! Israel celebra a vitória!</text>
</svg>
