<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="mmh_bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#c4b5fd"/></linearGradient>
    <radialGradient id="mmh_lamp" cx="50%" cy="50%"><stop offset="0%" stop-color="#fef3c7" stop-opacity="0.9"/><stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#mmh_bg)"/>
  <!-- cozy room walls -->
  <rect x="80" y="60" width="640" height="300" rx="16" fill="#ddd6fe" opacity="0.5"/>
  <!-- floor -->
  <ellipse cx="400" cy="400" rx="500" ry="80" fill="#7c3aed" opacity="0.2"/>
  <!-- lamp glow -->
  <circle cx="400" cy="160" r="35" fill="#fbbf24" opacity="0.7"/>
  <ellipse cx="400" cy="200" rx="120" ry="80" fill="url(#mmh_lamp)"/>
  <!-- lamp post -->
  <rect x="396" y="130" width="8" height="35" fill="#78350f"/>
  <ellipse cx="400" cy="130" rx="20" ry="8" fill="#fbbf24"/>
  <!-- Jesus seated figure -->
  <ellipse cx="400" cy="220" rx="22" ry="26" fill="#fde68a"/>
  <rect x="380" y="243" width="40" height="55" rx="8" fill="#f97316"/>
  <!-- Maria sitting at feet -->
  <ellipse cx="310" cy="290" rx="20" ry="22" fill="#fde68a"/>
  <rect x="292" y="309" width="36" height="40" rx="7" fill="#7c3aed"/>
  <!-- Marta in background with pot -->
  <ellipse cx="570" cy="230" rx="18" ry="20" fill="#fde68a"/>
  <rect x="554" y="248" width="32" height="45" rx="7" fill="#a78bfa"/>
  <!-- pot in Marta's hands -->
  <ellipse cx="610" cy="255" rx="22" ry="16" fill="#92400e"/>
  <rect x="594" y="255" width="32" height="28" rx="5" fill="#78350f"/>
  <!-- scroll on floor -->
  <ellipse cx="380" cy="340" rx="25" ry="8" fill="#fef3c7"/>
</svg>
