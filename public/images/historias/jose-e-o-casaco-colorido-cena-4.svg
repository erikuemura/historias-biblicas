    <circle cx="14" cy="24" r="20" fill="#e8a87a"/>
    <path d="M-2,16 Q14,2 30,16 Q28,8 14,5 Q0,8 -2,16Z" fill="#3e2723"/>
    <circle cx="6" cy="18" r="3.5" fill="#3e2723"/>
    <circle cx="22" cy="18" r="3.5" fill="#3e2723"/>
    <circle cx="7" cy="17" r="1.2" fill="white"/>
