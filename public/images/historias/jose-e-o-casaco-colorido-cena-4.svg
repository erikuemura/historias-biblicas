    <path d="M6,26 Q14,32 22,26" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M0,52 Q-15,66 -12,82" stroke="#26a69a" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="-11" cy="84" r="9" fill="#ffccbc"/>
    <path d="M30,52 Q44,66 42,82" stroke="#26a69a" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="42" cy="84" r="9" fill="#ffccbc"/>
