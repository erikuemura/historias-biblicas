      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="40%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
    <linearGradient id="sandJC4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyJC4)"/>
  <!-- Desert dunes -->
  <ellipse cx="150" cy="340" rx="220" ry="90" fill="#ef6c00" opacity="0.5"/>
  <ellipse cx="700" cy="350" rx="200" ry="80" fill="#e65100" opacity="0.4"/>
  <rect x="0" y="298" width="800" height="82" fill="url(#sandJC4)"/>
