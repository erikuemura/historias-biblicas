<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyJAT3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c313a"/>
      <stop offset="50%" stop-color="#37474f"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
    <linearGradient id="waterJAT3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyJAT3)"/>
  <!-- Heavy storm clouds -->
  <ellipse cx="180" cy="70" rx="155" ry="72" fill="#1c313a" opacity="0.95"/>
  <ellipse cx="120" cy="88" rx="100" ry="55" fill="#102027" opacity="1"/>
  <ellipse cx="450" cy="65" rx="165" ry="75" fill="#1c313a" opacity="0.95"/>
  <ellipse cx="700" cy="80" rx="140" ry="65" fill="#263238" opacity="0.9"/>
  <!-- Lightning flashes -->
  <polyline points="160,95 148,140 160,140 140,200" stroke="#fff176" stroke-width="4" fill="none" opacity="0.95"/>
  <polyline points="450,90 438,138 450,138 432,195" stroke="#fff9c4" stroke-width="3" fill="none" opacity="0.9"/>
  <!-- Heavy rain -->
  <g stroke="#81d4fa" stroke-width="2" opacity="0.55">
    <line x1="40" y1="130" x2="26" y2="210"/><line x1="90" y1="118" x2="76" y2="198"/>
    <line x1="150" y1="135" x2="136" y2="215"/><line x1="210" y1="122" x2="196" y2="202"/>
    <line x1="270" y1="138" x2="256" y2="218"/><line x1="330" y1="126" x2="316" y2="206"/>
    <line x1="390" y1="140" x2="376" y2="220"/><line x1="450" y1="128" x2="436" y2="208"/>
    <line x1="510" y1="142" x2="496" y2="222"/><line x1="570" y1="130" x2="556" y2="210"/>
    <line x1="630" y1="136" x2="616" y2="216"/><line x1="690" y1="124" x2="676" y2="204"/>
    <line x1="750" y1="132" x2="736" y2="212"/>
    <line x1="65" y1="160" x2="51" y2="240"/><line x1="125" y1="148" x2="111" y2="228"/>
  </g>
  <!-- Huge waves -->
  <rect x="0" y="258" width="800" height="122" fill="url(#waterJAT3)"/>
  <path d="M0,262 Q40,240 80,262 Q120,284 160,262 Q200,240 240,262 Q280,284 320,262 Q360,240 400,262 Q440,284 480,262 Q520,240 560,262 Q600,284 640,262 Q680,240 720,262 Q760,284 800,262" fill="#1565c0" opacity="0.7"/>
  <path d="M0,278 Q50,258 100,278 Q150,298 200,278 Q250,258 300,278 Q350,298 400,278 Q450,258 500,278 Q550,298 600,278 Q650,258 700,278 Q750,298 800,278" fill="#0d47a1" opacity="0.5"/>
  <!-- Boat tossing badly -->
  <g transform="translate(120,195) rotate(-15,240,90)">
    <path d="M0,60 Q240,36 480,60 Q470,100 240,108 Q10,100 0,60Z" fill="#8d6e63"/>
    <path d="M10,65 Q240,42 470,65 Q460,92 240,98 Q20,92 10,65Z" fill="#a1887f"/>
    <!-- Disciples panicking -->
    <g transform="translate(40,28)">
      <path d="M0,32 L-1,68 L22,68 L23,32 Q11,22 9,20 Q4,22 0,32Z" fill="#546e7a"/>
      <circle cx="11" cy="10" r="13" fill="#e8a87a"/>
      <circle cx="5" cy="8" r="4" fill="#3e2723"/>
      <circle cx="17" cy="8" r="4" fill="#3e2723"/>
      <path d="M4,20 Q11,15 18,20" stroke="#c62828" stroke-width="2" fill="none"/>
      <path d="M0,36 Q-18,30 -22,15" stroke="#546e7a" stroke-width="11" fill="none" stroke-linecap="round"/>
      <circle cx="-23" cy="13" r="9" fill="#e8a87a"/>
    </g>
    <g transform="translate(130,22)">
      <path d="M0,32 L-1,70 L22,70 L23,32 Q11,22 9,20 Q4,22 0,32Z" fill="#ef6c00"/>
      <circle cx="11" cy="10" r="13" fill="#ffccbc"/>
      <circle cx="5" cy="8" r="4" fill="#4e342e"/>
      <circle cx="17" cy="8" r="4" fill="#4e342e"/>
      <path d="M4,20 Q11,15 18,20" stroke="#c62828" stroke-width="2" fill="none"/>
      <!-- Arm grabbing mast -->
      <path d="M22,36 Q35,28 40,18" stroke="#ef6c00" stroke-width="11" fill="none" stroke-linecap="round"/>
      <circle cx="41" cy="16" r="9" fill="#ffccbc"/>
    </g>
    <!-- JESUS being woken (sitting up, hand reaching) -->
    <g transform="translate(330,30)">
      <ellipse cx="42" cy="52" rx="46" ry="12" fill="#ffe082" opacity="0.5"/>
      <path d="M0,40 Q42,25 84,30 Q86,46 84,50 Q42,55 0,50Z" fill="white" opacity="0.8"/>
      <circle cx="12" cy="32" r="20" fill="#ffccbc"/>
      <path d="M-4,21 Q12,8 28,21 Q26,13 12,10 Q-2,13 -4,21Z" fill="#5d4037"/>
      <!-- Opening eyes (slightly) -->
      <path d="M2,27 Q8,23 14,27" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M4,27 Q10,23 16,27" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Beard -->
      <path d="M0,40 Q12,48 24,40 Q22,48 12,51 Q2,48 0,40Z" fill="#5d4037" opacity="0.6"/>
      <!-- Arm raised (someone grabbing to wake) -->
      <path d="M20,38 Q38,28 50,16" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
      <circle cx="51" cy="14" r="10" fill="#ffccbc"/>
    </g>
  </g>
