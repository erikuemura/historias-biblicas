<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bc3_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#f0fdf4"/>
    </linearGradient>
    <linearGradient id="bc3_floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bc3_bg)"/>
  <!-- Ceiling decoration -->
  <rect x="0" y="0" width="800" height="8" fill="#f59e0b"/>
  <!-- Floor -->
  <rect x="0" y="318" width="800" height="62" fill="url(#bc3_floor)"/>
  <!-- A quiet corner of the house - Mary and Jesus -->
  <!-- Wall column decoration -->
  <rect x="120" y="50" width="25" height="300" rx="5" fill="#d97706" opacity="0.3"/>
  <rect x="655" y="50" width="25" height="300" rx="5" fill="#d97706" opacity="0.3"/>
  <!-- Pot/jars visible in background corner -->
  <ellipse cx="680" cy="284" rx="20" ry="14" fill="#a16207"/>
  <rect x="660" y="235" width="40" height="55" rx="10" fill="#b45309"/>
  <ellipse cx="680" cy="236" rx="20" ry="9" fill="#d97706"/>
  <ellipse cx="720" cy="288" rx="18" ry="12" fill="#a16207"/>
  <rect x="702" y="242" width="36" height="52" rx="9" fill="#b45309"/>
  <ellipse cx="720" cy="243" rx="18" ry="8" fill="#d97706"/>
  <!-- Mary and Jesus in intimate conversation -->
  <!-- Jesus center-left - listening to Mary -->
  <rect x="250" y="175" width="70" height="160" rx="14" fill="#ffffff"/>
  <circle cx="285" cy="159" r="33" fill="#fde68a"/>
  <ellipse cx="285" cy="147" rx="33" ry="19" fill="#92400e"/>
  <rect x="262" y="159" width="12" height="38" rx="5" fill="#92400e"/>
  <rect x="297" y="159" width="12" height="38" rx="5" fill="#92400e"/>
  <!-- Jesus thoughtful/listening expression -->
  <circle cx="275" cy="157" r="5" fill="#78350f"/>
  <circle cx="295" cy="157" r="5" fill="#78350f"/>
  <path d="M271,169 Q285,177 299,169" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- Jesus hand gesture - responding -->
  <line x1="320" y1="205" x2="360" y2="195" stroke="#fde68a" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="367" cy="193" rx="14" ry="12" fill="#fde68a"/>
  <!-- Mary - right side - speaking to Jesus with trust -->
  <rect x="420" y="178" width="65" height="157" rx="13" fill="#3b82f6"/>
  <circle cx="452" cy="163" r="30" fill="#fde68a"/>
  <ellipse cx="452" cy="151" rx="30" ry="17" fill="#1d4ed8"/>
  <!-- head covering -->
  <rect x="428" y="145" width="48" height="11" rx="3" fill="#2563eb"/>
  <!-- Mary confident, trusting expression -->
  <circle cx="443" cy="161" r="5" fill="#78350f"/>
  <circle cx="461" cy="161" r="5" fill="#78350f"/>
  <path d="M439,173 Q452,183 465,173" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- cheeks - warm -->
  <circle cx="436" cy="169" r="7" fill="#fca5a5" opacity="0.4"/>
  <circle cx="468" cy="169" r="7" fill="#fca5a5" opacity="0.4"/>
  <!-- Mary gesturing to Jesus - explaining, trusting -->
  <line x1="420" y1="205" x2="392" y2="195" stroke="#fde68a" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="385" cy="192" rx="13" ry="11" fill="#fde68a"/>
  <!-- Mary other hand - pointing toward empty jars area -->
  <line x1="485" y1="210" x2="530" y2="225" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <!-- Trust/faith speech bubble from Mary -->
  <ellipse cx="530" cy="155" rx="55" ry="35" fill="#dbeafe" opacity="0.7"/>
  <circle cx="500" cy="178" r="7" fill="#dbeafe" opacity="0.5"/>
  <circle cx="493" cy="190" r="4.5" fill="#dbeafe" opacity="0.4"/>
  <!-- Heart symbol inside bubble - representing trust/faith -->
  <path d="M515,148 Q520,140 527,148 Q534,140 539,148 Q539,157 527,165 Q515,157 515,148Z" fill="#3b82f6" opacity="0.6"/>
  <!-- Servant in background observing, about to receive instructions -->
  <rect x="130" y="225" width="44" height="113" rx="10" fill="#6b7280"/>
  <circle cx="152" cy="213" r="21" fill="#fbbf24"/>
  <ellipse cx="152" cy="204" rx="21" ry="12" fill="#374151"/>
  <!-- servant listening -->
  <circle cx="145" cy="212" r="4" fill="#78350f"/>
  <circle cx="159" cy="212" r="4" fill="#78350f"/>
  <path d="M143,222 Q152,218 161,222" stroke="#78350f" stroke-width="2" fill="none"/>
  <!-- Another disciple/person in far background -->
  <circle cx="590" cy="222" r="16" fill="#fde68a" opacity="0.5"/>
  <rect x="576" y="236" width="28" height="80" rx="7" fill="#7c3aed" opacity="0.4"/>
  <!-- Window showing it's daytime - festive -->
  <rect x="70" y="80" width="50" height="70" rx="5" fill="#bfdbfe" opacity="0.7"/>
  <rect x="72" y="82" width="46" height="66" rx="3" fill="#93c5fd" opacity="0.5"/>
  <line x1="95" y1="82" x2="95" y2="148" stroke="#93c5fd" stroke-width="2"/>
  <line x1="70" y1="115" x2="120" y2="115" stroke="#93c5fd" stroke-width="2"/>
</svg>
