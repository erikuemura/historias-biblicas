<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyJC2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="50%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </linearGradient>
    <linearGradient id="coat2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="20%" stop-color="#fb8c00"/>
      <stop offset="40%" stop-color="#fdd835"/>
      <stop offset="60%" stop-color="#43a047"/>
      <stop offset="80%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#8e24aa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyJC2)"/>
  <!-- Ground -->
  <rect x="0" y="295" width="800" height="85" fill="#ffcc80"/>
  <path d="M0,305 Q200,295 400,305 Q600,315 800,305" fill="none" stroke="#ffb74d" stroke-width="2" opacity="0.5"/>
  <!-- Palm tree -->
  <rect x="655" y="150" width="12" height="148" rx="4" fill="#795548"/>
  <g fill="#388e3c">
    <ellipse cx="661" cy="155" rx="48" ry="18" transform="rotate(-30,661,155)"/>
    <ellipse cx="661" cy="155" rx="48" ry="18" transform="rotate(15,661,155)"/>
    <ellipse cx="661" cy="155" rx="48" ry="18" transform="rotate(55,661,155)"/>
  </g>
  <!-- JACOB (father, left, giving coat) -->
  <g transform="translate(200,140)">
    <ellipse cx="45" cy="158" rx="38" ry="8" fill="#e65100" opacity="0.2"/>
    <path d="M5,55 Q0,130 -3,158 Q45,168 93,158 Q89,130 86,55 Q68,38 45,35 Q24,38 5,55Z" fill="#795548"/>
    <path d="M3,142 Q45,152 90,142 Q88,162 45,168 Q2,162 3,142Z" fill="#fff8e1" opacity="0.55"/>
    <rect x="4" y="96" width="82" height="9" rx="4" fill="#e65100"/>
    <rect x="26" y="148" width="12" height="36" rx="5" fill="#6d4c41"/>
    <rect x="48" y="148" width="12" height="36" rx="5" fill="#5d4037"/>
    <!-- Head -->
    <circle cx="45" cy="26" r="26" fill="#e8a87a"/>
    <path d="M22,15 Q45,-3 68,15 Q66,5 45,2 Q24,5 22,15Z" fill="#f5f5f5"/><!-- white hair -->
    <path d="M22,40 Q26,62 45,68 Q64,62 68,40" fill="#f5f5f5" opacity="0.7"/><!-- white beard -->
    <circle cx="34" cy="20" r="4" fill="#3e2723"/>
    <circle cx="56" cy="20" r="4" fill="#3e2723"/>
    <circle cx="35" cy="19" r="1.5" fill="white"/>
    <circle cx="57" cy="19" r="1.5" fill="white"/>
    <path d="M32,35 Q45,44 58,35" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="25" cy="28" r="8" fill="#ef9a9a" opacity="0.35"/>
    <circle cx="65" cy="28" r="8" fill="#ef9a9a" opacity="0.35"/>
    <rect x="38" y="50" width="14" height="12" rx="4" fill="#e8a87a"/>
    <!-- Arm extending coat -->
    <path d="M86,62 Q115,75 125,90" stroke="#795548" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="126" cy="92" r="11" fill="#e8a87a"/>
    <!-- Other arm -->
    <path d="M5,62 Q-12,88 -8,112" stroke="#795548" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-7" cy="114" r="11" fill="#e8a87a"/>
  </g>
  <!-- COLORFUL COAT hanging between them -->
  <g transform="translate(345,80)">
    <path d="M0,0 Q50,-10 100,0 Q110,80 100,140 Q50,155 0,140 Q-10,80 0,0Z" fill="url(#coat2)"/>
    <g stroke="white" stroke-width="1.5" opacity="0.3">
      <line x1="0" y1="35" x2="100" y2="35"/>
      <line x1="-2" y1="70" x2="102" y2="70"/>
      <line x1="-2" y1="105" x2="102" y2="105"/>
    </g>
    <!-- Sparkles -->
    <g fill="#fff176" opacity="0.8">
      <circle cx="-15" cy="50" r="3"/><circle cx="115" cy="45" r="3"/>
      <circle cx="50" cy="-15" r="3"/><circle cx="50" cy="168" r="2.5"/>
    </g>
  </g>
  <!-- JOSE (right, receiving coat, happy) -->
  <g transform="translate(490,158)">
    <ellipse cx="42" cy="148" rx="36" ry="8" fill="#e65100" opacity="0.2"/>
    <path d="M5,50 Q2,125 -2,148 Q42,158 86,148 Q82,125 80,50 Q64,35 42,32 Q22,35 5,50Z" fill="#5c6bc0"/>
    <rect x="4" y="90" width="78" height="8" rx="4" fill="#3949ab"/>
    <rect x="24" y="140" width="11" height="34" rx="5" fill="#5c6bc0" opacity="0.7"/>
    <rect x="43" y="140" width="11" height="34" rx="5" fill="#3949ab" opacity="0.7"/>
    <!-- Arms open to receive -->
    <path d="M5,58 Q-18,72 -22,95" stroke="#5c6bc0" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="-21" cy="97" r="11" fill="#ffccbc"/>
    <path d="M80,58 Q102,72 106,95" stroke="#5c6bc0" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="106" cy="97" r="11" fill="#ffccbc"/>
    <!-- Head -->
    <circle cx="42" cy="24" r="24" fill="#ffccbc"/>
    <path d="M21,14 Q42,-4 63,14 Q61,5 42,2 Q23,5 21,14Z" fill="#4e342e"/>
    <circle cx="32" cy="18" r="4" fill="#4e342e"/>
    <circle cx="52" cy="18" r="4" fill="#4e342e"/>
    <circle cx="33" cy="17" r="1.5" fill="white"/>
    <circle cx="53" cy="17" r="1.5" fill="white"/>
    <!-- Big happy smile -->
    <path d="M28,34 Q42,46 56,34" stroke="#c62828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="23" cy="28" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="61" cy="28" r="8" fill="#ef9a9a" opacity="0.4"/>
    <rect x="35" y="46" width="14" height="12" rx="4" fill="#ffccbc"/>
  </g>
</svg>
