<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="60%" stop-color="#90caf9"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
    <linearGradient id="hill5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky5)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.9">
    <ellipse cx="120" cy="70" rx="80" ry="32"/>
    <ellipse cx="170" cy="60" rx="60" ry="28"/>
    <ellipse cx="70" cy="80" rx="50" ry="24"/>
    <ellipse cx="650" cy="90" rx="70" ry="28"/>
    <ellipse cx="700" cy="80" rx="55" ry="25"/>
    <ellipse cx="600" cy="98" rx="45" ry="20"/>
  </g>

  <!-- Background hills -->
  <ellipse cx="400" cy="420" rx="500" ry="180" fill="#388e3c" opacity="0.4"/>
  <ellipse cx="100" cy="400" rx="250" ry="150" fill="url(#hill5)" opacity="0.7"/>
  <ellipse cx="700" cy="390" rx="250" ry="140" fill="#43a047" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="370" width="800" height="130" fill="#388e3c"/>
  <rect x="0" y="370" width="800" height="20" fill="#4caf50"/>

  <!-- Rocks/stones on ground -->
  <ellipse cx="280" cy="385" rx="18" ry="10" fill="#90a4ae"/>
  <ellipse cx="300" cy="390" rx="12" ry="7" fill="#78909c"/>
  <ellipse cx="265" cy="392" rx="10" ry="6" fill="#b0bec5"/>
  <ellipse cx="500" cy="382" rx="15" ry="8" fill="#90a4ae"/>
  <ellipse cx="520" cy="388" rx="11" ry="6" fill="#78909c"/>

  <!-- DAVID - small boy on left -->
  <g transform="translate(180,230)">
    <!-- Shadow -->
    <ellipse cx="30" cy="142" rx="28" ry="8" fill="#1b5e20" opacity="0.3"/>
    <!-- Legs -->
    <rect x="16" y="108" width="13" height="38" rx="5" fill="#a1887f"/>
    <rect x="32" y="108" width="13" height="38" rx="5" fill="#8d6e63"/>
    <!-- Sandals -->
    <ellipse cx="22" cy="148" rx="12" ry="5" fill="#5d4037"/>
    <ellipse cx="38" cy="148" rx="12" ry="5" fill="#4e342e"/>
    <!-- Tunic -->
    <path d="M5,45 L8,115 L55,115 L58,45 Q40,30 30,28 Q20,30 5,45Z" fill="#fff9c4"/>
    <!-- Belt -->
    <rect x="7" y="80" width="48" height="8" rx="3" fill="#8d6e63"/>
    <!-- Sling arm raised -->
    <path d="M8,55 Q-15,35 -20,15" stroke="#fff9c4" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="-20" cy="13" r="9" fill="#ffccbc"/>
    <!-- Sling -->
    <path d="M-20,5 Q-5,-15 5,0" stroke="#8d6e63" stroke-width="2" fill="none"/>
    <ellipse cx="-8" cy="-8" rx="8" ry="4" fill="#90a4ae" transform="rotate(-30,-8,-8)"/>
    <!-- Other arm -->
    <path d="M55,55 Q65,70 60,85" stroke="#fff9c4" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="60" cy="87" r="9" fill="#ffccbc"/>
    <!-- Head -->
    <circle cx="30" cy="20" r="24" fill="#ffccbc"/>
    <!-- Red curly hair -->
    <path d="M8,12 Q30,-10 52,12 Q50,-2 30,-6 Q10,-2 8,12Z" fill="#bf360c"/>
    <!-- Eyes determined -->
    <circle cx="22" cy="16" r="4" fill="#4e342e"/>
    <circle cx="38" cy="16" r="4" fill="#4e342e"/>
    <circle cx="23" cy="15" r="1.5" fill="white"/>
    <circle cx="39" cy="15" r="1.5" fill="white"/>
    <!-- Focused brow -->
    <path d="M18,10 Q22,7 26,10" stroke="#4e342e" stroke-width="2" fill="none"/>
    <path d="M34,10 Q38,7 42,10" stroke="#4e342e" stroke-width="2" fill="none"/>
    <!-- Determined mouth -->
    <path d="M22,28 Q30,32 38,28" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Rosy cheeks -->
    <circle cx="16" cy="22" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="44" cy="22" r="6" fill="#ef9a9a" opacity="0.4"/>
    <!-- Shepherd bag -->
    <path d="M55,85 Q70,90 72,110 Q68,118 55,115" fill="#a1887f"/>
  </g>

  <!-- GOLIATH - giant on right -->
  <g transform="translate(460,60)">
    <!-- Shadow -->
    <ellipse cx="90" cy="315" rx="65" ry="16" fill="#1b5e20" opacity="0.35"/>
    <!-- Legs armored -->
    <rect x="58" y="240" width="28" height="80" rx="8" fill="#78909c"/>
    <rect x="94" y="240" width="28" height="80" rx="8" fill="#607d8b"/>
    <!-- Boots -->
    <ellipse cx="72" cy="322" rx="22" ry="10" fill="#455a64"/>
    <ellipse cx="108" cy="322" rx="22" ry="10" fill="#37474f"/>
    <!-- Body armor -->
    <path d="M25,80 Q30,240 58,245 L122,245 Q150,240 155,80 Q120,55 90,52 Q60,55 25,80Z" fill="#90a4ae"/>
    <!-- Armor scales -->
    <g fill="#78909c" opacity="0.6">
      <ellipse cx="65" cy="110" rx="18" ry="10"/>
      <ellipse cx="95" cy="110" rx="18" ry="10"/>
      <ellipse cx="125" cy="110" rx="18" ry="10"/>
      <ellipse cx="65" cy="135" rx="18" ry="10"/>
      <ellipse cx="95" cy="135" rx="18" ry="10"/>
      <ellipse cx="125" cy="135" rx="18" ry="10"/>
      <ellipse cx="65" cy="160" rx="18" ry="10"/>
      <ellipse cx="95" cy="160" rx="18" ry="10"/>
      <ellipse cx="125" cy="160" rx="18" ry="10"/>
    </g>
    <!-- Chest plate shine -->
    <ellipse cx="90" cy="145" rx="35" ry="50" fill="white" opacity="0.08"/>
    <!-- Left arm with shield -->
    <path d="M28,90 Q-10,120 -15,160" stroke="#78909c" stroke-width="26" fill="none" stroke-linecap="round"/>
    <!-- Shield -->
    <ellipse cx="-20" cy="165" rx="35" ry="42" fill="#546e7a"/>
    <ellipse cx="-20" cy="165" rx="28" ry="34" fill="#607d8b"/>
    <circle cx="-20" cy="165" r="10" fill="#455a64"/>
    <!-- Right arm with spear -->
    <path d="M152,90 Q185,110 195,80" stroke="#8d6e63" stroke-width="24" fill="none" stroke-linecap="round"/>
    <!-- Spear -->
    <rect x="188" y="-20" width="8" height="120" rx="3" fill="#8d6e63"/>
    <polygon points="192,-25 185,-5 199,-5" fill="#90a4ae"/>
    <!-- Neck -->
    <rect x="72" y="45" width="36" height="38" rx="8" fill="#ffccbc"/>
    <!-- Head -->
    <circle cx="90" cy="28" r="38" fill="#ffccbc"/>
    <!-- Helmet -->
    <path d="M54,28 Q90,-18 126,28 Q125,10 90,5 Q55,10 54,28Z" fill="#546e7a"/>
    <rect x="54" y="25" width="72" height="12" rx="3" fill="#455a64"/>
    <!-- Helmet plume -->
    <path d="M90,5 Q95,-15 88,-30 Q92,-20 90,5" fill="#e53935"/>
    <!-- Angry eyes -->
    <circle cx="78" cy="25" r="6" fill="#3e2723"/>
    <circle cx="102" cy="25" r="6" fill="#3e2723"/>
    <circle cx="79" cy="24" r="2" fill="white"/>
    <circle cx="103" cy="24" r="2" fill="white"/>
    <!-- Angry brows -->
    <path d="M70,16 Q78,10 86,16" stroke="#3e2723" stroke-width="3" fill="none"/>
    <path d="M94,16 Q102,10 110,16" stroke="#3e2723" stroke-width="3" fill="none"/>
    <!-- Mean mouth -->
    <path d="M76,40 Q90,35 104,40" stroke="#4e342e" stroke-width="2.5" fill="none"/>
    <!-- Beard -->
    <path d="M58,38 Q62,65 75,72 Q90,78 105,72 Q118,65 122,38" fill="#4e342e" opacity="0.5"/>
  </g>

  <!-- Stone flying through air -->
  <circle cx="370" cy="190" r="8" fill="#90a4ae"/>
  <!-- Motion trail -->
  <g stroke="#b0bec5" stroke-width="2" opacity="0.5">
    <line x1="350" y1="198" x2="340" y2="202"/>
    <line x1="335" y1="204" x2="325" y2="207"/>
  </g>

  <!-- Sun rays of hope -->
  <g stroke="#fff9c4" stroke-width="1.5" opacity="0.3">
    <line x1="400" y1="0" x2="350" y2="100"/>
    <line x1="420" y1="0" x2="400" y2="110"/>
    <line x1="440" y1="0" x2="450" y2="105"/>
  </g>
</svg>
