<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="sky9a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909c"/>
      <stop offset="100%" stop-color="#b0bec5"/>
    </linearGradient>
    <linearGradient id="ground9a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="ark9a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
  </defs>

  <!-- Sky with clouds hinting rain coming -->
  <rect width="800" height="380" fill="url(#sky9a)"/>

  <!-- Heavy clouds -->
  <g fill="#b0bec5" opacity="0.9">
    <ellipse cx="150" cy="55" rx="110" ry="38"/>
    <ellipse cx="210" cy="40" rx="85" ry="32"/>
    <ellipse cx="90" cy="65" rx="70" ry="28"/>
    <ellipse cx="550" cy="50" rx="120" ry="40"/>
    <ellipse cx="620" cy="35" rx="90" ry="33"/>
    <ellipse cx="480" cy="62" rx="72" ry="28"/>
  </g>
  <g fill="#cfd8dc" opacity="0.6">
    <ellipse cx="350" cy="48" rx="80" ry="28"/>
    <ellipse cx="380" cy="36" rx="60" ry="24"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="288" width="800" height="92" fill="url(#ground9a)"/>
  <rect x="0" y="288" width="800" height="12" fill="#a5d6a7"/>

  <!-- ARK (completed) background right -->
  <g transform="translate(500,80)">
    <path d="M0,190 Q10,210 280,210 Q290,190 285,100 L5,100 Z" fill="url(#ark9a)"/>
    <line x1="5" y1="120" x2="285" y2="120" stroke="#4e342e" stroke-width="2" opacity="0.5"/>
    <line x1="5" y1="145" x2="285" y2="145" stroke="#4e342e" stroke-width="2" opacity="0.5"/>
    <line x1="5" y1="170" x2="285" y2="170" stroke="#4e342e" stroke-width="2" opacity="0.5"/>
    <rect x="15" y="65" width="255" height="38" rx="4" fill="#8d6e63"/>
    <path d="M30,65 L147,22 L265,65" stroke="#6d4c41" stroke-width="7" fill="none" stroke-linejoin="round"/>
    <!-- Door opening -->
    <rect x="110" y="150" width="60" height="50" rx="4" fill="#3e2723"/>
    <rect x="112" y="152" width="56" height="46" rx="3" fill="#4e342e"/>
    <!-- Ramp -->
    <path d="M110,200 L80,220 L170,220 L140,200 Z" fill="#795548"/>
  </g>

  <!-- NOE at door of ark -->
  <g transform="translate(520,185)">
    <circle cx="28" cy="18" r="22" fill="#ffcc80"/>
    <ellipse cx="28" cy="0" rx="18" ry="9" fill="white"/>
    <ellipse cx="28" cy="34" rx="14" ry="9" fill="white"/>
    <rect x="6" y="38" width="44" height="58" rx="8" fill="#795548"/>
    <path d="M6,46 Q-12,56 -10,72" stroke="#a1887f" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M50,46 Q68,56 66,72" stroke="#a1887f" stroke-width="11" fill="none" stroke-linecap="round"/>
    <circle cx="18" cy="16" r="4" fill="#333"/>
    <circle cx="19" cy="15" r="1.5" fill="white"/>
    <circle cx="38" cy="16" r="4" fill="#333"/>
    <circle cx="39" cy="15" r="1.5" fill="white"/>
    <path d="M18,25 Q28,32 38,25" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="10" cy="23" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="46" cy="23" r="6" fill="#ef9a9a" opacity="0.4"/>
  </g>

  <!-- GIRAFFE walking in -->
  <g transform="translate(55,118)">
    <rect x="30" y="0" width="20" height="100" rx="8" fill="#ffb74d"/>
    <ellipse cx="40" cy="-12" rx="22" ry="17" fill="#ffb74d"/>
    <ellipse cx="18" cy="-22" rx="7" ry="10" fill="#ffa726" transform="rotate(-15,18,-22)"/>
    <ellipse cx="62" cy="-22" rx="7" ry="10" fill="#ffa726" transform="rotate(15,62,-22)"/>
    <rect x="20" y="-34" width="5" height="11" rx="2" fill="#795548"/>
    <rect x="44" y="-34" width="5" height="11" rx="2" fill="#795548"/>
    <circle cx="30" cy="-14" r="4" fill="#333"/>
    <circle cx="31" cy="-15" r="1.5" fill="white"/>
    <ellipse cx="52" cy="-6" rx="9" ry="5" fill="#ffa726"/>
    <ellipse cx="10" cy="96" rx="75" ry="55" fill="#ffb74d"/>
    <ellipse cx="18" cy="108" rx="10" ry="8" fill="#e65100" opacity="0.45"/>
    <ellipse cx="50" cy="118" rx="9" ry="7" fill="#e65100" opacity="0.45"/>
    <ellipse cx="72" cy="104" rx="9" ry="7" fill="#e65100" opacity="0.45"/>
    <rect x="0" y="146" width="14" height="56" rx="5" fill="#ffa726"/>
    <rect x="20" y="146" width="14" height="56" rx="5" fill="#ffb74d"/>
    <rect x="52" y="146" width="14" height="56" rx="5" fill="#ffa726"/>
    <rect x="72" y="146" width="14" height="56" rx="5" fill="#ffb74d"/>
  </g>

  <!-- ELEPHANT walking -->
  <g transform="translate(210,170)">
    <ellipse cx="65" cy="65" rx="68" ry="52" fill="#78909c"/>
    <circle cx="22" cy="32" r="40" fill="#90a4ae"/>
    <path d="M5,58 Q-22,78 -12,100 Q-2,115 8,100" stroke="#78909c" stroke-width="16" fill="none" stroke-linecap="round"/>
    <ellipse cx="60" cy="26" rx="30" ry="36" fill="#80cbc4" opacity="0.65"/>
    <circle cx="10" cy="24" r="5" fill="#333"/>
    <circle cx="11" cy="23" r="1.5" fill="white"/>
    <path d="M2,54 Q-16,62 -20,54" stroke="#fff9c4" stroke-width="5" fill="none" stroke-linecap="round"/>
    <rect x="14" y="108" width="22" height="42" rx="8" fill="#78909c"/>
    <rect x="42" y="108" width="22" height="42" rx="8" fill="#90a4ae"/>
    <rect x="72" y="108" width="22" height="42" rx="8" fill="#78909c"/>
    <rect x="100" y="108" width="22" height="42" rx="8" fill="#90a4ae"/>
  </g>

  <!-- LION walking -->
  <g transform="translate(360,205)">
    <ellipse cx="60" cy="55" rx="58" ry="40" fill="#ffb74d"/>
    <!-- Mane -->
    <circle cx="22" cy="28" r="34" fill="#e65100" opacity="0.7"/>
    <circle cx="22" cy="28" r="24" fill="#ffa726"/>
    <!-- Head -->
    <circle cx="22" cy="22" r="22" fill="#ffcc80"/>
    <!-- Eyes -->
    <circle cx="13" cy="18" r="4" fill="#333"/>
    <circle cx="14" cy="17" r="1.5" fill="white"/>
    <circle cx="31" cy="18" r="4" fill="#333"/>
    <circle cx="32" cy="17" r="1.5" fill="white"/>
    <!-- Nose -->
    <ellipse cx="22" cy="28" rx="5" ry="3" fill="#e91e63"/>
    <!-- Smile -->
    <path d="M14,32 Q22,38 30,32" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="8" cy="30" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="36" cy="30" r="6" fill="#ef9a9a" opacity="0.4"/>
    <!-- Legs -->
    <rect x="20" y="88" width="18" height="34" rx="7" fill="#ffa726"/>
    <rect x="44" y="88" width="18" height="34" rx="7" fill="#ffb74d"/>
    <rect x="72" y="88" width="18" height="34" rx="7" fill="#ffa726"/>
    <rect x="96" y="88" width="18" height="34" rx="7" fill="#ffb74d"/>
    <!-- Tail -->
    <path d="M115,50 Q135,55 132,72" stroke="#ffa726" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="132" cy="76" r="7" fill="#e65100"/>
  </g>
</svg>
