  <circle cx="320" cy="255" r="11" fill="#fbbf24"/>
  <!-- Legs -->
  <rect x="222" y="302" width="16" height="28" rx="6" fill="#d97706"/>
  <rect x="242" y="302" width="16" height="28" rx="6" fill="#d97706"/>
