  <ellipse cx="345" cy="258" rx="22" ry="14" fill="#16a34a" transform="rotate(30,345,258)"/>
  <ellipse cx="342" cy="257" rx="15" ry="9" fill="#4ade80" transform="rotate(30,342,257)"/>
