  <circle cx="240" cy="228" r="30" fill="#fbbf24"/>
  <!-- Hair on head -->
  <ellipse cx="240" cy="210" rx="30" ry="18" fill="#92400e"/>
  <!-- Face - curious/tempted expression -->
  <circle cx="230" cy="225" r="5" fill="#1c1917"/>
  <circle cx="250" cy="225" r="5" fill="#1c1917"/>
  <circle cx="232" cy="223" r="2" fill="white"/>
  <circle cx="252" cy="223" r="2" fill="white"/>
  <path d="M232 238 Q240 244 248 240" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M215 265 Q185 250 175 240" stroke="#fbbf24" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M265 265 Q295 252 320 255" stroke="#fbbf24" stroke-width="14" stroke-linecap="round" fill="none"/>
