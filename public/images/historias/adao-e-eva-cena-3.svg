  <!-- Serpent body coiling around trunk -->
  <path d="M395 130 Q360 145 355 175 Q350 205 380 215 Q410 225 415 255 Q420 280 395 295" stroke="#16a34a" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M395 130 Q360 145 355 175 Q350 205 380 215 Q410 225 415 255 Q420 280 395 295" stroke="#4ade80" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
