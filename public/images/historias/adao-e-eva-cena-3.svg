  <path d="M368 158 Q372 154 376 158" stroke="#15803d" stroke-width="3" fill="none"/>
  <path d="M362 175 Q366 171 370 175" stroke="#15803d" stroke-width="3" fill="none"/>
  <path d="M356 192 Q360 188 364 192" stroke="#15803d" stroke-width="3" fill="none"/>
  <path d="M365 210 Q369 206 373 210" stroke="#15803d" stroke-width="3" fill="none"/>
