  <path d="M418 172 Q468 147 508 128" stroke="#78350f" stroke-width="15" fill="none" stroke-linecap="round"/>
  <path d="M400 210 Q360 240 330 265" stroke="#78350f" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Foliage -->
  <ellipse cx="400" cy="95" rx="110" ry="115" fill="#15803d"/>
  <ellipse cx="355" cy="118" rx="75" ry="88" fill="#166534"/>
  <ellipse cx="448" cy="112" rx="80" ry="90" fill="#14532d"/>
  <ellipse cx="400" cy="72" rx="88" ry="88" fill="#22c55e"/>
  <ellipse cx="378" cy="88" rx="58" ry="65" fill="#4ade80" opacity="0.5"/>
  <!-- Fruits on tree -->
  <circle cx="400" cy="52" r="17" fill="#dc2626"/>
  <circle cx="370" cy="68" r="15" fill="#ef4444"/>
  <circle cx="430" cy="65" r="16" fill="#b91c1c"/>
  <circle cx="352" cy="88" r="13" fill="#fbbf24"/>
  <circle cx="448" cy="83" r="14" fill="#fbbf24"/>
  <circle cx="385" cy="45" r="12" fill="#ef4444"/>
  <circle cx="415" cy="42" r="11" fill="#dc2626"/>
