<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="adao3_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="adao3_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <radialGradient id="adao3_shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#166534" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#166534" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="380" fill="url(#adao3_sky)"/>
  <!-- Dim atmosphere (something's wrong feel) -->
  <rect width="800" height="380" fill="#166534" opacity="0.15"/>
  <!-- Background trees -->
  <rect x="50" y="170" width="16" height="130" fill="#854d0e"/>
  <ellipse cx="58" cy="162" rx="52" ry="62" fill="#166534"/>
  <rect x="700" y="160" width="16" height="140" fill="#854d0e"/>
