  <!-- Body -->
  <ellipse cx="240" cy="272" rx="26" ry="38" fill="#f59e0b"/>
  <!-- Hair (long) -->
  <ellipse cx="240" cy="225" rx="28" ry="35" fill="#92400e"/>
  <path d="M215 225 Q205 265 212 300" stroke="#92400e" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M265 225 Q275 265 268 300" stroke="#92400e" stroke-width="14" fill="none" stroke-linecap="round"/>
