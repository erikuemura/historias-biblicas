  <circle cx="175" cy="238" r="14" fill="#dc2626"/>
  <circle cx="173" cy="233" r="4" fill="white" opacity="0.5"/>
  <!-- Flowers on ground -->
  <circle cx="120" cy="312" r="8" fill="#fde047"/>
  <circle cx="113" cy="312" r="5" fill="#f97316"/>
  <circle cx="127" cy="312" r="5" fill="#f97316"/>
  <circle cx="120" cy="306" r="5" fill="#f97316"/>
  <circle cx="120" cy="318" r="5" fill="#f97316"/>
  <circle cx="650" cy="315" r="8" fill="#f9a8d4"/>
  <circle cx="643" cy="315" r="5" fill="#ec4899"/>
  <circle cx="657" cy="315" r="5" fill="#ec4899"/>
  <circle cx="650" cy="309" r="5" fill="#ec4899"/>
  <circle cx="650" cy="321" r="5" fill="#ec4899"/>
  <!-- Shadow/ominous element -->
  <ellipse cx="350" cy="350" rx="130" ry="25" fill="url(#adao3_shadow)"/>
</svg>
