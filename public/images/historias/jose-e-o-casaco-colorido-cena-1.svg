<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="sky11a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="50%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="ground11a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ccc8"/>
      <stop offset="100%" stop-color="#a1887f"/>
    </linearGradient>
  </defs>

  <!-- Desert sunset sky -->
  <rect width="800" height="380" fill="url(#sky11a)"/>

  <!-- Sun low on horizon -->
  <circle cx="700" cy="240" r="55" fill="#ff6f00" opacity="0.8"/>
  <circle cx="700" cy="240" r="40" fill="#ff8f00" opacity="0.7"/>

  <!-- Desert dunes background -->
  <ellipse cx="200" cy="320" rx="280" ry="90" fill="#bcaaa4" opacity="0.6"/>
  <ellipse cx="620" cy="310" rx="260" ry="85" fill="#a1887f" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="295" width="800" height="85" fill="url(#ground11a)"/>
  <rect x="0" y="295" width="800" height="10" fill="#efebe9"/>

  <!-- JACOB (father, tallest, center) -->
  <g transform="translate(352,130)">
    <ellipse cx="40" cy="168" rx="32" ry="9" fill="#6d4c41" opacity="0.25"/>
    <!-- Robe -->
    <path d="M10,58 Q40,52 70,58 L78,170 Q40,178 2,170 Z" fill="#7986cb"/>
    <!-- Stripe on robe -->
    <rect x="6" y="90" width="68" height="8" rx="3" fill="#5c6bc0" opacity="0.6"/>
    <!-- Belt -->
    <rect x="8" y="82" width="64" height="8" rx="3" fill="#4a148c"/>
    <!-- Arms open welcoming -->
    <path d="M10,66 Q-15,78 -20,96" stroke="#ffcc80" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M70,66 Q95,78 100,96" stroke="#ffcc80" stroke-width="13" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="40" cy="36" r="28" fill="#ffcc80"/>
    <!-- Grey hair/beard -->
    <ellipse cx="40" cy="14" rx="24" ry="12" fill="#9e9e9e"/>
    <ellipse cx="40" cy="56" rx="18" ry="12" fill="#9e9e9e"/>
    <!-- Eyes -->
    <circle cx="30" cy="32" r="4" fill="#333"/>
    <circle cx="31" cy="31" r="1.5" fill="white"/>
    <circle cx="50" cy="32" r="4" fill="#333"/>
    <circle cx="51" cy="31" r="1.5" fill="white"/>
    <!-- Smile -->
    <path d="M30,44 Q40,51 50,44" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="21" cy="42" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="59" cy="42" r="8" fill="#ef9a9a" opacity="0.4"/>
    <!-- Sandals -->
    <ellipse cx="18" cy="174" rx="13" ry="5" fill="#795548"/>
    <ellipse cx="62" cy="174" rx="13" ry="5" fill="#795548"/>
  </g>

  <!-- SON 1 - left of Jacob -->
  <g transform="translate(240,170)">
    <ellipse cx="30" cy="135" rx="24" ry="7" fill="#6d4c41" opacity="0.25"/>
    <rect x="6" y="46" width="48" height="88" rx="9" fill="#ef5350"/>
    <path d="M6,54 Q-12,65 -10,80" stroke="#ffb74d" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M54,54 Q72,65 70,80" stroke="#ffb74d" stroke-width="11" fill="none" stroke-linecap="round"/>
    <circle cx="30" cy="26" r="24" fill="#ffb74d"/>
    <ellipse cx="30" cy="8" rx="20" ry="10" fill="#4e342e"/>
    <circle cx="21" cy="23" r="4" fill="#333"/>
    <circle cx="22" cy="22" r="1.5" fill="white"/>
    <circle cx="39" cy="23" r="4" fill="#333"/>
    <circle cx="40" cy="22" r="1.5" fill="white"/>
    <path d="M21,33 Q30,40 39,33" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="13" cy="31" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="47" cy="31" r="6" fill="#ef9a9a" opacity="0.4"/>
  </g>

  <!-- SON 2 - right of Jacob -->
  <g transform="translate(490,165)">
    <ellipse cx="30" cy="140" rx="24" ry="7" fill="#6d4c41" opacity="0.25"/>
    <rect x="6" y="46" width="48" height="94" rx="9" fill="#26a69a"/>
    <path d="M6,54 Q-12,65 -10,82" stroke="#ffcc80" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M54,54 Q72,65 70,82" stroke="#ffcc80" stroke-width="11" fill="none" stroke-linecap="round"/>
    <circle cx="30" cy="26" r="24" fill="#ffcc80"/>
    <ellipse cx="30" cy="8" rx="20" ry="10" fill="#5d4037"/>
    <circle cx="21" cy="23" r="4" fill="#333"/>
    <circle cx="22" cy="22" r="1.5" fill="white"/>
    <circle cx="39" cy="23" r="4" fill="#333"/>
    <circle cx="40" cy="22" r="1.5" fill="white"/>
    <path d="M21,33 Q30,40 39,33" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="13" cy="31" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="47" cy="31" r="6" fill="#ef9a9a" opacity="0.4"/>
  </g>

  <!-- SON 3 - far left, shorter/younger -->
  <g transform="translate(155,190)">
    <ellipse cx="26" cy="114" rx="20" ry="6" fill="#6d4c41" opacity="0.25"/>
    <rect x="4" y="40" width="44" height="74" rx="8" fill="#ffa726"/>
    <path d="M4,48 Q-10,57 -8,70" stroke="#ffb74d" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M48,48 Q62,57 60,70" stroke="#ffb74d" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="26" cy="22" r="22" fill="#ffb74d"/>
    <ellipse cx="26" cy="6" rx="18" ry="9" fill="#5d4037"/>
    <circle cx="18" cy="20" r="4" fill="#333"/>
    <circle cx="19" cy="19" r="1.5" fill="white"/>
    <circle cx="34" cy="20" r="4" fill="#333"/>
    <circle cx="35" cy="19" r="1.5" fill="white"/>
    <path d="M18,29 Q26,36 34,29" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="11" cy="27" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="41" cy="27" r="6" fill="#ef9a9a" opacity="0.4"/>
  </g>

  <!-- SON 4 - far right -->
  <g transform="translate(590,175)">
    <ellipse cx="26" cy="128" rx="20" ry="6" fill="#6d4c41" opacity="0.25"/>
    <rect x="4" y="40" width="44" height="88" rx="8" fill="#66bb6a"/>
    <path d="M4,48 Q-10,58 -8,74" stroke="#ffcc80" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M48,48 Q62,58 60,74" stroke="#ffcc80" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="26" cy="22" r="22" fill="#ffcc80"/>
    <ellipse cx="26" cy="6" rx="18" ry="9" fill="#4e342e"/>
    <circle cx="18" cy="20" r="4" fill="#333"/>
    <circle cx="19" cy="19" r="1.5" fill="white"/>
    <circle cx="34" cy="20" r="4" fill="#333"/>
    <circle cx="35" cy="19" r="1.5" fill="white"/>
    <path d="M18,29 Q26,36 34,29" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="11" cy="27" r="6" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="41" cy="27" r="6" fill="#ef9a9a" opacity="0.4"/>
  </g>
</svg>
