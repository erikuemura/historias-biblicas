  <rect x="280" y="284" width="240" height="26" rx="3" fill="#92400e"/>
  <rect x="294" y="258" width="212" height="28" rx="3" fill="#d97706"/>
  <rect x="308" y="232" width="184" height="28" rx="3" fill="#b45309"/>
  <rect x="322" y="206" width="156" height="28" rx="3" fill="#d97706"/>
