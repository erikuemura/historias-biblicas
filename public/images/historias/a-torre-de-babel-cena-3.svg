  <circle cx="430" cy="148" r="7" fill="#15803d"/>
  <rect x="425" y="153" width="10" height="12" rx="3" fill="#16a34a"/>
  <circle cx="340" cy="197" r="7" fill="#7c3aed"/>
  <rect x="335" y="202" width="10" height="12" rx="3" fill="#6d28d9"/>
  <circle cx="452" cy="197" r="7" fill="#f97316"/>
