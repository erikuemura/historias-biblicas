<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="babel3_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="40%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="babel3_tower" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="babel3_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="babel3_starryglow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky (night/evening, tower reaching clouds) -->
  <rect width="800" height="380" fill="url(#babel3_sky)"/>
  <rect width="800" height="380" fill="url(#babel3_starryglow)"/>
  <!-- Stars -->
  <circle cx="60" cy="30" r="2" fill="white" opacity="0.8"/>
  <circle cx="120" cy="15" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="180" cy="40" r="2" fill="white" opacity="0.9"/>
  <circle cx="250" cy="20" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="620" cy="25" r="2" fill="white" opacity="0.8"/>
  <circle cx="680" cy="12" r="1.5" fill="white" opacity="0.7"/>
