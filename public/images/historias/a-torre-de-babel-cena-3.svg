  <rect x="0" y="330" width="800" height="50" fill="url(#babel3_ground)"/>
  <ellipse cx="400" cy="330" rx="480" ry="24" fill="#f59e0b" opacity="0.7"/>
  <!-- Building/houses in background -->
  <rect x="65" y="282" width="55" height="50" fill="#92400e" opacity="0.8"/>
  <polygon points="65,282 92,260 120,282" fill="#78350f" opacity="0.8"/>
  <rect x="685" y="278" width="55" height="55" fill="#92400e" opacity="0.8"/>
  <polygon points="685,278 712,255 740,278" fill="#78350f" opacity="0.8"/>
