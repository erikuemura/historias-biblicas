<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="adao2_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="adao2_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <radialGradient id="adao2_treeglow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="380" fill="url(#adao2_sky)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="60" rx="70" ry="28" fill="white" opacity="0.9"/>
  <ellipse cx="140" cy="48" rx="50" ry="24" fill="white" opacity="0.9"/>
  <ellipse cx="65" cy="55" rx="40" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="680" cy="50" rx="80" ry="30" fill="white" opacity="0.9"/>
  <ellipse cx="720" cy="38" rx="55" ry="25" fill="white" opacity="0.9"/>
  <ellipse cx="640" cy="45" rx="42" ry="22" fill="white" opacity="0.9"/>
  <!-- Ground -->
  <rect x="0" y="300" width="800" height="80" fill="url(#adao2_ground)"/>
  <ellipse cx="400" cy="300" rx="500" ry="30" fill="#4ade80"/>
  <!-- River -->
  <path d="M0 330 Q200 310 400 320 Q600 330 800 315" stroke="#60a5fa" stroke-width="18" fill="none" opacity="0.6"/>
  <path d="M0 325 Q200 305 400 315 Q600 325 800 310" stroke="#93c5fd" stroke-width="8" fill="none" opacity="0.5"/>
  <!-- Background trees -->
  <rect x="60" y="180" width="18" height="120" fill="#854d0e"/>
  <ellipse cx="69" cy="170" rx="55" ry="65" fill="#16a34a"/>
  <ellipse cx="50" cy="195" rx="38" ry="48" fill="#15803d"/>
  <ellipse cx="88" cy="190" rx="42" ry="52" fill="#22c55e"/>
  <rect x="700" y="170" width="18" height="130" fill="#854d0e"/>
  <ellipse cx="709" cy="160" rx="60" ry="70" fill="#16a34a"/>
  <ellipse cx="685" cy="182" rx="42" ry="55" fill="#15803d"/>
  <ellipse cx="730" cy="175" rx="48" ry="60" fill="#22c55e"/>
  <!-- Left smaller trees -->
  <rect x="175" y="215" width="14" height="85" fill="#854d0e"/>
  <ellipse cx="182" cy="208" rx="42" ry="50" fill="#22c55e"/>
  <ellipse cx="165" cy="225" rx="30" ry="38" fill="#16a34a"/>
  <rect x="600" y="210" width="14" height="90" fill="#854d0e"/>
  <ellipse cx="607" cy="203" rx="44" ry="52" fill="#22c55e"/>
  <ellipse cx="590" cy="220" rx="32" ry="40" fill="#16a34a"/>
  <!-- KNOWLEDGE TREE (center, special) -->
  <!-- Glow around knowledge tree -->
  <ellipse cx="400" cy="180" rx="120" ry="140" fill="url(#adao2_treeglow)"/>
  <!-- Trunk -->
  <rect x="387" y="165" width="26" height="145" rx="5" fill="#92400e"/>
  <!-- Branch left -->
  <path d="M390 210 Q350 185 320 170" stroke="#92400e" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Branch right -->
  <path d="M410 205 Q450 180 480 165" stroke="#92400e" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Foliage layers -->
  <ellipse cx="400" cy="145" rx="95" ry="105" fill="#15803d"/>
  <ellipse cx="360" cy="165" rx="65" ry="78" fill="#166534"/>
  <ellipse cx="442" cy="160" rx="68" ry="80" fill="#16a34a"/>
  <ellipse cx="400" cy="125" rx="75" ry="80" fill="#22c55e"/>
  <ellipse cx="380" cy="140" rx="50" ry="60" fill="#4ade80" opacity="0.6"/>
  <!-- Forbidden fruits (golden/red, prominently displayed) -->
  <circle cx="400" cy="105" r="16" fill="#ef4444"/>
  <circle cx="375" cy="118" r="14" fill="#dc2626"/>
  <circle cx="425" cy="115" r="15" fill="#f87171"/>
  <circle cx="358" cy="135" r="12" fill="#fbbf24"/>
  <circle cx="442" cy="130" r="13" fill="#fbbf24"/>
  <circle cx="388" cy="90" r="11" fill="#ef4444"/>
  <!-- Fruit shine -->
  <circle cx="397" cy="100" r="4" fill="#fef9c3" opacity="0.7"/>
  <circle cx="372" cy="113" r="3" fill="#fef9c3" opacity="0.7"/>
  <!-- Warning/forbidden shimmer around tree -->
  <ellipse cx="400" cy="140" rx="100" ry="110" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="10,8"/>
  <!-- Flowers around ground -->
  <circle cx="250" cy="305" r="9" fill="#fde047"/>
  <circle cx="244" cy="305" r="6" fill="#f97316"/>
  <circle cx="256" cy="305" r="6" fill="#f97316"/>
  <circle cx="250" cy="299" r="6" fill="#f97316"/>
  <circle cx="250" cy="311" r="6" fill="#f97316"/>
  <circle cx="550" cy="308" r="9" fill="#f9a8d4"/>
  <circle cx="544" cy="308" r="6" fill="#ec4899"/>
  <circle cx="556" cy="308" r="6" fill="#ec4899"/>
  <circle cx="550" cy="302" r="6" fill="#ec4899"/>
  <circle cx="550" cy="314" r="6" fill="#ec4899"/>
  <!-- Butterfly -->
  <ellipse cx="200" cy="240" rx="14" ry="8" fill="#a78bfa" opacity="0.85" transform="rotate(-20,200,240)"/>
  <ellipse cx="215" cy="238" rx="14" ry="8" fill="#7c3aed" opacity="0.85" transform="rotate(20,215,238)"/>
  <circle cx="207" cy="239" r="4" fill="#4c1d95"/>
  <!-- Bird -->
  <path d="M570 130 Q582 118 594 130" stroke="#1d4ed8" stroke-width="3" fill="none"/>
  <path d="M620 110 Q632 98 644 110" stroke="#1d4ed8" stroke-width="3" fill="none"/>
  <!-- Grass tufts -->
  <path d="M80 300 Q85 280 90 300" stroke="#16a34a" stroke-width="5" fill="none"/>
  <path d="M90 300 Q95 278 100 300" stroke="#16a34a" stroke-width="5" fill="none"/>
  <path d="M670 298 Q675 277 680 298" stroke="#16a34a" stroke-width="5" fill="none"/>
  <path d="M680 298 Q685 275 690 298" stroke="#16a34a" stroke-width="5" fill="none"/>
</svg>
