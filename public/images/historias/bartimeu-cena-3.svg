<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bt3_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0C850;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F8E090;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bt3_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D0B060;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B09040;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="bt3_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFC0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFD040;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="bt3_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FFE040;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="380" fill="url(#bt3_sky)"/>
  <!-- Ground -->
  <rect x="0" y="285" width="800" height="95" fill="url(#bt3_ground)"/>
  <!-- Road -->
  <ellipse cx="400" cy="302" rx="280" ry="16" fill="#C8A850" opacity="0.5"/>
  <!-- Distant buildings -->
  <rect x="620" y="160" width="90" height="125" fill="#E0C880" rx="3"/>
  <rect x="700" y="175" width="80" height="110" fill="#D8C070" rx="3"/>
  <!-- JESUS stopped center - strong divine light -->
  <!-- Large halo/glow -->
  <circle cx="400" cy="200" r="110" fill="url(#bt3_halo)"/>
  <circle cx="400" cy="200" r="75" fill="url(#bt3_glow)" opacity="0.8"/>
  <!-- Jesus figure -->
  <circle cx="400" cy="178" r="26" fill="#F5D090"/>
  <ellipse cx="400" cy="161" rx="26" ry="14" fill="#8B5020"/>
  <path d="M386,161 Q372,184 376,200" stroke="#8B5020" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M414,161 Q428,184 424,200" stroke="#8B5020" stroke-width="9" fill="none" stroke-linecap="round"/>
  <ellipse cx="400" cy="198" rx="16" ry="9" fill="#9A6030" opacity="0.8"/>
  <polygon points="372,204 428,204 438,290 362,290" fill="#F8F0D8"/>
  <polygon points="362,212 438,212 448,290 352,290" fill="#4870C0" opacity="0.65"/>
  <!-- Jesus arms - one pointing toward Bartimeu, crowd parting -->
  <line x1="428" y1="218" x2="475" y2="230" stroke="#F5D090" stroke-width="12" stroke-linecap="round"/>
  <circle cx="478" cy="232" r="10" fill="#F5D090"/>
  <line x1="372" y1="218" x2="330" y2="225" stroke="#F5D090" stroke-width="12" stroke-linecap="round"/>
  <!-- Jesus calm confident expression -->
  <ellipse cx="392" cy="177" rx="4.5" ry="5.5" fill="#5A3820"/>
  <ellipse cx="408" cy="177" rx="4.5" ry="5.5" fill="#5A3820"/>
  <circle cx="391" cy="176" r="1.8" fill="white" opacity="0.6"/>
  <circle cx="407" cy="176" r="1.8" fill="white" opacity="0.6"/>
  <path d="M390,190 Q400,198 410,190" stroke="#8B4020" stroke-width="2.5" fill="none"/>
  <!-- Light rays from Jesus -->
  <line x1="400" y1="95" x2="400" y2="70" stroke="#FFE050" stroke-width="3" opacity="0.7"/>
  <line x1="458" y1="110" x2="480" y2="88" stroke="#FFE050" stroke-width="3" opacity="0.6"/>
  <line x1="342" y1="110" x2="320" y2="88" stroke="#FFE050" stroke-width="3" opacity="0.6"/>
  <line x1="480" y1="155" x2="510" y2="145" stroke="#FFE050" stroke-width="2.5" opacity="0.5"/>
  <line x1="320" y1="155" x2="290" y2="145" stroke="#FFE050" stroke-width="2.5" opacity="0.5"/>
  <!-- CROWD PARTING - people on left side -->
  <circle cx="230" cy="215" r="20" fill="#F0B080"/>
  <ellipse cx="230" cy="200" rx="20" ry="11" fill="#4A2010"/>
  <polygon points="211,235 249,235 252,285 208,285" fill="#6080C0"/>
  <!-- Stepping back, making way -->
  <line x1="211" y1="245" x2="193" y2="255" stroke="#F0B080" stroke-width="9" stroke-linecap="round"/>
  <line x1="249" y1="245" x2="258" y2="255" stroke="#F0B080" stroke-width="9" stroke-linecap="round"/>
  <!-- Looking at Jesus in awe -->
  <ellipse cx="222" cy="214" rx="4" ry="5" fill="#5A3820"/>
  <ellipse cx="238" cy="214" rx="4" ry="5" fill="#5A3820"/>
  <!-- Wide open eyes, pointing -->
  <line x1="249" y1="235" x2="310" y2="228" stroke="#F0B080" stroke-width="4" opacity="0.6"/>
  <circle cx="310" cy="228" r="5" fill="#F0B080" opacity="0.5"/>
  <!-- Person 2 left crowd -->
  <circle cx="140" cy="228" r="18" fill="#E8C090"/>
  <ellipse cx="140" cy="214" rx="18" ry="10" fill="#7A4020"/>
  <polygon points="123,246 157,246 160,285 120,285" fill="#C04040"/>
  <line x1="157" y1="255" x2="172" y2="248" stroke="#E8C090" stroke-width="8" stroke-linecap="round"/>
  <!-- Pointing toward Bartimeu -->
  <line x1="172" y1="248" x2="540" y2="255" stroke="#E8C090" stroke-width="3" stroke-dasharray="5,4" opacity="0.4"/>
  <!-- CROWD RIGHT side -->
  <circle cx="570" cy="220" r="19" fill="#F0A870"/>
  <ellipse cx="570" cy="206" rx="19" ry="10" fill="#3A2010"/>
  <polygon points="552,239 588,239 591,285 549,285" fill="#40A060"/>
  <line x1="552" y1="248" x2="535" y2="255" stroke="#F0A870" stroke-width="9" stroke-linecap="round"/>
  <!-- Stepping aside, looking back at Bartimeu -->
  <ellipse cx="562" cy="219" rx="3.5" ry="4.5" fill="#5A3820"/>
  <ellipse cx="576" cy="219" rx="3.5" ry="4.5" fill="#5A3820"/>
  <circle cx="660" cy="228" r="18" fill="#F0C0A0"/>
  <ellipse cx="660" cy="214" rx="18" ry="10" fill="#5A3010"/>
  <polygon points="643,246 677,246 680,285 640,285" fill="#8040C0"/>
  <!-- BARTIMEU - right side, being called, confused/hopeful -->
  <circle cx="670" cy="222" r="0" fill="transparent"/>
  <!-- Bartimeu on far right, still by road edge -->
  <circle cx="720" cy="235" r="19" fill="#E0A060"/>
  <ellipse cx="720" cy="221" rx="20" ry="11" fill="#4A2808"/>
  <polygon points="702,254 738,254 742,287 698,287" fill="#A09070"/>
  <!-- Arms reaching forward tentatively -->
  <line x1="702" y1="263" x2="680" y2="258" stroke="#E0A060" stroke-width="9" stroke-linecap="round"/>
  <line x1="738" y1="263" x2="755" y2="260" stroke="#E0A060" stroke-width="9" stroke-linecap="round"/>
  <!-- Blind eyes, face turned toward the light/sound -->
  <ellipse cx="713" cy="234" rx="4" ry="4" fill="#F0E8D8"/>
  <ellipse cx="727" cy="234" rx="4" ry="4" fill="#F0E8D8"/>
  <!-- Hopeful mouth, slightly open -->
  <path d="M714,245 Q721,250 728,245" stroke="#8B5030" stroke-width="2" fill="none"/>
  <!-- Eyebrows raised - hopeful -->
  <path d="M709,227 Q713,222 717,227" stroke="#5A3820" stroke-width="2" fill="none"/>
  <path d="M723,226 Q727,221 731,226" stroke="#5A3820" stroke-width="2" fill="none"/>
  <!-- Walking stick -->
  <line x1="745" y1="255" x2="758" y2="290" stroke="#8B6030" stroke-width="5" stroke-linecap="round"/>
  <!-- Title -->
  <rect x="0" y="345" width="800" height="35" fill="#B07820" opacity="0.6"/>
  <text x="400" y="368" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Bartimeu — Cena 3: Jesus Para e Chama</text>
</svg>
