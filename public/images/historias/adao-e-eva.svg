  <circle cx="390" cy="135" r="14" fill="#ef4444"/>
  <circle cx="415" cy="148" r="12" fill="#dc2626"/>
  <circle cx="375" cy="155" r="11" fill="#f87171"/>
  <!-- Flowers -->
  <circle cx="200" cy="355" r="8" fill="#fde047"/>
  <circle cx="195" cy="355" r="5" fill="#f97316"/>
  <circle cx="205" cy="355" r="5" fill="#f97316"/>
  <circle cx="200" cy="350" r="5" fill="#f97316"/>
  <circle cx="200" cy="360" r="5" fill="#f97316"/>
  <circle cx="560" cy="360" r="8" fill="#f9a8d4"/>
  <circle cx="555" cy="360" r="5" fill="#ec4899"/>
  <circle cx="565" cy="360" r="5" fill="#ec4899"/>
  <circle cx="560" cy="355" r="5" fill="#ec4899"/>
  <circle cx="560" cy="365" r="5" fill="#ec4899"/>
  <!-- Animals: deer -->
  <ellipse cx="280" cy="340" rx="30" ry="18" fill="#d97706"/>
  <rect x="268" y="340" width="8" height="25" fill="#b45309"/>
  <rect x="284" y="340" width="8" height="25" fill="#b45309"/>
  <rect x="298" y="338" width="8" height="22" fill="#b45309"/>
  <rect x="314" y="338" width="8" height="22" fill="#b45309"/>
  <ellipse cx="272" cy="332" rx="14" ry="12" fill="#d97706"/>
  <ellipse cx="266" cy="326" rx="5" ry="8" fill="#d97706"/><!-- ear -->
  <circle cx="263" cy="328" r="3" fill="#92400e"/><!-- eye -->
  <!-- Lion -->
  <ellipse cx="540" cy="345" rx="32" ry="20" fill="#f59e0b"/>
  <rect x="528" y="345" width="9" height="22" fill="#d97706"/>
  <rect x="544" y="345" width="9" height="22" fill="#d97706"/>
  <rect x="557" y="343" width="9" height="20" fill="#d97706"/>
  <ellipse cx="536" cy="336" rx="18" ry="15" fill="#f59e0b"/>
  <ellipse cx="536" cy="336" rx="22" ry="19" fill="#b45309" opacity="0.4"/><!-- mane -->
  <circle cx="530" cy="332" r="3" fill="#1c1917"/>
  <!-- Birds -->
  <path d="M300 130 Q310 120 320 130" stroke="#1d4ed8" stroke-width="3" fill="none"/>
  <path d="M480 110 Q492 98 504 110" stroke="#1d4ed8" stroke-width="3" fill="none"/>
  <path d="M200 150 Q210 140 220 150" stroke="#7c3aed" stroke-width="2.5" fill="none"/>
  <!-- Butterflies -->
  <ellipse cx="340" cy="270" rx="12" ry="7" fill="#f472b6" opacity="0.8" transform="rotate(-20,340,270)"/>
  <ellipse cx="352" cy="268" rx="12" ry="7" fill="#ec4899" opacity="0.8" transform="rotate(20,352,268)"/>
  <circle cx="346" cy="269" r="3" fill="#831843"/>
  <ellipse cx="460" cy="260" rx="11" ry="6" fill="#a78bfa" opacity="0.8" transform="rotate(-25,460,260)"/>
  <ellipse cx="472" cy="258" rx="11" ry="6" fill="#7c3aed" opacity="0.8" transform="rotate(25,472,258)"/>
  <circle cx="466" cy="259" r="3" fill="#4c1d95"/>
  <!-- River -->
  <path d="M50 390 Q200 360 400 370 Q600 380 750 360" stroke="#7dd3fc" stroke-width="12" fill="none" opacity="0.7"/>
  <path d="M50 395 Q200 368 400 376 Q600 386 750 366" stroke="#bae6fd" stroke-width="5" fill="none" opacity="0.5"/>
</svg>
