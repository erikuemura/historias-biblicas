  <rect x="110" y="200" width="22" height="130" fill="#854d0e"/>
  <ellipse cx="121" cy="195" rx="65" ry="75" fill="#16a34a"/>
  <ellipse cx="90" cy="220" rx="45" ry="55" fill="#15803d"/>
  <ellipse cx="155" cy="215" rx="50" ry="60" fill="#22c55e"/>
  <!-- Large tree right -->
  <rect x="660" y="190" width="22" height="140" fill="#854d0e"/>
  <ellipse cx="671" cy="185" rx="70" ry="80" fill="#16a34a"/>
  <ellipse cx="640" cy="210" rx="50" ry="60" fill="#15803d"/>
  <ellipse cx="700" cy="200" rx="55" ry="65" fill="#22c55e"/>
  <!-- Central tree (knowledge tree) -->
  <rect x="388" y="170" width="24" height="160" fill="#92400e"/>
  <ellipse cx="400" cy="160" rx="80" ry="90" fill="#15803d"/>
  <ellipse cx="365" cy="185" rx="55" ry="65" fill="#166534"/>
  <ellipse cx="438" cy="180" rx="60" ry="70" fill="#22c55e"/>
