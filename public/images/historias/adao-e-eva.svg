<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="adaoHero_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="50%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="adaoHero_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <radialGradient id="adaoHero_sun" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="adaoHero_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky background -->
  <rect width="800" height="400" fill="url(#adaoHero_sky)"/>
  <!-- Sun glow -->
  <ellipse cx="400" cy="80" rx="180" ry="120" fill="url(#adaoHero_sun)"/>
  <!-- Sun -->
  <circle cx="400" cy="60" r="45" fill="#fde047"/>
  <!-- Sun rays -->
  <polygon points="400,5 410,40 400,30 390,40" fill="#fbbf24"/>
  <polygon points="445,20 425,48 430,38 415,45" fill="#fbbf24"/>
  <polygon points="460,55 430,60 440,55 430,65" fill="#fbbf24"/>
  <polygon points="445,95 420,75 430,78 420,65" fill="#fbbf24"/>
  <polygon points="355,20 375,48 370,38 385,45" fill="#fbbf24"/>
  <polygon points="340,55 370,60 360,55 370,65" fill="#fbbf24"/>
  <polygon points="355,95 380,75 370,78 380,65" fill="#fbbf24"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="90" rx="60" ry="25" fill="white" opacity="0.85"/>
  <ellipse cx="155" cy="78" rx="40" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="85" cy="82" rx="35" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="650" cy="70" rx="70" ry="28" fill="white" opacity="0.85"/>
  <ellipse cx="690" cy="58" rx="45" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="615" cy="65" rx="38" ry="20" fill="white" opacity="0.85"/>
  <!-- Ground -->
  <ellipse cx="400" cy="420" rx="460" ry="120" fill="url(#adaoHero_ground)"/>
