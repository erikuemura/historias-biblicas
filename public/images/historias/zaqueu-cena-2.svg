<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="zq2_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70C8A0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A8E0C0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="zq2_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8C870;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#90A840;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="zq2_trunk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6A4020;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5A30;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="380" fill="url(#zq2_sky)"/>
  <!-- Sun -->
  <circle cx="680" cy="65" r="42" fill="#FFE850" opacity="0.85"/>
  <!-- Clouds -->
  <ellipse cx="180" cy="60" rx="75" ry="28" fill="white" opacity="0.75"/>
  <ellipse cx="500" cy="50" rx="65" ry="24" fill="white" opacity="0.7"/>
  <!-- Ground -->
  <rect x="0" y="295" width="800" height="85" fill="url(#zq2_ground)"/>
  <!-- Path / road -->
  <ellipse cx="400" cy="320" rx="250" ry="18" fill="#C8B860" opacity="0.5"/>
  <!-- BIG SYCAMORE TREE - center -->
  <!-- Trunk - wide, knobbly -->
  <rect x="360" y="160" width="80" height="150" fill="url(#zq2_trunk)" rx="10"/>
  <!-- Trunk texture knots -->
  <ellipse cx="385" cy="220" rx="12" ry="8" fill="#5A3010" opacity="0.5"/>
  <ellipse cx="415" cy="260" rx="10" ry="7" fill="#5A3010" opacity="0.4"/>
  <!-- Roots at base -->
  <path d="M360,305 Q340,295 320,305" stroke="#6A4020" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M440,305 Q460,295 480,308" stroke="#6A4020" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Main branches -->
  <line x1="400" y1="185" x2="300" y2="130" stroke="#7A5030" stroke-width="18" stroke-linecap="round"/>
  <line x1="400" y1="185" x2="500" y2="120" stroke="#7A5030" stroke-width="18" stroke-linecap="round"/>
  <line x1="400" y1="210" x2="250" y2="170" stroke="#7A5030" stroke-width="14" stroke-linecap="round"/>
  <line x1="400" y1="210" x2="560" y2="160" stroke="#7A5030" stroke-width="14" stroke-linecap="round"/>
  <!-- Foliage - dense green -->
  <circle cx="300" cy="110" r="65" fill="#3A9050"/>
  <circle cx="240" cy="140" r="50" fill="#2A8040"/>
  <circle cx="500" cy="100" r="68" fill="#3A9050"/>
  <circle cx="565" cy="135" r="52" fill="#2A8040"/>
  <circle cx="400" cy="90" r="70" fill="#4AAA60"/>
  <circle cx="350" cy="120" r="45" fill="#3A9050"/>
  <circle cx="450" cy="115" r="48" fill="#3A9050"/>
  <!-- Smaller leaf clusters -->
  <circle cx="275" cy="100" r="30" fill="#4AAA60"/>
  <circle cx="530" cy="105" r="32" fill="#4AAA60"/>
  <circle cx="400" cy="65" r="38" fill="#5ABB70"/>
  <!-- Fig fruits on tree -->
  <circle cx="320" cy="125" r="7" fill="#8B4060"/>
  <circle cx="480" cy="110" r="7" fill="#8B4060"/>
  <circle cx="365" cy="95" r="6" fill="#8B4060"/>
  <circle cx="435" cy="100" r="6" fill="#8B4060"/>
  <!-- ZAQUEU in the tree - well-dressed adult climbing like a child -->
  <!-- He's sitting on a branch, upper area -->
  <circle cx="310" cy="165" r="18" fill="#F5C870"/>
  <!-- Fine hair -->
  <ellipse cx="310" cy="151" rx="18" ry="9" fill="#3A2010"/>
  <!-- Green fine robe but now disheveled from climbing -->
  <polygon points="294,183 326,183 322,220 298,220" fill="#2A8A4A"/>
  <!-- Gold trim still showing -->
  <rect x="294" y="183" width="32" height="4" fill="#D4A030"/>
  <!-- Legs straddling branch -->
  <ellipse cx="295" cy="215" rx="15" ry="8" fill="#2A8A4A" transform="rotate(-20,295,215)"/>
  <ellipse cx="325" cy="213" rx="15" ry="8" fill="#2A8A4A" transform="rotate(15,325,213)"/>
  <!-- Feet gripping branch -->
  <ellipse cx="283" cy="220" rx="9" ry="5" fill="#C09040"/>
  <ellipse cx="334" cy="218" rx="9" ry="5" fill="#C09040"/>
  <!-- Arms gripping branch above -->
  <line x1="294" y1="190" x2="272" y2="175" stroke="#F5C870" stroke-width="8" stroke-linecap="round"/>
  <line x1="326" y1="190" x2="345" y2="178" stroke="#F5C870" stroke-width="8" stroke-linecap="round"/>
  <!-- Branch he's on -->
  <line x1="230" y1="200" x2="390" y2="175" stroke="#7A5030" stroke-width="16" stroke-linecap="round"/>
  <!-- Zaqueu determined face - looking toward where Jesus will come -->
  <ellipse cx="303" cy="164" rx="3.5" ry="4" fill="#5A3820"/>
  <ellipse cx="317" cy="163" rx="3.5" ry="4" fill="#5A3820"/>
  <!-- Determined/focused eyebrows -->
  <path d="M299,157 Q303,154 307,157" stroke="#5A3820" stroke-width="2" fill="none"/>
  <path d="M313,156 Q317,153 321,156" stroke="#5A3820" stroke-width="2" fill="none"/>
  <!-- Slight smile - determined -->
  <path d="M304,173 Q310,178 316,173" stroke="#8B4020" stroke-width="2" fill="none"/>
  <!-- Coin purse dangling -->
  <ellipse cx="330" cy="208" rx="9" ry="8" fill="#D4A030"/>
  <rect x="325" y="198" width="8" height="7" fill="#C09020"/>
  <!-- CROWD below looking up with surprise -->
  <!-- Person 1 -->
  <circle cx="530" cy="240" r="19" fill="#F0B080"/>
  <ellipse cx="530" cy="225" rx="19" ry="10" fill="#4A2010"/>
  <polygon points="513,259 547,259 550,298 510,298" fill="#C04040"/>
  <!-- Looking up gesture -->
  <line x1="513" y1="265" x2="495" y2="258" stroke="#F0B080" stroke-width="8" stroke-linecap="round"/>
  <line x1="547" y1="265" x2="560" y2="252" stroke="#F0B080" stroke-width="8" stroke-linecap="round"/>
  <!-- Tilted head looking up -->
  <ellipse cx="523" cy="238" rx="3" ry="4" fill="#5A3820"/>
  <ellipse cx="537" cy="237" rx="3" ry="4" fill="#5A3820"/>
  <!-- Person 2 -->
  <circle cx="610" cy="245" r="18" fill="#E8C090"/>
  <ellipse cx="610" cy="231" rx="18" ry="10" fill="#7A4020"/>
  <polygon points="594,263 626,263 629,298 591,298" fill="#4080C0"/>
  <ellipse cx="603" cy="243" rx="3" ry="4" fill="#5A3820"/>
  <ellipse cx="617" cy="242" rx="3" ry="4" fill="#5A3820"/>
  <!-- Person 3 - pointing at tree, amused -->
  <circle cx="680" cy="238" r="17" fill="#F0A870"/>
  <ellipse cx="680" cy="224" rx="17" ry="9" fill="#3A2010"/>
  <polygon points="665,255 695,255 698,297 662,297" fill="#40A060"/>
  <line x1="665" y1="262" x2="640" y2="248" stroke="#F0A870" stroke-width="8" stroke-linecap="round"/>
  <!-- Pointing finger at tree -->
  <line x1="640" y1="248" x2="420" y2="200" stroke="#F0A870" stroke-width="4" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- Title -->
  <rect x="0" y="345" width="800" height="35" fill="#2A7A40" opacity="0.6"/>
  <text x="400" y="368" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Zaqueu — Cena 2: Subindo na Árvore</text>
</svg>
