<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="dan2_corridor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0830"/>
      <stop offset="40%" stop-color="#3a1858"/>
      <stop offset="100%" stop-color="#1a0830"/>
    </linearGradient>
    <linearGradient id="dan2_floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3080"/>
      <stop offset="100%" stop-color="#2a0840"/>
    </linearGradient>
    <linearGradient id="dan2_wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7050a0"/>
      <stop offset="100%" stop-color="#3a1860"/>
    </linearGradient>
    <radialGradient id="dan2_daniellight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a5c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff9a5c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dan2_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0418" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#0a0418" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0418" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Dark palace corridor background -->
  <rect width="800" height="380" fill="url(dan2_corridor)"/>

  <!-- Corridor perspective walls -->
  <!-- Left wall -->
  <polygon points="0,0 200,80 200,380 0,380" fill="url(#dan2_wall)"/>
  <!-- Right wall -->
  <polygon points="800,0 600,80 600,380 800,380" fill="url(#dan2_wall)"/>
  <!-- Ceiling perspective -->
  <polygon points="0,0 800,0 600,80 200,80" fill="#12061e"/>
  <!-- Floor -->
  <polygon points="200,380 600,380 600,300 200,300" fill="url(#dan2_floor)"/>
  <!-- Floor tiles -->
  <line x1="200" y1="330" x2="600" y2="330" stroke="#6a3090" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="360" x2="600" y2="360" stroke="#6a3090" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="300" x2="260" y2="380" stroke="#6a3090" stroke-width="1.5" opacity="0.4"/>
  <line x1="360" y1="300" x2="360" y2="380" stroke="#6a3090" stroke-width="1.5" opacity="0.4"/>
  <line x1="440" y1="300" x2="440" y2="380" stroke="#6a3090" stroke-width="1.5" opacity="0.4"/>
  <line x1="520" y1="300" x2="540" y2="380" stroke="#6a3090" stroke-width="1.5" opacity="0.4"/>

  <!-- Column left -->
  <rect x="175" y="60" width="30" height="260" fill="#6050a0" opacity="0.7"/>
  <ellipse cx="190" cy="60" rx="20" ry="10" fill="#8070c0" opacity="0.7"/>
  <!-- Column right -->
  <rect x="595" y="60" width="30" height="260" fill="#6050a0" opacity="0.7"/>
  <ellipse cx="610" cy="60" rx="20" ry="10" fill="#8070c0" opacity="0.7"/>

  <!-- Torch on left wall giving dim light -->
  <rect x="220" y="140" width="10" height="30" fill="#8b5e20"/>
  <ellipse cx="225" cy="135" rx="8" ry="14" fill="#ff8f00" opacity="0.85"/>
  <ellipse cx="225" cy="132" rx="5" ry="10" fill="#ffee58" opacity="0.8"/>
  <!-- Torch glow -->
  <ellipse cx="225" cy="145" rx="40" ry="30" fill="#ff8f00" opacity="0.15"/>

  <!-- Daniel's room door (open, right center background) — warm light spilling -->
  <rect x="340" y="100" width="120" height="200" rx="6" fill="#ff9a5c" opacity="0.2"/>
  <rect x="340" y="100" width="10" height="200" rx="3" fill="#5a3010"/>
  <rect x="450" y="100" width="10" height="200" rx="3" fill="#5a3010"/>
  <path d="M340 100 Q400 75 460 100" fill="#5a3010"/>
  <!-- Light from Daniel's room -->
  <ellipse cx="400" cy="240" rx="70" ry="100" fill="url(#dan2_daniellight)"/>

  <!-- Shadow on left — spying officials hiding -->
  <rect x="0" y="0" width="300" height="380" fill="url(#dan2_shadow)"/>

  <!-- Official 1 — sneaking, pressed against left wall, peering around corner -->
  <!-- Body in shadow -->
  <path d="M45 320 Q50 255 62 242 Q78 232 94 238 Q108 248 110 320Z" fill="#2a1840" opacity="0.9"/>
  <!-- Robe hint -->
  <path d="M48 318 Q52 260 63 247 Q48 272 48 318Z" fill="#3a2060" opacity="0.7"/>
  <!-- Head peeking around -->
  <circle cx="92" cy="235" r="20" fill="#c8956c"/>
  <!-- Turban/hat — official looking -->
  <path d="M74 228 Q80 214 92 211 Q104 214 110 228 Q104 235 92 237 Q80 235 74 228Z" fill="#8040a0"/>
  <!-- Sneaky eyes — wide, darting toward Daniel's room -->
  <ellipse cx="84" cy="231" rx="4.5" ry="4" fill="white"/>
  <ellipse cx="97" cy="231" rx="4.5" ry="4" fill="white"/>
  <circle cx="86" cy="231" r="2.5" fill="#1a0a30"/>
  <circle cx="99" cy="231" r="2.5" fill="#1a0a30"/>
  <!-- Pupils shifted RIGHT toward door (sneaking gaze) -->
  <!-- Raised eyebrows — suspicious -->
  <path d="M80 225 Q84 222 88 225" stroke="#5a3010" stroke-width="1.5" fill="none"/>
  <path d="M93 225 Q97 222 101 225" stroke="#5a3010" stroke-width="1.5" fill="none"/>
  <!-- Sly thin smile -->
  <path d="M83 240 Q92 244 101 240" stroke="#8b3a10" stroke-width="1.5" fill="none"/>
  <!-- Short beard -->
  <path d="M76 239 Q80 250 92 254 Q104 250 108 239" fill="#5a3010" opacity="0.6"/>
  <!-- Hand gesturing to companion — finger to lips "shhh" -->
  <line x1="106" y1="252" x2="130" y2="240" stroke="#c8956c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="132" cy="239" r="7" fill="#c8956c"/>
  <!-- Finger to lips -->
  <circle cx="132" cy="237" r="4" fill="#c8956c"/>

  <!-- Official 2 — crouching behind first, peeking over shoulder -->
  <circle cx="55" cy="245" r="17" fill="#b87860"/>
  <!-- Hat -->
  <path d="M40 237 Q46 224 55 221 Q64 224 70 237" fill="#6030a0"/>
  <!-- Sneaky peering eyes -->
  <ellipse cx="47" cy="241" rx="4" ry="3.5" fill="white"/>
  <ellipse cx="59" cy="241" rx="4" ry="3.5" fill="white"/>
  <circle cx="49" cy="241" r="2" fill="#1a0a30"/>
  <circle cx="61" cy="241" r="2" fill="#1a0a30"/>
  <!-- Pupils right -->
  <!-- Raised brow -->
  <path d="M44 235 Q48 232 52 235" stroke="#5a3010" stroke-width="1.5" fill="none"/>
  <path d="M56 235 Q60 232 64 235" stroke="#5a3010" stroke-width="1.5" fill="none"/>
  <!-- Body behind first official -->
  <path d="M30 320 Q35 268 45 257 Q30 280 30 320Z" fill="#2a1840" opacity="0.8"/>

  <!-- Sound lines from Daniel's room (prayer sounds) -->
  <path d="M340 200 Q300 200 280 190" stroke="#9060c0" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.5"/>
  <path d="M340 220 Q295 218 272 210" stroke="#9060c0" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Caption -->
  <rect x="10" y="344" width="380" height="28" rx="14" fill="#1a0830" opacity="0.9"/>
  <text x="200" y="363" font-family="Georgia, serif" font-size="14" fill="#e0b0ff" text-anchor="middle" font-weight="bold">Os oficiais espiam Daniel em segredo</text>
</svg>
