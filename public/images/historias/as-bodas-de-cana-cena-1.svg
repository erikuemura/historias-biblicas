  <rect x="80" y="226" width="280" height="14" rx="3" fill="#d97706"/>
  <rect x="450" y="230" width="280" height="85" rx="8" fill="#b45309"/>
  <rect x="450" y="226" width="280" height="14" rx="3" fill="#d97706"/>
