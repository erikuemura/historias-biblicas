  <circle cx="359" cy="120" r="5" fill="#f472b6"/>
  <circle cx="378" cy="126" r="5" fill="#f472b6"/>
  <circle cx="350" cy="139" r="5" fill="#78350f"/>
  <circle cx="368" cy="139" r="5" fill="#78350f"/>
