  <line x1="100" y1="310" x2="100" y2="380" stroke="#b45309" stroke-width="2" opacity="0.3"/>
  <line x1="200" y1="310" x2="200" y2="380" stroke="#b45309" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="310" x2="300" y2="380" stroke="#b45309" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="310" x2="400" y2="380" stroke="#b45309" stroke-width="2" opacity="0.3"/>
  <line x1="500" y1="310" x2="500" y2="380" stroke="#b45309" stroke-width="2" opacity="0.3"/>
  <line x1="600" y1="310" x2="600" y2="380" stroke="#b45309" stroke-width="2" opacity="0.3"/>
  <line x1="700" y1="310" x2="700" y2="380" stroke="#b45309" stroke-width="2" opacity="0.3"/>
