  <circle cx="359" cy="141" r="26" fill="#fde68a"/>
  <ellipse cx="359" cy="130" rx="26" ry="15" fill="#451a03"/>
  <ellipse cx="359" cy="122" rx="26" ry="11" fill="white" opacity="0.7"/>
