  <line x1="145" y1="198" x2="168" y2="178" stroke="#dc2626" stroke-width="8" stroke-linecap="round"/>
  <!-- Guest left 2 - green -->
  <rect x="165" y="178" width="48" height="112" rx="10" fill="#16a34a"/>
  <circle cx="189" cy="165" r="22" fill="#fbbf24"/>
  <ellipse cx="189" cy="155" rx="22" ry="12" fill="#15803d"/>
  <path d="M182,172 Q189,180 196,172" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- Guest right 1 - purple -->
  <rect x="560" y="172" width="50" height="118" rx="10" fill="#7c3aed"/>
  <circle cx="585" cy="159" r="23" fill="#fde68a"/>
  <ellipse cx="585" cy="149" rx="23" ry="13" fill="#5b21b6"/>
  <path d="M578,166 Q585,174 592,166" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <line x1="560" y1="195" x2="535" y2="175" stroke="#fde68a" stroke-width="8" stroke-linecap="round"/>
  <line x1="610" y1="195" x2="632" y2="175" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
  <!-- Guest right 2 - orange -->
  <rect x="635" y="176" width="48" height="114" rx="10" fill="#f59e0b"/>
  <circle cx="659" cy="163" r="22" fill="#fde68a"/>
  <ellipse cx="659" cy="153" rx="22" ry="12" fill="#b45309"/>
  <path d="M652,170 Q659,178 666,170" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <line x1="683" y1="198" x2="705" y2="178" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <!-- Music notes floating -->
  <ellipse cx="300" cy="110" rx="8" ry="6" fill="#78350f" opacity="0.4"/>
  <rect x="308" y="98" width="3" height="14" fill="#78350f" opacity="0.4"/>
  <ellipse cx="480" cy="115" rx="8" ry="6" fill="#78350f" opacity="0.4"/>
  <rect x="488" y="103" width="3" height="14" fill="#78350f" opacity="0.4"/>
