<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bc1_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="bc1_floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bc1_bg)"/>
  <!-- Ceiling decorations -->
  <rect x="0" y="0" width="800" height="10" fill="#f59e0b"/>
  <!-- Hanging garlands -->
  <path d="M0,25 Q100,45 200,25 Q300,5 400,25 Q500,45 600,25 Q700,5 800,25" stroke="#84cc16" stroke-width="3" fill="none"/>
  <path d="M0,38 Q100,58 200,38 Q300,18 400,38 Q500,58 600,38 Q700,18 800,38" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
