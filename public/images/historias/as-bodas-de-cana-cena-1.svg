  <rect x="415" y="158" width="55" height="132" rx="12" fill="#1d4ed8"/>
  <circle cx="442" cy="144" r="26" fill="#d97706"/>
  <ellipse cx="442" cy="133" rx="26" ry="15" fill="#78350f"/>
