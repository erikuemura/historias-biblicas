  <rect x="422" y="120" width="40" height="10" rx="3" fill="#b45309"/>
  <circle cx="442" cy="119" r="5" fill="#f59e0b"/>
  <circle cx="350" cy="139" r="5" fill="#78350f"/>
  <circle cx="452" cy="140" r="5" fill="#78350f"/>
  <path d="M434,151 Q442,162 450,151" stroke="#92400e" stroke-width="3" fill="none"/>
  <line x1="415" y1="182" x2="390" y2="162" stroke="#1d4ed8" stroke-width="9" stroke-linecap="round"/>
  <line x1="470" y1="182" x2="492" y2="162" stroke="#fde68a" stroke-width="9" stroke-linecap="round"/>
