  <circle cx="220" cy="232" r="15" fill="#ef4444" opacity="0.7"/>
  <circle cx="290" cy="232" r="15" fill="#86efac" opacity="0.7"/>
  <circle cx="520" cy="232" r="15" fill="#fb923c" opacity="0.7"/>
  <circle cx="590" cy="232" r="15" fill="#fbbf24" opacity="0.7"/>
  <circle cx="660" cy="232" r="15" fill="#a78bfa" opacity="0.7"/>
