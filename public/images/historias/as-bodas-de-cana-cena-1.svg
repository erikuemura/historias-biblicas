  <polygon points="70,25 90,52 110,25" fill="#ef4444"/>
  <polygon points="170,22 190,49 210,22" fill="#3b82f6"/>
  <polygon points="270,26 290,53 310,26" fill="#10b981"/>
  <polygon points="370,22 390,49 410,22" fill="#f59e0b"/>
  <polygon points="470,26 490,53 510,26" fill="#8b5cf6"/>
  <polygon points="570,22 590,49 610,22" fill="#ec4899"/>
  <polygon points="670,26 690,53 710,26" fill="#ef4444"/>
