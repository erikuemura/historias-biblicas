<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="sa5_bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <radialGradient id="sa5_glow" cx="50%" cy="40%"><stop offset="0%" stop-color="#fef9c3" stop-opacity="0.9"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="800" height="380" fill="url(#sa5_bg)"/>
  <ellipse cx="400" cy="180" rx="250" ry="180" fill="url(#sa5_glow)"/>
  <!-- two large pillars -->
  <rect x="160" y="40" width="60" height="340" rx="6" fill="#92400e"/>
  <rect x="580" y="40" width="60" height="340" rx="6" fill="#92400e"/>
  <!-- pillar tops - capitals -->
  <rect x="145" y="40" width="90" height="24" rx="4" fill="#78350f"/>
  <rect x="565" y="40" width="90" height="24" rx="4" fill="#78350f"/>
  <!-- cracks appearing in pillars -->
  <path d="M185,100 Q190,140 183,180 Q188,200 182,240" stroke="#451a03" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M615,120 Q608,160 614,200 Q609,220 616,260" stroke="#451a03" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Sansão between pillars - grown hair, arms outstretched -->
  <ellipse cx="400" cy="190" rx="28" ry="30" fill="#fde68a"/>
  <!-- grown long hair again -->
  <path d="M372,185 Q350,220 358,280 Q372,260 385,280 Q398,260 410,280 Q422,260 428,280 Q435,220 428,185Z" fill="#78350f"/>
  <!-- strong arms pushing pillars -->
  <line x1="372" y1="210" x2="220" y2="200" stroke="#d97706" stroke-width="14" stroke-linecap="round"/>
  <line x1="428" y1="210" x2="580" y2="200" stroke="#d97706" stroke-width="14" stroke-linecap="round"/>
  <!-- hands on pillars -->
  <circle cx="220" cy="200" r="16" fill="#fde68a"/>
  <circle cx="580" cy="200" r="16" fill="#fde68a"/>
  <!-- dramatic light from above -->
  <ellipse cx="400" cy="100" rx="100" ry="60" fill="#fef3c7" opacity="0.5"/>
  <line x1="400" y1="0" x2="400" y2="120" stroke="#fbbf24" stroke-width="6" opacity="0.4"/>
  <!-- ground crowd silhouettes -->
  <ellipse cx="120" cy="355" rx="20" ry="25" fill="#78350f" opacity="0.5"/>
  <ellipse cx="680" cy="355" rx="20" ry="25" fill="#78350f" opacity="0.5"/>
  <ellipse cx="720" cy="360" rx="15" ry="20" fill="#92400e" opacity="0.4"/>
  <ellipse cx="80" cy="360" rx="15" ry="20" fill="#92400e" opacity="0.4"/>
</svg>
