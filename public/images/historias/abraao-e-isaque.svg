<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="aih_sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a4e"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <radialGradient id="aih_moon" cx="50%" cy="50%"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fbbf24"/></radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#aih_sky)"/>
  <!-- stars -->
  <circle cx="100" cy="40" r="2" fill="white" opacity="0.9"/>
  <circle cx="200" cy="70" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="350" cy="30" r="2" fill="white" opacity="0.9"/>
  <circle cx="500" cy="55" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="650" cy="35" r="2" fill="white" opacity="0.9"/>
  <circle cx="720" cy="80" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="440" cy="20" r="1" fill="white" opacity="0.9"/>
  <circle cx="580" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="270" cy="45" r="1" fill="white" opacity="0.7"/>
  <circle cx="170" cy="90" r="2" fill="white" opacity="0.6"/>
  <circle cx="80" cy="110" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="760" cy="60" r="2" fill="white" opacity="0.9"/>
  <!-- moon -->
  <circle cx="680" cy="70" r="28" fill="url(#aih_moon)"/>
  <!-- desert ground -->
  <ellipse cx="400" cy="400" rx="600" ry="120" fill="#92400e"/>
  <ellipse cx="400" cy="380" rx="500" ry="80" fill="#b45309"/>
  <!-- fire glow -->
  <ellipse cx="300" cy="330" rx="40" ry="20" fill="#f97316" opacity="0.4"/>
  <ellipse cx="300" cy="310" rx="20" ry="30" fill="#fbbf24" opacity="0.6"/>
  <ellipse cx="300" cy="295" rx="12" ry="22" fill="#fef3c7" opacity="0.8"/>
  <!-- Abraão figure -->
  <ellipse cx="400" cy="260" rx="22" ry="28" fill="#fde68a"/>
  <rect x="378" y="285" width="44" height="60" rx="8" fill="#78350f"/>
  <rect x="375" y="295" width="20" height="55" rx="5" fill="#92400e"/>
  <!-- beard -->
  <ellipse cx="400" cy="275" rx="14" ry="18" fill="#fef9c3"/>
  <!-- looking up pose - arms raised -->
  <line x1="378" y1="300" x2="350" y2="270" stroke="#78350f" stroke-width="8" stroke-linecap="round"/>
  <line x1="422" y1="300" x2="450" y2="270" stroke="#78350f" stroke-width="8" stroke-linecap="round"/>
  <!-- title glow -->
  <ellipse cx="400" cy="150" rx="200" ry="40" fill="#f59e0b" opacity="0.15"/>
</svg>
