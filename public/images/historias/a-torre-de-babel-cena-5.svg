  <path d="M625 315 Q613 306 608 308" stroke="#2563eb" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="665" cy="308" r="10" fill="#7c3aed"/>
  <ellipse cx="665" cy="325" rx="9" ry="13" fill="#6d28d9"/>
  <path d="M675 315 Q687 308 694 310" stroke="#6d28d9" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M655 315 Q643 306 638 310" stroke="#6d28d9" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="695" cy="310" r="7" fill="#818cf8"/>
  <ellipse cx="695" cy="323" rx="6" ry="10" fill="#6d28d9"/>
  <path d="M690 330 Q720 325 750 322" stroke="#1d4ed8" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="6,4"/>
