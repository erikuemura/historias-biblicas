  <circle cx="255" cy="295" r="10" fill="#15803d"/>
  <ellipse cx="255" cy="312" rx="9" ry="13" fill="#16a34a"/>
  <path d="M245 303 Q233 296 228 298" stroke="#16a34a" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M265 303 Q277 296 282 298" stroke="#16a34a" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="280" cy="292" r="9" fill="#22c55e"/>
  <ellipse cx="280" cy="308" rx="8" ry="12" fill="#16a34a"/>
  <!-- Group going other direction (diagonal) -->
  <circle cx="545" cy="296" r="10" fill="#92400e"/>
  <ellipse cx="545" cy="313" rx="9" ry="13" fill="#78350f"/>
  <path d="M555 304 Q567 297 572 299" stroke="#78350f" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M535 304 Q523 297 518 299" stroke="#78350f" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="518" cy="299" r="9" fill="#b45309"/>
  <ellipse cx="518" cy="315" rx="8" ry="12" fill="#92400e"/>
