  <!-- GROUPS OF PEOPLE walking in different directions -->
  <!-- Group going LEFT -->
  <circle cx="165" cy="308" r="10" fill="#dc2626"/>
  <ellipse cx="165" cy="325" rx="9" ry="13" fill="#ef4444"/>
  <path d="M157 315 Q145 308 138 310" stroke="#ef4444" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M173 315 Q185 306 190 308" stroke="#ef4444" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="138" cy="310" r="8" fill="#ef4444"/>
  <circle cx="195" cy="308" r="10" fill="#f97316"/>
  <ellipse cx="195" cy="325" rx="9" ry="13" fill="#ea580c"/>
  <path d="M185 315 Q173 308 166 310" stroke="#ea580c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M205 315 Q217 306 222 308" stroke="#ea580c" stroke-width="7" fill="none" stroke-linecap="round"/>
