  <path d="M280 305 Q260 290 230 285" stroke="#78350f" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="8,5"/>
  <path d="M520 305 Q540 290 570 285" stroke="#78350f" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="8,5"/>
  <path d="M350 295 Q320 270 290 260" stroke="#78350f" stroke-width="2.5" fill="none" opacity="0.4" stroke-dasharray="8,5"/>
  <path d="M450 295 Q480 270 510 260" stroke="#78350f" stroke-width="2.5" fill="none" opacity="0.4" stroke-dasharray="8,5"/>
  <!-- World map hint (continents in background sky area) -->
  <ellipse cx="130" cy="165" rx="55" ry="38" fill="#d97706" opacity="0.2"/>
  <ellipse cx="400" cy="155" rx="48" ry="30" fill="#d97706" opacity="0.2"/>
  <ellipse cx="660" cy="160" rx="52" ry="35" fill="#d97706" opacity="0.2"/>
