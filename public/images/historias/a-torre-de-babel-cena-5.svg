<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="babel5_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <linearGradient id="babel5_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="380" fill="url(#babel5_sky)"/>
  <!-- Clouds dispersing in different directions -->
  <ellipse cx="80" cy="70" rx="75" ry="28" fill="white" opacity="0.8"/>
  <ellipse cx="400" cy="45" rx="90" ry="32" fill="white" opacity="0.75"/>
  <ellipse cx="720" cy="65" rx="78" ry="30" fill="white" opacity="0.8"/>
  <!-- Background landscape showing different regions -->
  <!-- Mountains on left -->
  <polygon points="0,280 60,180 120,280" fill="#d97706" opacity="0.7"/>
  <polygon points="80,280 160,155 240,280" fill="#b45309" opacity="0.7"/>
  <polygon points="40,280 110,170 180,280" fill="#f59e0b" opacity="0.5"/>
  <!-- Desert in middle (Babel location) -->
  <rect x="0" y="315" width="800" height="65" fill="url(#babel5_ground)"/>
  <ellipse cx="400" cy="315" rx="480" ry="25" fill="#f59e0b" opacity="0.7"/>
  <!-- Mountains on right -->
  <polygon points="620,280 700,165 780,280" fill="#d97706" opacity="0.7"/>
  <polygon points="670,280 750,150 800,280" fill="#b45309" opacity="0.7"/>
