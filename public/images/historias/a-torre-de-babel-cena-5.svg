  <rect x="334" y="273" width="132" height="24" rx="3" fill="#92400e" opacity="0.8"/>
  <rect x="346" y="252" width="108" height="23" rx="3" fill="#d97706" opacity="0.7"/>
  <rect x="358" y="232" width="84" height="22" rx="3" fill="#b45309" opacity="0.7"/>
  <rect x="368" y="213" width="64" height="20" rx="3" fill="#d97706" opacity="0.6"/>
  <rect x="376" y="195" width="48" height="19" rx="3" fill="#92400e" opacity="0.5"/>
