  <circle cx="400" cy="310" r="9" fill="#0891b2"/>
  <ellipse cx="400" cy="326" rx="8" ry="12" fill="#0e7490"/>
  <path d="M392 318 Q382 312 378 315" stroke="#0e7490" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M408 318 Q418 312 422 315" stroke="#0e7490" stroke-width="6" fill="none" stroke-linecap="round"/>
