<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="sky6a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="ground6a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="380" fill="url(#sky6a)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.85">
    <ellipse cx="150" cy="65" rx="72" ry="26"/>
    <ellipse cx="195" cy="55" rx="54" ry="22"/>
    <ellipse cx="105" cy="73" rx="45" ry="18"/>
    <ellipse cx="620" cy="75" rx="68" ry="25"/>
    <ellipse cx="665" cy="64" rx="50" ry="21"/>
    <ellipse cx="575" cy="82" rx="42" ry="17"/>
  </g>

  <!-- Sun with rays -->
  <circle cx="680" cy="70" r="42" fill="#fff176" opacity="0.9"/>
  <circle cx="680" cy="70" r="32" fill="#ffee58"/>
  <g stroke="#ffd54f" stroke-width="3" opacity="0.6">
    <line x1="680" y1="18" x2="680" y2="6"/>
    <line x1="680" y1="122" x2="680" y2="134"/>
    <line x1="628" y1="70" x2="616" y2="70"/>
    <line x1="732" y1="70" x2="744" y2="70"/>
    <line x1="643" y1="33" x2="634" y2="24"/>
    <line x1="717" y1="107" x2="726" y2="116"/>
    <line x1="717" y1="33" x2="726" y2="24"/>
    <line x1="643" y1="107" x2="634" y2="116"/>
  </g>

  <!-- Background hills -->
  <ellipse cx="200" cy="310" rx="250" ry="100" fill="#66bb6a" opacity="0.5"/>
  <ellipse cx="650" cy="320" rx="220" ry="90" fill="#4caf50" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="290" width="800" height="90" fill="url(#ground6a)"/>
  <rect x="0" y="290" width="800" height="12" fill="#a5d6a7"/>

  <!-- Small flowers -->
  <circle cx="200" cy="298" r="5" fill="#e91e63"/>
  <circle cx="260" cy="302" r="4" fill="#ffeb3b"/>
  <circle cx="540" cy="298" r="5" fill="#ff9800"/>
  <circle cx="600" cy="302" r="4" fill="#ce93d8"/>

  <!-- NOE character - center, arms raised in prayer -->
  <g transform="translate(355,150)">
    <ellipse cx="45" cy="152" rx="36" ry="10" fill="#2e7d32" opacity="0.25"/>
    <!-- Robe -->
    <path d="M15,58 Q45,52 75,58 L85,155 Q45,162 5,155 Z" fill="#8d6e63"/>
    <!-- Belt -->
    <rect x="10" y="92" width="70" height="10" rx="4" fill="#5d4037"/>
    <!-- Arms raised up in prayer -->
    <path d="M15,68 Q-10,45 -18,20" stroke="#a1887f" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M75,68 Q100,45 108,20" stroke="#a1887f" stroke-width="13" fill="none" stroke-linecap="round"/>
    <!-- Hands open -->
    <circle cx="-20" cy="16" r="9" fill="#ffcc80"/>
    <circle cx="110" cy="16" r="9" fill="#ffcc80"/>
    <!-- Head -->
    <circle cx="45" cy="36" r="28" fill="#ffcc80"/>
    <!-- White beard -->
    <ellipse cx="45" cy="56" rx="20" ry="14" fill="white"/>
    <path d="M25,48 Q45,68 65,48" fill="white"/>
    <!-- White hair -->
    <ellipse cx="45" cy="14" rx="24" ry="12" fill="white"/>
    <!-- Eyes closed in prayer -->
    <path d="M33,32 Q37,30 41,32" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M49,32 Q53,30 57,32" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Smile under beard -->
    <path d="M35,44 Q45,50 55,44" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="28" cy="42" r="8" fill="#ef9a9a" opacity="0.4"/>
    <circle cx="62" cy="42" r="8" fill="#ef9a9a" opacity="0.4"/>
    <!-- Sandals -->
    <ellipse cx="22" cy="158" rx="14" ry="6" fill="#795548"/>
    <ellipse cx="68" cy="158" rx="14" ry="6" fill="#795548"/>
    <!-- Light rays from above suggesting divine presence -->
  </g>

  <!-- Divine light rays from top -->
  <line x1="400" y1="0" x2="375" y2="150" stroke="#fff9c4" stroke-width="3" opacity="0.4"/>
  <line x1="400" y1="0" x2="400" y2="150" stroke="#fff9c4" stroke-width="4" opacity="0.5"/>
  <line x1="400" y1="0" x2="425" y2="150" stroke="#fff9c4" stroke-width="3" opacity="0.4"/>
</svg>
