<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="ester_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="50%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
    <linearGradient id="ester_throne" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="ester_glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ester_robe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#ester_bg)"/>
  <!-- Palace ceiling/arch -->
  <ellipse cx="400" cy="-20" rx="350" ry="200" fill="#9d174d" opacity="0.3"/>
  <!-- Decorative arches -->
  <path d="M80 400 Q80 80 400 60 Q720 80 720 400" stroke="#fde68a" stroke-width="8" fill="none" opacity="0.6"/>
  <path d="M120 400 Q120 120 400 100 Q680 120 680 400" stroke="#f9a8d4" stroke-width="5" fill="none" opacity="0.5"/>
  <!-- Columns on sides -->
  <!-- Left column -->
  <rect x="80" y="80" width="30" height="320" rx="8" fill="#db2777" opacity="0.7"/>
  <ellipse cx="95" cy="80" rx="22" ry="10" fill="#ec4899" opacity="0.8"/>
  <ellipse cx="95" cy="400" rx="22" ry="10" fill="#be185d" opacity="0.8"/>
  <!-- Column decorations -->
  <ellipse cx="95" cy="150" rx="18" ry="8" fill="#fde68a" opacity="0.6"/>
  <ellipse cx="95" cy="230" rx="18" ry="8" fill="#fde68a" opacity="0.6"/>
  <ellipse cx="95" cy="310" rx="18" ry="8" fill="#fde68a" opacity="0.6"/>
  <!-- Right column -->
  <rect x="690" y="80" width="30" height="320" rx="8" fill="#db2777" opacity="0.7"/>
  <ellipse cx="705" cy="80" rx="22" ry="10" fill="#ec4899" opacity="0.8"/>
  <ellipse cx="705" cy="400" rx="22" ry="10" fill="#be185d" opacity="0.8"/>
  <ellipse cx="705" cy="150" rx="18" ry="8" fill="#fde68a" opacity="0.6"/>
  <ellipse cx="705" cy="230" rx="18" ry="8" fill="#fde68a" opacity="0.6"/>
  <ellipse cx="705" cy="310" rx="18" ry="8" fill="#fde68a" opacity="0.6"/>
  <!-- Throne platform -->
  <rect x="260" y="290" width="280" height="15" rx="4" fill="#d97706"/>
  <rect x="240" y="303" width="320" height="15" rx="4" fill="#b45309"/>
  <rect x="220" y="316" width="360" height="15" rx="4" fill="#d97706"/>
  <!-- THRONE -->
  <!-- Throne back -->
  <rect x="330" y="160" width="140" height="135" rx="8" fill="url(#ester_throne)"/>
  <!-- Throne back decoration -->
  <ellipse cx="400" cy="175" rx="55" ry="25" fill="#fbbf24"/>
  <polygon points="400,148 415,175 385,175" fill="#fde047"/>
  <!-- Throne seat -->
  <rect x="320" y="270" width="160" height="24" rx="5" fill="#d97706"/>
  <rect x="315" y="266" width="170" height="10" rx="4" fill="#fbbf24"/>
  <!-- Throne armrests -->
  <rect x="310" y="240" width="18" height="50" rx="5" fill="#d97706"/>
  <rect x="472" y="240" width="18" height="50" rx="5" fill="#d97706"/>
  <!-- Throne legs -->
  <rect x="335" y="285" width="15" height="20" rx="3" fill="#b45309"/>
  <rect x="450" y="285" width="15" height="20" rx="3" fill="#b45309"/>
  <!-- Throne glow -->
  <ellipse cx="400" cy="230" rx="160" ry="140" fill="url(#ester_glow)"/>
  <!-- ESTER on throne -->
  <!-- Robe (flowing, elaborate) -->
  <ellipse cx="400" cy="268" rx="55" ry="28" fill="#9d174d"/>
  <!-- Main body/robe -->
  <ellipse cx="400" cy="240" rx="40" ry="58" fill="url(#ester_robe)"/>
  <!-- Robe decorations (gold trim) -->
  <path d="M362 210 Q358 240 360 270" stroke="#fde68a" stroke-width="4" fill="none"/>
  <path d="M438 210 Q442 240 440 270" stroke="#fde68a" stroke-width="4" fill="none"/>
  <!-- Belt with jewel -->
  <rect x="372" y="248" width="56" height="10" rx="4" fill="#fde68a"/>
  <circle cx="400" cy="253" r="6" fill="#ec4899"/>
  <!-- Arms (regal, one on armrest) -->
  <path d="M362 235 Q340 240 328 248" stroke="#db2777" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M438 235 Q460 240 472 248" stroke="#db2777" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Hands on armrests -->
  <ellipse cx="326" cy="249" rx="13" ry="9" fill="#fbbf24"/>
  <ellipse cx="474" cy="249" rx="13" ry="9" fill="#fbbf24"/>
  <!-- Ester's head -->
  <circle cx="400" cy="182" r="32" fill="#fbbf24"/>
  <!-- Hair (dark, elaborate) -->
  <ellipse cx="400" cy="164" rx="32" ry="17" fill="#1c1917"/>
  <path d="M371 170 Q362 192 365 218" stroke="#1c1917" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M429 170 Q438 192 435 218" stroke="#1c1917" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- CROWN (golden) -->
  <rect x="372" y="150" width="56" height="16" rx="3" fill="#fde047"/>
  <polygon points="376,150 382,132 388,150" fill="#fde047"/>
  <polygon points="394,150 400,128 406,150" fill="#fde047"/>
  <polygon points="412,150 418,132 424,150" fill="#fde047"/>
  <!-- Crown jewels -->
  <circle cx="382" cy="137" r="5" fill="#dc2626"/>
  <circle cx="400" cy="133" r="6" fill="#7c3aed"/>
  <circle cx="418" cy="137" r="5" fill="#22c55e"/>
  <!-- Ester's face (beautiful, serene) -->
  <circle cx="392" cy="180" r="4.5" fill="#1c1917"/>
  <circle cx="408" cy="180" r="4.5" fill="#1c1917"/>
  <circle cx="393" cy="178" r="2" fill="white"/>
  <circle cx="409" cy="178" r="2" fill="white"/>
  <path d="M392 191 Q400 196 408 191" stroke="#9d174d" stroke-width="2.5" fill="none"/>
  <!-- Elegant eyebrows -->
  <path d="M389 173 Q393 170 397 173" stroke="#1c1917" stroke-width="2" fill="none"/>
  <path d="M403 173 Q407 170 411 173" stroke="#1c1917" stroke-width="2" fill="none"/>
  <!-- Jewelry (necklace) -->
  <path d="M377 203 Q400 215 423 203" stroke="#fde068a" stroke-width="4" fill="none" stroke="#fde047"/>
  <circle cx="400" cy="212" r="5" fill="#dc2626"/>
  <!-- Floor decorations -->
  <ellipse cx="200" cy="370" rx="60" ry="15" fill="#be185d" opacity="0.3"/>
  <ellipse cx="600" cy="370" rx="60" ry="15" fill="#be185d" opacity="0.3"/>
  <!-- Rose petals on floor -->
  <ellipse cx="180" cy="360" rx="10" ry="6" fill="#f9a8d4" opacity="0.7" transform="rotate(-20,180,360)"/>
  <ellipse cx="210" cy="365" rx="10" ry="6" fill="#fce7f3" opacity="0.7" transform="rotate(15,210,365)"/>
  <ellipse cx="590" cy="362" rx="10" ry="6" fill="#f9a8d4" opacity="0.7" transform="rotate(25,590,362)"/>
  <ellipse cx="620" cy="358" rx="10" ry="6" fill="#fce7f3" opacity="0.7" transform="rotate(-10,620,358)"/>
</svg>
