<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="rm1_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0828"/>
      <stop offset="60%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <radialGradient id="rm1_bigStar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="30%" style="stop-color:#fde047"/>
      <stop offset="100%" style="stop-color:#ca8a04;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="rm1_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#713f12"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
  </defs>
  <!-- Night sky -->
  <rect width="800" height="380" fill="url(#rm1_sky)"/>
  <!-- Milky way effect -->
  <ellipse cx="400" cy="120" rx="350" ry="60" fill="#312e81" opacity="0.3"/>
  <!-- Many stars -->
  <circle cx="30" cy="20" r="2" fill="white" opacity="0.9"/>
  <circle cx="80" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="140" cy="15" r="2.5" fill="white"/>
  <circle cx="190" cy="55" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="240" cy="30" r="2" fill="white" opacity="0.6"/>
  <circle cx="320" cy="10" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="500" cy="35" r="2" fill="white" opacity="0.7"/>
  <circle cx="560" cy="15" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="620" cy="50" r="2" fill="white" opacity="0.6"/>
  <circle cx="680" cy="20" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="740" cy="40" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="770" cy="70" r="2" fill="white" opacity="0.8"/>
  <circle cx="60" cy="90" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="160" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="280" cy="70" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="420" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="700" cy="100" r="1.5" fill="white" opacity="0.6"/>
  <!-- Big star with glow -->
  <circle cx="400" cy="80" r="100" fill="url(#rm1_bigStar)" opacity="0.5"/>
  <circle cx="400" cy="80" r="50" fill="url(#rm1_bigStar)" opacity="0.7"/>
  <!-- Star shape large -->
  <polygon points="400,30 412,68 452,68 420,90 432,128 400,107 368,128 380,90 348,68 388,68" fill="#fef08a"/>
  <!-- Star rays -->
  <line x1="400" y1="20" x2="400" y2="5" stroke="#fef9c3" stroke-width="3" opacity="0.9"/>
  <line x1="400" y1="140" x2="400" y2="155" stroke="#fef9c3" stroke-width="3" opacity="0.7"/>
  <line x1="340" y1="80" x2="325" y2="80" stroke="#fef9c3" stroke-width="2" opacity="0.7"/>
  <line x1="460" y1="80" x2="475" y2="80" stroke="#fef9c3" stroke-width="2" opacity="0.7"/>
  <line x1="360" y1="45" x2="348" y2="33" stroke="#fef9c3" stroke-width="2" opacity="0.6"/>
  <line x1="440" y1="45" x2="452" y2="33" stroke="#fef9c3" stroke-width="2" opacity="0.6"/>
  <!-- Ground desert -->
  <rect x="0" y="290" width="800" height="90" fill="url(#rm1_ground)"/>
  <ellipse cx="200" cy="293" rx="220" ry="18" fill="#92400e"/>
  <ellipse cx="600" cy="295" rx="250" ry="15" fill="#78350f"/>
  <!-- Three wise men figures looking up -->
  <!-- Wise man 1 left -->
  <rect x="130" y="240" width="30" height="60" rx="8" fill="#dc2626"/>
  <circle cx="145" cy="232" r="18" fill="#fbbf24"/>
  <!-- turban -->
  <ellipse cx="145" cy="222" rx="18" ry="10" fill="#dc2626"/>
  <rect x="130" y="215" width="30" height="10" rx="3" fill="#b91c1c"/>
  <!-- arm pointing up -->
  <line x1="130" y1="255" x2="110" y2="230" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
  <!-- Wise man 2 center -->
  <rect x="380" y="245" width="32" height="58" rx="8" fill="#7c3aed"/>
  <circle cx="396" cy="237" r="18" fill="#fde68a"/>
  <ellipse cx="396" cy="227" rx="18" ry="10" fill="#6d28d9"/>
  <rect x="380" y="220" width="32" height="10" rx="3" fill="#5b21b6"/>
  <!-- arm pointing up -->
  <line x1="396" y1="257" x2="396" y2="230" stroke="#fde68a" stroke-width="5" stroke-linecap="round"/>
  <!-- Wise man 3 right -->
  <rect x="620" y="242" width="30" height="60" rx="8" fill="#1d4ed8"/>
  <circle cx="635" cy="234" r="18" fill="#fcd34d"/>
  <ellipse cx="635" cy="224" rx="18" ry="10" fill="#1e40af"/>
  <rect x="620" y="217" width="30" height="10" rx="3" fill="#1e3a8a"/>
  <!-- arm pointing up -->
  <line x1="650" y1="255" x2="668" y2="230" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <!-- Telescope/scroll in hands -->
  <rect x="103" y="225" width="18" height="6" rx="3" fill="#92400e"/>
  <rect x="660" y="225" width="18" height="6" rx="3" fill="#92400e"/>
  <!-- Small buildings silhouette in distance -->
  <rect x="50" y="265" width="40" height="35" fill="#1e1b4b"/>
  <polygon points="50,265 70,248 90,265" fill="#1e1b4b"/>
  <rect x="700" y="268" width="35" height="32" fill="#1e1b4b"/>
  <polygon points="700,268 718,252 736,268" fill="#1e1b4b"/>
</svg>
