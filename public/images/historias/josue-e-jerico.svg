  <rect x="68" y="372" width="24" height="30" rx="5" fill="#92400e"/>
  <ellipse cx="130" cy="358" rx="13" ry="18" fill="#78350f"/>
  <rect x="119" y="373" width="22" height="28" rx="5" fill="#7c2d12"/>
  <ellipse cx="680" cy="355" rx="15" ry="20" fill="#78350f"/>
  <rect x="668" y="372" width="24" height="30" rx="5" fill="#92400e"/>
  <ellipse cx="730" cy="358" rx="13" ry="18" fill="#78350f"/>
