<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="skyRJ2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474f"/>
      <stop offset="35%" stop-color="#ff8a65"/>
      <stop offset="70%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#skyRJ2)"/>
  <!-- Sunrise rays -->
  <g stroke="#fff9c4" stroke-width="4" opacity="0.35">
    <line x1="680" y1="80" x2="500" y2="250"/>
    <line x1="680" y1="80" x2="560" y2="280"/>
    <line x1="680" y1="80" x2="620" y2="300"/>
    <line x1="680" y1="80" x2="680" y2="310"/>
    <line x1="680" y1="80" x2="740" y2="280"/>
    <line x1="680" y1="80" x2="780" y2="250"/>
  </g>
  <!-- Rising sun -->
  <circle cx="680" cy="80" r="55" fill="#ffb300" opacity="0.85"/>
  <circle cx="680" cy="80" r="38" fill="#fff9c4" opacity="0.9"/>
  <!-- Hill -->
  <ellipse cx="200" cy="330" rx="290" ry="108" fill="#5d4037" opacity="0.5"/>
  <ellipse cx="640" cy="335" rx="265" ry="98" fill="#4e342e" opacity="0.45"/>
  <!-- Ground -->
  <rect x="0" y="298" width="800" height="82" fill="#6d4c41"/>
  <!-- TOMB OPEN — giant stone rolled away -->
  <g transform="translate(220,160)">
    <!-- Tomb structure -->
    <path d="M60,60 Q150,-12 240,60 Q280,82 282,135 Q282,188 240,208 Q150,228 60,208 Q18,188 18,135 Q18,82 60,60Z" fill="#5d4037" opacity="0.7"/>
    <!-- Dark opening -->
    <ellipse cx="150" cy="130" rx="82" ry="100" fill="#1a1a1a"/>
    <!-- Glowing light from inside (resurrection light!) -->
    <ellipse cx="150" cy="130" rx="65" ry="80" fill="#fff9c4" opacity="0.15"/>
    <ellipse cx="150" cy="130" rx="45" ry="55" fill="#fff9c4" opacity="0.2"/>
    <!-- White linens left behind (folded) -->
    <path d="M112,148 Q150,138 188,148 Q186,164 150,168 Q114,164 112,148Z" fill="white" opacity="0.8"/>
    <path d="M128,132 Q150,126 172,132 Q170,142 150,145 Q130,142 128,132Z" fill="white" opacity="0.7"/>
    <!-- HUGE STONE ROLLED ASIDE -->
    <ellipse cx="295" cy="148" rx="65" ry="78" fill="#795548"/>
    <ellipse cx="295" cy="148" rx="57" ry="70" fill="#8d6e63"/>
    <ellipse cx="295" cy="148" rx="45" ry="56" fill="#6d4c41"/>
  </g>
  <!-- ANGEL sitting on stone (white, glowing) -->
  <g transform="translate(490,145)">
    <ellipse cx="42" cy="185" rx="36" ry="9" fill="#fff9c4" opacity="0.4"/>
    <!-- Glowing white robe -->
    <path d="M6,52 Q3,148 1,175 Q42,184 83,175 Q80,148 77,52 Q61,34 42,31 Q23,34 6,52Z" fill="white"/>
    <path d="M4,130 Q42,140 80,130 Q78,164 42,170 Q6,164 4,130Z" fill="#e0e0e0" opacity="0.3"/>
    <rect x="22" y="170" width="12" height="36" rx="5" fill="white" opacity="0.7"/>
    <rect x="46" y="170" width="12" height="36" rx="5" fill="#e0e0e0" opacity="0.7"/>
    <!-- Angel head (radiant) -->
    <circle cx="42" cy="24" r="26" fill="#fff9c4"/>
    <!-- Golden halo -->
    <circle cx="42" cy="24" r="34" fill="none" stroke="#ffd54f" stroke-width="4" opacity="0.7"/>
    <!-- Face serene -->
    <circle cx="32" cy="20" r="4" fill="#ffd54f" opacity="0.8"/>
    <circle cx="52" cy="20" r="4" fill="#ffd54f" opacity="0.8"/>
    <path d="M28,32 Q42,42 56,32" stroke="#ffb300" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <rect x="34" y="48" width="16" height="14" rx="4" fill="#fff9c4"/>
    <!-- Wings suggestion -->
    <path d="M6,58 Q-40,30 -60,60 Q-38,78 6,70" fill="#e0e0e0" opacity="0.7"/>
    <path d="M77,58 Q120,30 140,60 Q118,78 77,70" fill="#e0e0e0" opacity="0.7"/>
    <!-- Arms open -->
    <path d="M6,58 Q-16,72 -18,96" stroke="white" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="-17" cy="98" r="10" fill="#fff9c4"/>
    <path d="M77,58 Q94,72 92,96" stroke="white" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="91" cy="98" r="10" fill="#fff9c4"/>
  </g>
  <!-- Glow around tomb entrance -->
  <ellipse cx="370" cy="250" rx="80" ry="30" fill="#fff9c4" opacity="0.15"/>
  <!-- Frightened guards fleeing (small, right) -->
  <g transform="translate(70,255)" opacity="0.7">
    <path d="M2,36 L0,95 L22,95 L24,36 Q12,26 10,24 Q4,26 2,36Z" fill="#78909c"/>
    <circle cx="12" cy="13" r="15" fill="#8d6e63"/>
    <path d="M-1,6 Q12,-4 25,6 Q23,0 12,-2 Q1,0 -1,6Z" fill="#546e7a"/>
    <circle cx="5" cy="9" r="3" fill="#3e2723"/>
    <circle cx="19" cy="9" r="3" fill="#3e2723"/>
    <!-- Running arms -->
    <path d="M22,40 Q36,30 42,18" stroke="#78909c" stroke-width="11" fill="none" stroke-linecap="round"/>
    <circle cx="43" cy="16" r="9" fill="#8d6e63"/>
    <path d="M2,40 Q-12,30 -16,18" stroke="#78909c" stroke-width="11" fill="none" stroke-linecap="round"/>
    <circle cx="-17" cy="16" r="9" fill="#8d6e63"/>
  </g>
</svg>
