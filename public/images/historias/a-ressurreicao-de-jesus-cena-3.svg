    <circle cx="450" cy="160" r="5"/><circle cx="420" cy="178" r="4"/>
    <circle cx="470" cy="175" r="3.5"/>
    <polygon points="440,145 443,153 451,153 445,158 447,166 440,161 433,166 435,158 429,153 437,153"/>
