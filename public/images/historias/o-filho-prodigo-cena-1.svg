<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="fp1_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD4A3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFAA7A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fp1_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A96A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A07840;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fp1_house" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0C890;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4A060;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="fp1_sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE870;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFAA30;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="380" fill="url(#fp1_sky)"/>
  <!-- Sun -->
  <circle cx="680" cy="70" r="45" fill="url(#fp1_sun)" opacity="0.9"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="60" rx="60" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="250" cy="50" rx="45" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="500" cy="80" rx="55" ry="22" fill="white" opacity="0.6"/>
  <!-- Ground -->
  <rect x="0" y="280" width="800" height="100" fill="url(#fp1_ground)"/>
  <!-- Path -->
  <ellipse cx="400" cy="310" rx="200" ry="20" fill="#B89050" opacity="0.5"/>
  <!-- House -->
  <rect x="500" y="170" width="200" height="130" fill="url(#fp1_house)" rx="4"/>
  <!-- Roof -->
  <polygon points="490,175 600,110 710,175" fill="#C05030"/>
  <!-- Door -->
  <rect x="570" y="240" width="50" height="60" fill="#8B5020" rx="4"/>
  <circle cx="614" cy="270" r="5" fill="#D4A030"/>
  <!-- Window -->
  <rect x="520" y="200" width="40" height="35" fill="#87CEEB" rx="3"/>
  <line x1="540" y1="200" x2="540" y2="235" stroke="#8B5020" stroke-width="2"/>
  <line x1="520" y1="217" x2="560" y2="217" stroke="#8B5020" stroke-width="2"/>
  <!-- Window 2 -->
  <rect x="640" y="200" width="40" height="35" fill="#87CEEB" rx="3"/>
  <line x1="660" y1="200" x2="660" y2="235" stroke="#8B5020" stroke-width="2"/>
  <line x1="640" y1="217" x2="680" y2="217" stroke="#8B5020" stroke-width="2"/>
  <!-- Trees -->
  <rect x="455" y="230" width="14" height="60" fill="#7A5030"/>
  <circle cx="462" cy="210" r="32" fill="#5A9040"/>
  <circle cx="445" cy="225" r="22" fill="#4A8030"/>
  <!-- Father figure (left) - sad, bent posture -->
  <circle cx="330" cy="210" r="22" fill="#F5C070"/>
  <!-- Father hair -->
  <ellipse cx="330" cy="195" rx="22" ry="12" fill="#7A4820"/>
  <!-- Father beard -->
  <ellipse cx="330" cy="225" rx="14" ry="8" fill="#9A6030" opacity="0.7"/>
  <!-- Father robe -->
  <polygon points="310,232 350,232 360,295 320,295" fill="#8B7050"/>
  <polygon points="318,232 342,232 340,280 320,280" fill="#9A8060"/>
  <!-- Father arms drooping -->
  <line x1="310" y1="245" x2="285" y2="265" stroke="#F5C070" stroke-width="10" stroke-linecap="round"/>
  <line x1="350" y1="245" x2="375" y2="265" stroke="#F5C070" stroke-width="10" stroke-linecap="round"/>
  <!-- Father sad eyes -->
  <ellipse cx="323" cy="210" rx="4" ry="5" fill="#5A3820"/>
  <ellipse cx="337" cy="210" rx="4" ry="5" fill="#5A3820"/>
  <!-- Tear drop -->
  <ellipse cx="320" cy="222" rx="3" ry="5" fill="#87CEEB" opacity="0.8"/>
  <!-- Father mouth -->
  <path d="M324,220 Q330,216 336,220" stroke="#8B5030" stroke-width="2" fill="none"/>
  <!-- Son figure (right) - standing, with sack, ready to leave -->
  <circle cx="450" cy="215" r="20" fill="#F5C870"/>
  <!-- Son hair -->
  <ellipse cx="450" cy="200" rx="20" ry="11" fill="#5A3010"/>
  <!-- Son robe -->
  <polygon points="432,235 468,235 475,295 425,295" fill="#E88060"/>
  <polygon points="438,235 462,235 460,280 440,280" fill="#F09070"/>
  <!-- Son arms - one pointing away -->
  <line x1="432" y1="248" x2="408" y2="262" stroke="#F5C870" stroke-width="9" stroke-linecap="round"/>
  <line x1="468" y1="248" x2="490" y2="240" stroke="#F5C870" stroke-width="9" stroke-linecap="round"/>
  <!-- Sack on shoulder -->
  <circle cx="495" cy="235" r="18" fill="#C09050"/>
  <line x1="490" y1="240" x2="495" y2="255" stroke="#7A5030" stroke-width="3"/>
  <ellipse cx="495" cy="255" rx="8" ry="5" fill="#C09050"/>
  <!-- Son eyes -->
  <ellipse cx="444" cy="215" rx="3" ry="4" fill="#5A3820"/>
  <ellipse cx="456" cy="215" rx="3" ry="4" fill="#5A3820"/>
  <!-- Son mouth - determined -->
  <path d="M445,223 Q450,227 455,223" stroke="#8B5030" stroke-width="2" fill="none"/>
  <!-- Decorative flowers -->
  <circle cx="80" cy="295" r="8" fill="#FF8080"/>
  <circle cx="80" cy="295" r="4" fill="#FFD040"/>
  <circle cx="120" cy="290" r="7" fill="#FF9080"/>
  <circle cx="120" cy="290" r="3" fill="#FFD040"/>
  <!-- Title area subtle -->
  <rect x="0" y="345" width="800" height="35" fill="#C05030" opacity="0.4"/>
  <text x="400" y="368" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">O Filho Pródigo — Cena 1: A Partida</text>
</svg>
