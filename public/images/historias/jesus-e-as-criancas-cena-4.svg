<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="jc4_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
    <linearGradient id="jc4_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <radialGradient id="jc4_bless" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#fef9c3;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="380" fill="url(#jc4_sky)"/>
  <!-- Clouds -->
  <ellipse cx="130" cy="50" rx="90" ry="35" fill="white" opacity="0.85"/>
  <ellipse cx="660" cy="45" rx="85" ry="32" fill="white" opacity="0.8"/>
  <!-- Sun -->
  <circle cx="680" cy="65" r="40" fill="#fef08a"/>
  <circle cx="680" cy="65" r="28" fill="#fde047"/>
  <!-- Ground -->
  <rect x="0" y="295" width="800" height="85" fill="url(#jc4_ground)"/>
  <!-- Flowers -->
  <circle cx="50" cy="298" r="5" fill="#f472b6"/>
  <circle cx="180" cy="300" r="5" fill="#fde047"/>
  <circle cx="380" cy="297" r="6" fill="#fb923c"/>
  <circle cx="620" cy="299" r="5" fill="#a78bfa"/>
  <circle cx="750" cy="298" r="5" fill="#f472b6"/>
  <!-- Blessing light aura -->
  <circle cx="400" cy="225" r="120" fill="url(#jc4_bless)"/>
  <!-- Jesus seated on ground, holding small child -->
  <rect x="345" y="228" width="110" height="120" rx="18" fill="#ffffff"/>
  <circle cx="400" cy="212" r="34" fill="#fde68a"/>
  <!-- Jesus hair and beard -->
  <ellipse cx="400" cy="200" rx="34" ry="20" fill="#92400e"/>
  <rect x="374" y="212" width="12" height="38" rx="5" fill="#92400e"/>
  <rect x="414" y="212" width="12" height="38" rx="5" fill="#92400e"/>
  <ellipse cx="400" cy="238" rx="22" ry="14" fill="#92400e"/>
  <!-- Jesus face - looking at child with love -->
  <circle cx="390" cy="210" r="5" fill="#78350f"/>
  <circle cx="410" cy="210" r="5" fill="#78350f"/>
  <path d="M386,222 Q400,233 414,222" stroke="#78350f" stroke-width="3" fill="none"/>
  <!-- cheeks rosy -->
  <circle cx="382" cy="218" r="7" fill="#fca5a5" opacity="0.5"/>
  <circle cx="418" cy="218" r="7" fill="#fca5a5" opacity="0.5"/>
  <!-- Small child in Jesus arms -->
  <circle cx="390" cy="265" r="20" fill="#fbbf24"/>
  <ellipse cx="390" cy="256" rx="20" ry="12" fill="#7c3aed"/>
  <rect x="373" y="275" width="35" height="50" rx="10" fill="#fde047"/>
  <!-- child smiling big -->
  <circle cx="382" cy="263" r="4" fill="#78350f"/>
  <circle cx="398" cy="263" r="4" fill="#78350f"/>
  <path d="M378,273 Q390,283 402,273" stroke="#78350f" stroke-width="2.5" fill="none"/>
  <!-- child cheeks -->
  <circle cx="376" cy="270" r="6" fill="#fca5a5" opacity="0.6"/>
  <circle cx="404" cy="270" r="6" fill="#fca5a5" opacity="0.6"/>
  <!-- Jesus hand raised in blessing -->
  <line x1="455" y1="250" x2="480" y2="225" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <ellipse cx="485" cy="220" rx="14" ry="16" fill="#fde68a"/>
  <!-- Golden rays of blessing from raised hand -->
  <line x1="490" y1="212" x2="500" y2="200" stroke="#fde047" stroke-width="2" opacity="0.7"/>
  <line x1="498" y1="218" x2="512" y2="210" stroke="#fde047" stroke-width="2" opacity="0.7"/>
  <line x1="500" y1="228" x2="516" y2="225" stroke="#fde047" stroke-width="2" opacity="0.7"/>
  <!-- Left arm holding child -->
  <line x1="345" y1="260" x2="320" y2="252" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <!-- Other children watching nearby -->
  <!-- Child left 1 -->
  <rect x="170" y="270" width="32" height="68" rx="10" fill="#f472b6"/>
  <circle cx="186" cy="259" r="18" fill="#fde68a"/>
  <ellipse cx="186" cy="250" rx="18" ry="10" fill="#7c3aed"/>
  <!-- pigtails -->
  <circle cx="170" cy="253" r="7" fill="#7c3aed"/>
  <circle cx="202" cy="253" r="7" fill="#7c3aed"/>
  <path d="M179,263 Q186,270 193,263" stroke="#78350f" stroke-width="2" fill="none"/>
  <!-- eyes wide watching -->
  <circle cx="179" cy="258" r="5" fill="#78350f"/>
  <circle cx="193" cy="258" r="5" fill="#78350f"/>
  <!-- Child left 2 -->
  <rect x="218" y="278" width="28" height="60" rx="8" fill="#60a5fa"/>
  <circle cx="232" cy="268" r="15" fill="#fbbf24"/>
  <ellipse cx="232" cy="260" rx="15" ry="8" fill="#92400e"/>
  <circle cx="226" cy="267" r="4" fill="#78350f"/>
  <circle cx="238" cy="267" r="4" fill="#78350f"/>
  <!-- Child right 1 -->
  <rect x="542" y="272" width="32" height="66" rx="10" fill="#4ade80"/>
  <circle cx="558" cy="261" r="18" fill="#fbbf24"/>
  <ellipse cx="558" cy="252" rx="18" ry="10" fill="#b45309"/>
  <circle cx="551" cy="260" r="5" fill="#78350f"/>
  <circle cx="565" cy="260" r="5" fill="#78350f"/>
  <path d="M551,270 Q558,277 565,270" stroke="#78350f" stroke-width="2" fill="none"/>
  <!-- Child right 2 -->
  <rect x="585" y="275" width="28" height="62" rx="8" fill="#fb923c"/>
  <circle cx="599" cy="265" r="15" fill="#fde68a"/>
  <ellipse cx="599" cy="257" rx="15" ry="8" fill="#78350f"/>
  <circle cx="593" cy="264" r="4" fill="#78350f"/>
  <circle cx="605" cy="264" r="4" fill="#78350f"/>
  <!-- Parents watching in background - emotional -->
  <!-- Parent left -->
  <rect x="60" y="228" width="44" height="105" rx="10" fill="#3b82f6"/>
  <circle cx="82" cy="216" r="21" fill="#fde68a"/>
  <ellipse cx="82" cy="207" rx="21" ry="11" fill="#1d4ed8"/>
  <!-- tear of joy -->
  <ellipse cx="75" cy="222" rx="3" ry="5" fill="#93c5fd" opacity="0.7"/>
  <ellipse cx="89" cy="222" rx="3" ry="5" fill="#93c5fd" opacity="0.7"/>
  <!-- Parent right -->
  <rect x="690" y="230" width="44" height="103" rx="10" fill="#dc2626"/>
  <circle cx="712" cy="218" r="21" fill="#fde68a"/>
  <ellipse cx="712" cy="209" rx="21" ry="11" fill="#b91c1c"/>
  <ellipse cx="705" cy="224" rx="3" ry="5" fill="#93c5fd" opacity="0.7"/>
</svg>
