      <circle cx="10" cy="10" r="12" fill="#e8a87a"/>
      <circle cx="4" cy="8" r="3.5" fill="#3e2723"/>
      <circle cx="16" cy="8" r="3.5" fill="#3e2723"/>
      <path d="M3,18 Q10,14 17,18" stroke="#c62828" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(140,10)">
      <path d="M0,30 L-1,68 L20,68 L21,30 Q10,22 8,20 Q4,22 0,30Z" fill="#ef6c00"/>
      <circle cx="10" cy="10" r="12" fill="#ffccbc"/>
      <circle cx="4" cy="8" r="3.5" fill="#4e342e"/>
      <circle cx="16" cy="8" r="3.5" fill="#4e342e"/>
      <path d="M3,18 Q10,14 17,18" stroke="#c62828" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(310,12)">
      <path d="M0,30 L-1,64 L20,64 L21,30 Q10,22 8,20 Q4,22 0,30Z" fill="#26a69a"/>
      <circle cx="10" cy="10" r="12" fill="#e8a87a"/>
      <circle cx="4" cy="8" r="3.5" fill="#3e2723"/>
      <circle cx="16" cy="8" r="3.5" fill="#3e2723"/>
      <path d="M3,18 Q10,14 17,18" stroke="#c62828" stroke-width="2" fill="none"/>
    </g>
  </g>
</svg>
