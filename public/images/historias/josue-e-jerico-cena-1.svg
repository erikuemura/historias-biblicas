<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="jos1_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
    <linearGradient id="jos1_wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#7a5020"/>
    </linearGradient>
    <linearGradient id="jos1_wall2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b89050"/>
      <stop offset="100%" stop-color="#6a4010"/>
    </linearGradient>
    <linearGradient id="jos1_ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#906030"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="380" fill="url(#jos1_sky)"/>

  <!-- Sun -->
  <circle cx="120" cy="65" r="38" fill="#fff9c4"/>
  <circle cx="120" cy="65" r="30" fill="#ffee58"/>

  <!-- Clouds -->
  <ellipse cx="300" cy="55" rx="65" ry="22" fill="white" opacity="0.8"/>
  <ellipse cx="270" cy="60" rx="44" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="335" cy="60" rx="48" ry="17" fill="white" opacity="0.8"/>
  <ellipse cx="600" cy="45" rx="55" ry="20" fill="white" opacity="0.75"/>

  <!-- JERICÓ — massive imposing city walls, center-right -->
  <!-- Main wall body — very tall -->
  <rect x="380" y="60" width="380" height="270" fill="url(#jos1_wall)"/>
  <!-- Wall texture / stones -->
  <rect x="380" y="60" width="380" height="20" fill="#d4b070" opacity="0.5"/>
  <rect x="380" y="100" width="380" height="15" fill="#d4b070" opacity="0.4"/>
  <rect x="380" y="135" width="380" height="15" fill="#d4b070" opacity="0.4"/>
  <rect x="380" y="170" width="380" height="15" fill="#d4b070" opacity="0.4"/>
  <rect x="380" y="205" width="380" height="15" fill="#d4b070" opacity="0.4"/>
  <rect x="380" y="240" width="380" height="15" fill="#d4b070" opacity="0.4"/>
  <rect x="380" y="275" width="380" height="15" fill="#d4b070" opacity="0.4"/>
  <!-- Vertical stone joints -->
  <line x1="420" y1="60" x2="420" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>
  <line x1="460" y1="60" x2="460" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="60" x2="500" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>
  <line x1="540" y1="60" x2="540" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>
  <line x1="580" y1="60" x2="580" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>
  <line x1="620" y1="60" x2="620" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>
  <line x1="660" y1="60" x2="660" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>
  <line x1="700" y1="60" x2="700" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>
  <line x1="740" y1="60" x2="740" y2="330" stroke="#a07030" stroke-width="1.5" opacity="0.4"/>

  <!-- Wall battlements (top) -->
  <rect x="380" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="420" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="460" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="500" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="540" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="580" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="620" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="660" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="700" y="44" width="28" height="22" rx="2" fill="#c8a060"/>
  <rect x="740" y="44" width="28" height="22" rx="2" fill="#c8a060"/>

  <!-- Tower left on wall -->
  <rect x="370" y="20" width="60" height="120" fill="url(#jos1_wall2)"/>
  <rect x="362" y="8" width="18" height="22" rx="2" fill="#b89050"/>
  <rect x="384" y="8" width="18" height="22" rx="2" fill="#b89050"/>
  <rect x="406" y="8" width="18" height="22" rx="2" fill="#b89050"/>
  <!-- Tower window -->
  <rect x="388" y="55" width="24" height="30" rx="3" fill="#5a3010"/>
  <path d="M388 55 Q400 48 412 55" fill="#5a3010"/>

  <!-- Gate in wall -->
  <rect x="490" y="210" width="70" height="120" rx="5" fill="#5a3010"/>
  <path d="M490 210 Q525 188 560 210" fill="#5a3010"/>
  <!-- Gate arch details -->
  <rect x="498" y="220" width="54" height="100" rx="3" fill="#3a1a08"/>
  <!-- Iron bars on gate -->
  <line x1="510" y1="220" x2="510" y2="320" stroke="#5a4020" stroke-width="3"/>
  <line x1="525" y1="220" x2="525" y2="320" stroke="#5a4020" stroke-width="3"/>
  <line x1="540" y1="220" x2="540" y2="320" stroke="#5a4020" stroke-width="3"/>
  <line x1="498" y1="260" x2="552" y2="260" stroke="#5a4020" stroke-width="3"/>
  <line x1="498" y1="290" x2="552" y2="290" stroke="#5a4020" stroke-width="3"/>

  <!-- Ground -->
  <rect x="0" y="320" width="800" height="60" fill="url(#jos1_ground)"/>

  <!-- Israelite people (small, left side — wall makes them look tiny) -->
  <!-- Group of people -->
  <!-- Person 1 -->
  <circle cx="60" cy="295" r="12" fill="#d4956a"/>
  <rect x="50" y="306" width="20" height="25" rx="3" fill="#e8c880"/>
  <path d="M50 306 Q60 300 70 306" fill="#c8a050"/>
  <!-- Person 2 -->
  <circle cx="100" cy="292" r="11" fill="#c8956a"/>
  <rect x="91" y="302" width="18" height="24" rx="3" fill="#ffcc80"/>
  <path d="M91 302 Q100 297 109 302" fill="#e0a840"/>
  <!-- Person 3 -->
  <circle cx="138" cy="296" r="12" fill="#d4a870"/>
  <rect x="128" y="307" width="20" height="23" rx="3" fill="#ffe082"/>
  <!-- Person 4 small -->
  <circle cx="172" cy="298" r="10" fill="#c88060"/>
  <rect x="163" y="307" width="17" height="22" rx="3" fill="#ffb74d"/>
  <!-- Person 5 -->
  <circle cx="205" cy="293" r="12" fill="#d4956a"/>
  <rect x="195" y="304" width="20" height="25" rx="3" fill="#e8c880"/>
  <!-- Person 6 -->
  <circle cx="240" cy="296" r="11" fill="#c8a870"/>
  <rect x="230" y="306" width="19" height="24" rx="3" fill="#ffcc80"/>
  <!-- Person 7 -->
  <circle cx="275" cy="294" r="12" fill="#d4956a"/>
  <rect x="265" y="305" width="20" height="25" rx="3" fill="#ffe082"/>
  <!-- Person 8 -->
  <circle cx="310" cy="297" r="11" fill="#c8956a"/>
  <rect x="301" y="307" width="18" height="23" rx="3" fill="#ffb74d"/>
  <!-- Person 9 -->
  <circle cx="344" cy="295" r="12" fill="#d4a870"/>
  <rect x="334" y="306" width="20" height="24" rx="3" fill="#e8c880"/>

  <!-- Eyes on some people - looking up at wall in awe -->
  <ellipse cx="60" cy="293" rx="3" ry="2.5" fill="white"/>
  <ellipse cx="67" cy="293" rx="3" ry="2.5" fill="white"/>
  <circle cx="61" cy="293" r="1.5" fill="#3a2010"/>
  <circle cx="68" cy="293" r="1.5" fill="#3a2010"/>

  <!-- Arrow pointing up to show scale comparison -->
  <line x1="360" y1="315" x2="360" y2="80" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="355,80 360,65 365,80" fill="#e53935" opacity="0.6"/>

  <!-- Caption -->
  <rect x="10" y="344" width="340" height="28" rx="14" fill="#7a5020" opacity="0.8"/>
  <text x="180" y="363" font-family="Georgia, serif" font-size="14" fill="#ffe082" text-anchor="middle" font-weight="bold">Os israelitas diante dos muros de Jericó</text>
</svg>
